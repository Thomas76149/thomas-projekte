<!DOCTYPE html>
<html lang="en" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <title>Advent Calendar</title>
  <meta name="description" content="24 doors — unlockable from December, progress is saved." />
  <meta name="theme-color" content="#1a0a12" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <a class="skip" href="#grid">Skip to calendar</a>
  <div class="snow" aria-hidden="true"></div>

  <header class="top">
    <div>
      <h1>Advent Calendar</h1>
      <p class="sub">Click a door — in December only up to today's date. To test: append <code>?demo=1</code> to the URL.</p>
    </div>
    <label class="demoToggle">
      <input type="checkbox" id="demoLocal" />
      <span>Demo mode (all doors)</span>
    </label>
  </header>

  <p class="hint" id="seasonHint" role="status"></p>

  <main id="grid" class="grid" aria-label="24 advent doors"></main>

  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button type="button" class="modal__x" data-close aria-label="Close">×</button>
      <p class="modal__kicker" id="modalDay"></p>
      <h2 id="modalTitle"></h2>
      <p class="modal__body" id="modalBody"></p>
      <button type="button" class="btn" data-close>OK</button>
    </div>
  </div>

  <footer class="foot">
    <a href="../../index.html">← thomas.fun</a>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
