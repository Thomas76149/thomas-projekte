<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroids · thomas.fun</title>
  <meta name="description" content="Asteroids‑Lite: Rotation, Schub, Schießen, Steine splitten. Score jagen." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;
      --good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(1100px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    canvas{
      width:min(960px,92vw);
      height:auto;
      display:block;
      margin:12px auto 8px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(900px 520px at 50% 20%, rgba(34,211,238,.10), rgba(0,0,0,.22));
    }
    .buffBar{
      width:min(960px,92vw);
      margin: 8px auto 0;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .buffBadge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      font-weight: 1000;
      letter-spacing: .08em;
      text-transform: uppercase;
      min-height: 44px;
      font-size: 0.82rem;
    }
    .buffBadge b{font-size:1rem; letter-spacing:.02em}
    .buffBadge--shield{border-color: rgba(34,211,238,.35); box-shadow: 0 0 22px rgba(34,211,238,.10) }
    .buffBadge--rapid{border-color: rgba(93,255,180,.35); box-shadow: 0 0 22px rgba(93,255,180,.10) }
    .buffBadge--spread{border-color: rgba(201,168,255,.35); box-shadow: 0 0 22px rgba(201,168,255,.10) }
    .buffBadge--missile{border-color: rgba(255,170,90,.35); box-shadow: 0 0 22px rgba(255,170,90,.10) }
    .toast{
      width:min(960px,92vw);
      margin: 10px auto 0;
      text-align:center;
      font-weight: 1000;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.92);
      text-shadow: 0 0 24px rgba(34,211,238,.25);
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity .18s ease, transform .18s ease;
      min-height: 22px;
    }
    .toast.show{opacity: 1; transform: translateY(0)}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{
      width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;text-align:center
    }
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:800}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .overlay.pause .panel h2{letter-spacing:.16em;text-transform:uppercase}
    .overlay.pause .panel p{color:rgba(200,220,255,.9)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Asteroids</h1>
      <a href="../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnStart">Start</button>
          <button id="btnReset">Reset</button>
        </div>
        <div class="meta">
          <span class="pill" id="score">Score: 0</span>
          <span class="pill" id="lives">Leben: 3</span>
          <span class="pill" id="wave">Welle: 1</span>
        </div>
      </div>
      <canvas id="c" width="1280" height="720" aria-label="Asteroids Spielfeld"></canvas>
      <div class="buffBar" id="buffBar" aria-live="polite">
        <span class="buffBadge buffBadge--shield" id="hudShield" hidden>🛡️ <b>Shield</b> <span id="hudShieldVal">0s</span></span>
        <span class="buffBadge buffBadge--rapid" id="hudRapid" hidden>⚡ <b>Rapid</b> <span id="hudRapidVal">0s</span></span>
        <span class="buffBadge buffBadge--spread" id="hudSpread" hidden>✶ <b>Spread</b> <span id="hudSpreadVal">0s</span></span>
        <span class="buffBadge buffBadge--missile" id="hudMissile" hidden>🚀 <b>Missiles</b> <span id="hudMissileVal">0</span></span>
      </div>
      <div class="toast" id="toast" aria-live="polite"></div>
      <div class="hint">←/→ drehen · ↑ Schub · Space schießen · Shift Hypersprung (risk) · Wrap an den Rändern</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">Game Over</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>

  <div class="overlay pause" id="pauseOv" aria-hidden="true">
    <div class="panel">
      <h2>Pause</h2>
      <p>ESC zum Fortsetzen · Steuerung bleibt gleich.</p>
      <div class="cta">
        <button class="primary" id="btnResume">Weiter</button>
        <button id="btnMenu">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    const btnStart = document.getElementById("btnStart");
    const btnReset = document.getElementById("btnReset");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const waveEl = document.getElementById("wave");
    const hudShield = document.getElementById("hudShield");
    const hudShieldVal = document.getElementById("hudShieldVal");
    const hudRapid = document.getElementById("hudRapid");
    const hudRapidVal = document.getElementById("hudRapidVal");
    const hudSpread = document.getElementById("hudSpread");
    const hudSpreadVal = document.getElementById("hudSpreadVal");
    const hudMissile = document.getElementById("hudMissile");
    const hudMissileVal = document.getElementById("hudMissileVal");
    const toastEl = document.getElementById("toast");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");
    const pauseOv = document.getElementById("pauseOv");
    const btnResume = document.getElementById("btnResume");
    const btnMenu = document.getElementById("btnMenu");

    const W = c.width, H = c.height;
    const keys = new Set();
    let running = false;
    let paused = false;
    let raf = 0;
    let lastT = 0;
    function showPause(show){
      paused = !!show;
      if (pauseOv) {
        pauseOv.classList.toggle("show", paused);
        pauseOv.setAttribute("aria-hidden", paused ? "false" : "true");
      }
      if (!paused) {
        lastT = 0;
        if (running) raf = requestAnimationFrame(loop);
      }
    }


    // tiny audio / vibe
    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.06, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    const vibr = (p)=>{ if (navigator.vibrate) navigator.vibrate(p); };

    const wrap = (v, m) => (v % m + m) % m;
    const rand = (a,b)=> a + Math.random()*(b-a);

    let score = 0;
    let lives = 3;
    let wave = 1;
    let bullets = [];
    let rocks = [];
    let pickups = [];
    let parts = [];
    let shake = 0;
    let screenFlash = 0;
    let invuln = 0;
    let shootCd = 0;
    let hyperCd = 0;
    let shieldT = 0;
    let rapidT = 0;
    let spreadT = 0;
    let missileStock = 0;

    const ship = { x: W/2, y: H/2, vx:0, vy:0, ang: -Math.PI/2, av:0 };

    function resetGame(){
      score = 0;
      lives = 3;
      wave = 1;
      bullets = [];
      rocks = [];
      pickups = [];
      parts = [];
      ship.x = W/2; ship.y = H/2;
      ship.vx = 0; ship.vy = 0;
      ship.ang = -Math.PI/2;
      shake = 0;
      screenFlash = 0;
      invuln = 1.3;
      shootCd = 0;
      hyperCd = 0;
      shieldT = 0;
      rapidT = 0;
      spreadT = 0;
      missileStock = 0;
      spawnWave();
      syncHud();
      hideOverlay();
      draw(0);
    }

    function syncHud(){
      scoreEl.textContent = `Score: ${score}`;
      livesEl.textContent = `Leben: ${lives}`;
      waveEl.textContent = `Welle: ${wave}`;

      const s = Math.ceil(shieldT);
      const r = Math.ceil(rapidT);
      const sp = Math.ceil(spreadT);
      hudShield.hidden = !(s > 0);
      if (s > 0) hudShieldVal.textContent = `${s}s`;
      hudRapid.hidden = !(r > 0);
      if (r > 0) hudRapidVal.textContent = `${r}s`;
      hudSpread.hidden = !(sp > 0);
      if (sp > 0) hudSpreadVal.textContent = `${sp}s`;
      hudMissile.hidden = !(missileStock > 0);
      if (missileStock > 0) hudMissileVal.textContent = String(missileStock);
    }

    function showToast(msg, kind="info"){
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.style.color =
        kind==="shield" ? "rgba(34,211,238,0.95)" :
        kind==="rapid" ? "rgba(93,255,180,0.95)" :
        kind==="spread" ? "rgba(201,168,255,0.95)" :
        kind==="missile" ? "rgba(255,170,90,0.95)" :
        "rgba(255,255,255,0.92)";
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=> toastEl.classList.remove("show"), 1200);
    }

    function hideOverlay(){
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
    }
    function showOverlay(title, text){
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
      ovTitle.textContent = title;
      ovText.textContent = text;
    }

    function spawnRock(size, x, y, vx, vy){
      const r = size === 3 ? 48 : size === 2 ? 28 : 16;
      const pts = [];
      const n = 10 + Math.floor(Math.random()*6);
      for (let i=0;i<n;i++){
        const a = (Math.PI*2*i)/n;
        const rr = r * (0.72 + Math.random()*0.45);
        pts.push([Math.cos(a)*rr, Math.sin(a)*rr]);
      }
      rocks.push({ size, x, y, vx, vy, r, pts, rot: rand(0,Math.PI*2), vr: rand(-1.8,1.8) });
    }

    function spawnWave(){
      const count = Math.min(3 + wave, 10);
      for (let i=0;i<count;i++){
        // spawn away from ship
        let x,y;
        for (let k=0;k<20;k++){
          x = Math.random()*W; y = Math.random()*H;
          if ((x-ship.x)**2 + (y-ship.y)**2 > 220*220) break;
        }
        const sp = 50 + wave*8;
        const a = Math.random()*Math.PI*2;
        spawnRock(3, x, y, Math.cos(a)*sp, Math.sin(a)*sp);
      }
    }

    function shoot(){
      if (shootCd > 0) return;
      const baseCd = 0.16;
      shootCd = rapidT > 0 ? Math.max(0.075, baseCd * 0.62) : baseCd;
      const sp = 720;
      const push = (ang, life=1.05, spMul=1) => {
        const bx = ship.x + Math.cos(ang)*18;
        const by = ship.y + Math.sin(ang)*18;
        bullets.push({ x:bx, y:by, vx: ship.vx + Math.cos(ang)*sp*spMul, vy: ship.vy + Math.sin(ang)*sp*spMul, life });
      };
      if (spreadT > 0) {
        push(ship.ang, 0.95, 0.98);
        push(ship.ang - 0.16, 0.9, 0.96);
        push(ship.ang + 0.16, 0.9, 0.96);
      } else {
        push(ship.ang);
      }
      tone(820,0.04,"square",0.03);
      vibr(6);
    }

    function fireMissile(){
      if (missileStock <= 0) return;
      missileStock--;
      const sp = 520;
      const bx = ship.x + Math.cos(ship.ang)*18;
      const by = ship.y + Math.sin(ship.ang)*18;
      // Raketen bleiben lange im Feld und sind sichtbarer + haben Trail.
      bullets.push({ x:bx, y:by, vx: ship.vx + Math.cos(ship.ang)*sp, vy: ship.vy + Math.sin(ship.ang)*sp, life: 5.2, missile: true });
      tone(180,0.12,"triangle",0.05);
      vibr([10,12,10]);
    }

    function hyperspace(){
      if (hyperCd > 0) return;
      hyperCd = 2.2;
      // risky teleport: might land near rock
      ship.x = Math.random()*W;
      ship.y = Math.random()*H;
      ship.vx *= 0.35;
      ship.vy *= 0.35;
      invuln = Math.max(invuln, 0.55);
      tone(220,0.08,"triangle",0.05);
      tone(520,0.09,"sine",0.04);
      vibr([10,18,10]);
      burst(ship.x, ship.y, "rgba(34,211,238,0.9)", 30, 520);
    }

    function burst(x,y,col,n=24, sp=420){
      for (let i=0;i<n;i++){
        const a = Math.random()*Math.PI*2;
        const s = sp*(0.35+Math.random()*0.8);
        parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.35+Math.random()*0.35,col,s:2+Math.random()*4});
      }
    }

    function ring(x,y,col,r0=10){
      const n = 18;
      for (let i=0;i<n;i++){
        const a = (Math.PI*2*i)/n;
        const sp = 260 + Math.random()*140;
        parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.35+Math.random()*0.25,col,s:r0*0.06+Math.random()*2.2});
      }
    }

    function rockWorldPoly(r){
      const out = [];
      const ca = Math.cos(r.rot), sa = Math.sin(r.rot);
      for (const [px,py] of r.pts){
        out.push([r.x + px*ca - py*sa, r.y + px*sa + py*ca]);
      }
      return out;
    }
    function shipPoly(){
      const ca = Math.cos(ship.ang), sa = Math.sin(ship.ang);
      const pts = [[18,0],[-12,10],[-7,0],[-12,-10]];
      const out = [];
      for (const [px,py] of pts){
        out.push([ship.x + px*ca - py*sa, ship.y + px*sa + py*ca]);
      }
      return out;
    }
    function pointInPoly(x,y, poly){
      let inside = false;
      for (let i=0,j=poly.length-1;i<poly.length;j=i++){
        const xi=poly[i][0], yi=poly[i][1];
        const xj=poly[j][0], yj=poly[j][1];
        const intersect = ((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi+1e-9)+xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }
    function segIntersects(a,b,c,d){
      const cross = (p,q,r)=> (q[0]-p[0])*(r[1]-p[1]) - (q[1]-p[1])*(r[0]-p[0]);
      const onSeg = (p,q,r)=> Math.min(p[0],r[0])<=q[0] && q[0]<=Math.max(p[0],r[0]) && Math.min(p[1],r[1])<=q[1] && q[1]<=Math.max(p[1],r[1]);
      const d1 = cross(a,b,c), d2 = cross(a,b,d), d3 = cross(c,d,a), d4 = cross(c,d,b);
      if (((d1>0 && d2<0)||(d1<0 && d2>0)) && ((d3>0 && d4<0)||(d3<0 && d4>0))) return true;
      if (Math.abs(d1)<1e-9 && onSeg(a,c,b)) return true;
      if (Math.abs(d2)<1e-9 && onSeg(a,d,b)) return true;
      if (Math.abs(d3)<1e-9 && onSeg(c,a,d)) return true;
      if (Math.abs(d4)<1e-9 && onSeg(c,b,d)) return true;
      return false;
    }
    function polysIntersect(p1,p2){
      // point in poly quick
      if (pointInPoly(p1[0][0], p1[0][1], p2)) return true;
      if (pointInPoly(p2[0][0], p2[0][1], p1)) return true;
      // edges
      for (let i=0;i<p1.length;i++){
        const a = p1[i], b = p1[(i+1)%p1.length];
        for (let j=0;j<p2.length;j++){
          const c = p2[j], d = p2[(j+1)%p2.length];
          if (segIntersects(a,b,c,d)) return true;
        }
      }
      return false;
    }

    function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }

    function update(dt){
      const sec = dt/1000;
      if (shootCd > 0) shootCd -= sec;
      if (hyperCd > 0) hyperCd -= sec;
      if (invuln > 0) invuln -= sec;
      if (rapidT > 0) rapidT = Math.max(0, rapidT - sec);
      if (spreadT > 0) spreadT = Math.max(0, spreadT - sec);
      if (shieldT > 0) shieldT = Math.max(0, shieldT - sec);
      if (screenFlash > 0) screenFlash = Math.max(0, screenFlash - sec*2.6);
      if (shake > 0.4) shake *= Math.pow(0.88, dt/16);
      else shake = 0;

      // controls
      const left = keys.has("ArrowLeft") || keys.has("KeyA");
      const right = keys.has("ArrowRight") || keys.has("KeyD");
      const thrust = keys.has("ArrowUp") || keys.has("KeyW");
      const fire = keys.has("Space");
      const hyper = keys.has("ShiftLeft") || keys.has("ShiftRight");
      const missile = false; // Raketen feuern wir per Keydown (siehe unten)

      if (left) ship.ang -= 3.9*sec;
      if (right) ship.ang += 3.9*sec;
      if (thrust) {
        ship.vx += Math.cos(ship.ang)*520*sec;
        ship.vy += Math.sin(ship.ang)*520*sec;
        // engine particles
        if (Math.random()<0.7) {
          const back = ship.ang + Math.PI;
          const x = ship.x + Math.cos(back)*16;
          const y = ship.y + Math.sin(back)*16;
          parts.push({x,y,vx:ship.vx+Math.cos(back)*rand(40,160)+(Math.random()-0.5)*60,vy:ship.vy+Math.sin(back)*rand(40,160)+(Math.random()-0.5)*60,life:0.2+Math.random()*0.2,col:"rgba(249,115,22,0.85)",s:2+Math.random()*3});
        }
      }
      if (fire) shoot();
      // (Raketen-Key ist on-keydown, damit es immer exakt 1x feuert.)
      if (hyper && hyperCd<=0) hyperspace();

      // friction
      ship.vx *= Math.pow(0.995, dt/16);
      ship.vy *= Math.pow(0.995, dt/16);
      ship.x = wrap(ship.x + ship.vx*sec, W);
      ship.y = wrap(ship.y + ship.vy*sec, H);

      // bullets
      for (let i=bullets.length-1;i>=0;i--){
        const b = bullets[i];
        b.life -= sec;
        if (b.missile){
          // homing to nearest rock
          let best = null, bestD = 1e9;
          for (const r of rocks){
            const d = dist2(b.x,b.y,r.x,r.y);
            if (d < bestD){ bestD = d; best = r; }
          }
          if (best){
            const ang = Math.atan2(best.y - b.y, best.x - b.x);
            const sp = Math.hypot(b.vx,b.vy);
            const tx = Math.cos(ang)*Math.max(520, sp);
            const ty = Math.sin(ang)*Math.max(520, sp);
            b.vx += (tx - b.vx) * 2.2 * sec;
            b.vy += (ty - b.vy) * 2.2 * sec;
          }
          // nicer missile trail
          if (Math.random()<0.85) parts.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*70,vy:(Math.random()-0.5)*70,life:0.22+Math.random()*0.18,col:"rgba(255,170,90,0.88)",s:2.2+Math.random()*2.6});
          if (Math.random()<0.35) parts.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*40,vy:(Math.random()-0.5)*40,life:0.18+Math.random()*0.12,col:"rgba(140,170,210,0.75)",s:2+Math.random()*2});
        }
        b.x = wrap(b.x + b.vx*sec, W);
        b.y = wrap(b.y + b.vy*sec, H);
        if (b.life <= 0) bullets.splice(i,1);
      }

      // rocks
      for (const r of rocks){
        r.x = wrap(r.x + r.vx*sec, W);
        r.y = wrap(r.y + r.vy*sec, H);
        r.rot += r.vr*sec;
      }

      // particles
      for (let i=parts.length-1;i>=0;i--){
        const p = parts[i];
        p.life -= sec;
        p.x += p.vx*sec;
        p.y += p.vy*sec;
        p.vx *= 0.99;
        p.vy *= 0.99;
        if (p.life<=0) parts.splice(i,1);
      }

      // collisions bullet vs rock (Polygon)
      for (let bi=bullets.length-1;bi>=0;bi--){
        const b = bullets[bi];
        let hit = false;
        for (let ri=rocks.length-1;ri>=0;ri--){
          const r = rocks[ri];
          // quick reject: radius
          if (dist2(b.x,b.y,r.x,r.y) > (r.r+10)*(r.r+10)) continue;
          const poly = rockWorldPoly(r);
          if (!pointInPoly(b.x,b.y, poly)) continue;
          // hit
          hit = true;
          bullets.splice(bi,1);
          rocks.splice(ri,1);
          const pts = r.size===3 ? 20 : r.size===2 ? 45 : 90;
          score += pts;
          tone(180 + r.size*90, 0.08, "sawtooth", 0.06);
          vibr([12,12,18]);
          shake = Math.min(22, shake + 8 + r.size*2);
          screenFlash = Math.min(1, screenFlash + 0.22);
          burst(r.x,r.y,"rgba(255,215,106,0.9)", 46, 760);
          ring(r.x,r.y,"rgba(34,211,238,0.75)", 18 + r.size*8);
          if (b.missile) {
            // AoE: Raketen sprengen mehrere Steine.
            const R = 120 + r.size * 24;
            for (let rj = rocks.length - 1; rj >= 0; rj--) {
              const rr = rocks[rj];
              if (dist2(r.x, r.y, rr.x, rr.y) > (R + rr.r) * (R + rr.r)) continue;
              rocks.splice(rj, 1);
              const pts2 = rr.size===3 ? 20 : rr.size===2 ? 45 : 90;
              score += pts2;
              burst(rr.x, rr.y, "rgba(255,215,106,0.9)", 26 + rr.size*10, 720);
              if (rr.size > 1) {
                const ns = rr.size - 1;
                for (let k=0;k<2;k++){
                  const a = Math.random()*Math.PI*2;
                  const sp = rand(90, 180) + wave*6;
                  spawnRock(ns, rr.x, rr.y, rr.vx*0.35 + Math.cos(a)*sp, rr.vy*0.35 + Math.sin(a)*sp);
                }
              }
            }
            shake = Math.min(26, shake + 14);
            screenFlash = Math.min(1, screenFlash + 0.28);
            tone(120, 0.14, "sawtooth", 0.08);
            vibr([18, 28, 14, 40]);
            ring(r.x, r.y, "rgba(255,170,90,0.85)", 24);
          }
          // chance pickup
          if (Math.random() < 0.18 + wave*0.01){
            const roll = Math.random();
            const kind = roll < 0.34 ? "rapid" : roll < 0.58 ? "shield" : roll < 0.8 ? "missile" : "spread";
            pickups.push({x:r.x,y:r.y,vx:(Math.random()-0.5)*60,vy:(Math.random()-0.5)*60,life:12,kind});
          }
          if (r.size > 1){
            const ns = r.size - 1;
            for (let k=0;k<2;k++){
              const a = Math.random()*Math.PI*2;
              const sp = rand(90, 180) + wave*6;
              spawnRock(ns, r.x, r.y, r.vx*0.4 + Math.cos(a)*sp, r.vy*0.4 + Math.sin(a)*sp);
            }
          }
          break;
        }
        if (hit) break;
      }

      // pickups update + collect
      for (let i=pickups.length-1;i>=0;i--){
        const p = pickups[i];
        p.life -= sec;
        p.x = wrap(p.x + p.vx*sec, W);
        p.y = wrap(p.y + p.vy*sec, H);
        if (p.life<=0){ pickups.splice(i,1); continue; }
        if (dist2(ship.x,ship.y,p.x,p.y) < 28*28){
          pickups.splice(i,1);
          if (p.kind==="rapid"){
            rapidT = Math.min(18, rapidT + 8);
            showToast("Rapid aktiviert", "rapid");
            tone(740,0.08,"sine",0.06);
            vibr([12,18,12]);
            burst(ship.x,ship.y,"rgba(93,255,180,0.85)", 26, 520);
          } else if (p.kind==="shield"){
            shieldT = Math.min(18, shieldT + 9);
            showToast("Shield online", "shield");
            tone(520,0.08,"triangle",0.06);
            vibr([10,20,10]);
            burst(ship.x,ship.y,"rgba(34,211,238,0.75)", 22, 520);
          } else if (p.kind==="spread"){
            spreadT = Math.min(16, spreadT + 8);
            showToast("Spread aktiviert", "spread");
            tone(988,0.08,"sine",0.055);
            vibr([12,12,20]);
            burst(ship.x,ship.y,"rgba(201,168,255,0.8)", 22, 520);
          } else {
            missileStock = Math.min(5, missileStock + 3);
            showToast("+ Raketen", "missile");
            tone(220,0.1,"triangle",0.05);
            vibr([10,12,10,12]);
            burst(ship.x,ship.y,"rgba(255,170,90,0.85)", 22, 520);
          }
        }
      }

      // ship vs rock (Polygon)
      if (invuln <= 0){
        const spoly = shipPoly();
        for (const r of rocks){
          if (dist2(ship.x,ship.y,r.x,r.y) > (r.r+26)*(r.r+26)) continue;
          const rpoly = rockWorldPoly(r);
          if (!polysIntersect(spoly, rpoly)) continue;
          if (shieldT > 0.1){
            shieldT = Math.max(0, shieldT - 1.8);
            invuln = 1.0;
            shake = Math.min(22, shake + 10);
            screenFlash = Math.min(1, screenFlash + 0.18);
            burst(ship.x,ship.y,"rgba(34,211,238,0.9)", 34, 760);
            tone(520,0.09,"triangle",0.06);
            vibr([30,20,30]);
            break;
          }
          lives--;
            invuln = 1.5;
            ship.vx *= -0.2;
            ship.vy *= -0.2;
            shake = Math.min(30, shake + 20);
            screenFlash = Math.min(1, screenFlash + 0.35);
            burst(ship.x,ship.y,"rgba(255,107,107,0.9)", 76, 980);
            ring(ship.x,ship.y,"rgba(255,215,106,0.75)", 26);
            tone(120,0.16,"sawtooth",0.08);
            vibr([60,40,80]);
            if (lives <= 0){
              running = false;
              showOverlay("Game Over", `Score ${score} · Welle ${wave}`);
            }
            break;
        }
      }

      if (running && rocks.length === 0){
        wave++;
        spawnWave();
        invuln = Math.max(invuln, 0.8);
        tone(740,0.08,"triangle",0.05);
        tone(988,0.10,"sine",0.04);
        vibr([15,15,25]);
      }

      syncHud();
    }

    function draw(now){
      ctx.clearRect(0,0,W,H);
      const sh = shake;
      if (sh > 0.5){
        ctx.save();
        ctx.translate((Math.random()-0.5)*sh, (Math.random()-0.5)*sh);
      } else {
        ctx.save();
      }
      // stars
      ctx.globalAlpha = 0.18;
      for (let i=0;i<110;i++){
        const x = (i*97 + now*0.02) % W;
        const y = (i*173 + now*0.01) % H;
        ctx.fillStyle = i%3 ? "rgba(200,230,255,0.5)" : "rgba(255,255,255,0.35)";
        ctx.fillRect(x, y, 2, 2);
      }
      ctx.globalAlpha = 1;

      // particles
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const p of parts){
        const a = Math.max(0, Math.min(1, p.life*2));
        ctx.globalAlpha = a*0.9;
        ctx.fillStyle = p.col;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();

      // bullets
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const b of bullets){
        if (b.missile){
          const g = ctx.createRadialGradient(b.x-2,b.y-2,2,b.x,b.y,14);
          g.addColorStop(0,"rgba(255,255,255,0.95)");
          g.addColorStop(0.3,"rgba(255,170,90,0.9)");
          g.addColorStop(1,"rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(b.x, b.y, 7.2, 0, Math.PI*2);
          ctx.fill();
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.beginPath();
          ctx.arc(b.x, b.y, 2.6, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.restore();

      // rocks
      for (const r of rocks){
        ctx.save();
        ctx.translate(r.x, r.y);
        ctx.rotate(r.rot);
        ctx.strokeStyle = "rgba(154,208,255,0.75)";
        ctx.lineWidth = 2;
        ctx.shadowColor = "rgba(34,211,238,0.35)";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        const pts = r.pts;
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      // ship
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.ang);
      ctx.globalAlpha = invuln>0 ? 0.45 + 0.35*Math.sin(now*0.02) : 1;
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 2;
      ctx.shadowColor = "rgba(93,255,180,0.25)";
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-12, 10);
      ctx.lineTo(-7, 0);
      ctx.lineTo(-12, -10);
      ctx.closePath();
      ctx.stroke();
      // temporärer Shield‑Ring
      if (shieldT > 0.1) {
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = 0.22 + 0.12*Math.sin(now*0.01);
        ctx.strokeStyle = "rgba(34,211,238,0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, 24, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.restore();

      // pickups
      for (const p of pickups){
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        const col =
          p.kind==="rapid" ? "rgba(93,255,180,0.9)" :
          p.kind==="shield" ? "rgba(34,211,238,0.9)" :
          p.kind==="spread" ? "rgba(201,168,255,0.9)" :
          "rgba(255,170,90,0.9)";
        ctx.fillStyle = col;
        ctx.shadowColor = col;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.75;
        ctx.strokeStyle = col;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 14, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }

      // flash
      if (screenFlash > 0.02){
        ctx.fillStyle = `rgba(255, 215, 106, ${screenFlash*0.18})`;
        ctx.fillRect(0,0,W,H);
      }

      ctx.restore(); // shake save
    }

    function loop(now){
      if (!running || paused) return;
      const dt = Math.min(40, now - (lastT || now));
      lastT = now;
      update(dt);
      draw(now);
      raf = requestAnimationFrame(loop);
    }

    function start(){
      hideOverlay();
      if (!running){
        running = true;
        paused = false;
        if (pauseOv) pauseOv.classList.remove("show");
        lastT = 0;
        raf = requestAnimationFrame(loop);
      }
    }

    window.addEventListener("keydown", (e)=>{
      const block = ["ArrowLeft","ArrowRight","ArrowUp","Space","ShiftLeft","ShiftRight","KeyW","KeyA","KeyD","KeyE"];
      if (e.code === "Escape") {
        if (running) showPause(!paused);
        // prevent stuck movement keys after pause toggle
        keys.clear();
        return;
      }
      if (block.includes(e.code)) e.preventDefault();
      keys.add(e.code);
      if (e.code === "Space" && running) shoot();
      if (e.code === "KeyE" && running && !paused) fireMissile();
    });
    window.addEventListener("keyup", (e)=> keys.delete(e.code));

    btnStart.addEventListener("click", start);
    btnReset.addEventListener("click", ()=>{ resetGame(); start(); });
    ovAgain.addEventListener("click", ()=>{ resetGame(); start(); });
    ovClose.addEventListener("click", ()=>{ hideOverlay(); });
    ov.addEventListener("click", (e)=>{ if (e.target === ov) hideOverlay(); });

    if (btnResume) btnResume.addEventListener("click", ()=> showPause(false));
    if (btnMenu) btnMenu.addEventListener("click", ()=>{ showPause(false); resetGame(); start(); });
    if (pauseOv) pauseOv.addEventListener("click", (e)=>{ if (e.target === pauseOv) showPause(false); });

    resetGame();
  </script>
</body>
</html>
