<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Minesweeper · thomas.fun</title>
  <meta name="description" content="Minesweeper im Browser — Touch/Mouse, Bestzeiten, First‑Click‑Safe." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;
      --accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;
      --cell:#0f1220;--cell2:#0b0e18;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(1100px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{
      background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)
    }
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button, select{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;min-height:44px
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    button:disabled{opacity:.45;cursor:not-allowed}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}

    .boardWrap{display:grid;gap:12px;margin-top:12px;place-items:center}
    .board{
      width: min(860px, 92vw);
      border-radius:22px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(760px 520px at 50% 0%, rgba(34,211,238,.12), rgba(0,0,0,.15)),
        linear-gradient(165deg, rgba(10,12,22,.9), rgba(0,0,0,.25));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 18px 50px rgba(0,0,0,.45);
      padding: 12px;
      touch-action: none;
      user-select:none;
    }
    .grid{
      display:grid;
      gap: 8px;
      align-items:stretch;
    }
    .cell{
      display:grid;
      place-items:center;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(165deg, rgba(0,0,0,.18), rgba(0,0,0,.28));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      font-weight:1000;
      letter-spacing: .02em;
      color: rgba(255,255,255,.92);
      min-width: 34px;
      min-height: 34px;
      padding: 0;
      cursor: pointer;
      position:relative;
      overflow:hidden;
    }
    .cell:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
    .cell.revealed{
      cursor: default;
      background: linear-gradient(165deg, rgba(255,255,255,.07), rgba(0,0,0,.24));
      border-color: rgba(255,255,255,.12);
    }
    .cell.flagged:not(.revealed)::after{
      content:"🚩";
      font-size: 1.05rem;
      transform: translateY(-1px);
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45));
    }
    .cell.mine.revealed{
      background: radial-gradient(120px 90px at 50% 30%, rgba(255,107,107,.24), rgba(0,0,0,.26));
      border-color: rgba(255,107,107,.35);
    }
    .cell.boom.revealed{
      background: radial-gradient(120px 90px at 50% 30%, rgba(255,107,107,.30), rgba(0,0,0,.35));
      box-shadow: 0 0 0 1px rgba(255,107,107,.18), 0 22px 60px rgba(255,107,107,.12), inset 0 1px 0 rgba(255,255,255,.06);
    }
    .n1{color:#7dd3fc}
    .n2{color:#86efac}
    .n3{color:#fca5a5}
    .n4{color:#c4b5fd}
    .n5{color:#fdba74}
    .n6{color:#67e8f9}
    .n7{color:#e9d5ff}
    .n8{color:#f5f5f5}

    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{
      width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;text-align:center
    }
    .panel h2{margin:0;font-size:clamp(1.9rem,6vw,2.6rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:800}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

    @media (max-width: 520px){
      .grid{gap:7px}
      .board{padding:10px}
      .cell{min-width: 32px; min-height: 32px; border-radius: 12px}
    }
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Minesweeper</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnNew">Neues Spiel</button>
          <select id="selDiff" aria-label="Schwierigkeit">
            <option value="easy">Easy · 9×9 · 10</option>
            <option value="med">Medium · 16×16 · 40</option>
            <option value="hard">Hard · 30×16 · 99</option>
          </select>
          <button id="btnFlag" type="button" aria-pressed="false" title="Flag‑Mode (hilft auf Handy)">🚩 Flag‑Mode</button>
        </div>
        <div class="meta">
          <span class="pill" id="mLeft">Minen: —</span>
          <span class="pill" id="time">Zeit: 0.0s</span>
          <span class="pill" id="best">Best: —</span>
        </div>
      </div>

      <div class="boardWrap">
        <div class="board" id="board">
          <div class="grid" id="grid" role="grid" aria-label="Minesweeper Feld"></div>
        </div>
        <div class="hint" id="hint">
          Links: aufdecken · Rechts/Long‑Press: Flagge · Zahl antippen (wenn Flags passen): öffnet Nachbarn
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">—</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="btnAgain">Nochmal</button>
        <button id="btnClose">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      // --- tiny audio helpers (same vibe as other games, but minimal) ---
      let AC = null;
      function ctx(){
        if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
        return AC;
      }
      function tone(freq, dur=0.08, type="sine", vol=0.07){
        try{
          const ac = ctx();
          const o = ac.createOscillator();
          const g = ac.createGain();
          o.type = type;
          o.frequency.value = freq;
          g.gain.value = 0.0001;
          o.connect(g); g.connect(ac.destination);
          const t = ac.currentTime;
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
          o.start(t);
          o.stop(t + dur + 0.02);
        }catch{}
      }
      const vib = (ms)=> { try{ if (navigator.vibrate) navigator.vibrate(ms); } catch{} };

      // --- UI refs ---
      const gridEl = document.getElementById("grid");
      const boardEl = document.getElementById("board");
      const btnNew = document.getElementById("btnNew");
      const selDiff = document.getElementById("selDiff");
      const btnFlag = document.getElementById("btnFlag");
      const mLeftEl = document.getElementById("mLeft");
      const timeEl = document.getElementById("time");
      const bestEl = document.getElementById("best");
      const overlay = document.getElementById("overlay");
      const ovTitle = document.getElementById("ovTitle");
      const ovText = document.getElementById("ovText");
      const btnAgain = document.getElementById("btnAgain");
      const btnClose = document.getElementById("btnClose");

      // --- game state ---
      const DIFFS = {
        easy: { w: 9,  h: 9,  mines: 10 },
        med:  { w: 16, h: 16, mines: 40 },
        hard: { w: 30, h: 16, mines: 99 },
      };
      let diffKey = "easy";
      let W=9, H=9, MINES=10;
      let started = false;
      let ended = false;
      let flagMode = false;
      let t0 = 0;
      let tHandle = 0;

      let cells = []; // {mine, n, revealed, flagged}
      let firstSafe = null; // {x,y}

      function idx(x,y){ return y*W + x; }
      function inb(x,y){ return x>=0 && y>=0 && x<W && y<H; }
      function neighbors(x,y){
        const out = [];
        for (let dy=-1; dy<=1; dy++){
          for (let dx=-1; dx<=1; dx++){
            if (!dx && !dy) continue;
            const nx=x+dx, ny=y+dy;
            if (inb(nx,ny)) out.push({x:nx,y:ny});
          }
        }
        return out;
      }
      function bestKey(){ return `ms_best_${diffKey}`; }
      function loadBest(){
        const v = +localStorage.getItem(bestKey());
        if (!v || !isFinite(v)) return null;
        return v;
      }
      function fmtTime(ms){
        const s = ms/1000;
        return s.toFixed(1) + "s";
      }
      function updateBestUI(){
        const b = loadBest();
        bestEl.textContent = b ? `Best: ${fmtTime(b)}` : "Best: —";
      }
      function setOverlay(show){
        overlay.classList.toggle("show", !!show);
        overlay.setAttribute("aria-hidden", show ? "false" : "true");
      }

      function stopTimer(){
        if (tHandle) cancelAnimationFrame(tHandle);
        tHandle = 0;
      }
      function tick(){
        if (!started || ended) return;
        const now = performance.now();
        timeEl.textContent = `Zeit: ${((now - t0)/1000).toFixed(1)}s`;
        tHandle = requestAnimationFrame(tick);
      }
      function startTimer(){
        if (started) return;
        started = true;
        t0 = performance.now();
        tick();
      }

      function setFlagMode(on){
        flagMode = !!on;
        btnFlag.setAttribute("aria-pressed", flagMode ? "true" : "false");
        btnFlag.style.borderColor = flagMode ? "rgba(34,211,238,.45)" : "rgba(255,255,255,.12)";
        btnFlag.style.boxShadow = flagMode ? "0 0 22px rgba(34,211,238,.10)" : "none";
      }

      function buildEmpty(){
        cells = new Array(W*H).fill(0).map(()=>({ mine:false, n:0, revealed:false, flagged:false }));
        gridEl.innerHTML = "";
        gridEl.style.gridTemplateColumns = `repeat(${W}, 1fr)`;
        // keep cells big enough on mobile: derive from available width
        // (CSS min sizes handle the rest)
        for (let y=0; y<H; y++){
          for (let x=0; x<W; x++){
            const b = document.createElement("button");
            b.className = "cell";
            b.type = "button";
            b.setAttribute("role","gridcell");
            b.dataset.x = x;
            b.dataset.y = y;
            b.setAttribute("aria-label", `Zelle ${x+1}/${y+1}`);
            gridEl.appendChild(b);
          }
        }
      }

      function placeMines(firstX, firstY){
        // first-click safe area: 3x3 around the click
        const forbidden = new Set();
        for (let dy=-1; dy<=1; dy++){
          for (let dx=-1; dx<=1; dx++){
            const x = firstX+dx, y = firstY+dy;
            if (inb(x,y)) forbidden.add(idx(x,y));
          }
        }
        let placed = 0;
        while (placed < MINES){
          const x = (Math.random()*W)|0;
          const y = (Math.random()*H)|0;
          const i = idx(x,y);
          if (forbidden.has(i)) continue;
          if (cells[i].mine) continue;
          cells[i].mine = true;
          placed++;
        }
        // numbers
        for (let y=0; y<H; y++){
          for (let x=0; x<W; x++){
            const c = cells[idx(x,y)];
            if (c.mine) { c.n = 0; continue; }
            let n = 0;
            for (const nb of neighbors(x,y)) if (cells[idx(nb.x, nb.y)].mine) n++;
            c.n = n;
          }
        }
      }

      function minesLeft(){
        let flags = 0;
        for (const c of cells) if (c.flagged) flags++;
        return Math.max(0, MINES - flags);
      }
      function updateMeta(){
        mLeftEl.textContent = `Minen: ${minesLeft()}`;
        if (!started) timeEl.textContent = "Zeit: 0.0s";
        updateBestUI();
      }

      function cellEl(x,y){
        return gridEl.children[idx(x,y)];
      }

      function renderCell(x,y){
        const c = cells[idx(x,y)];
        const el = cellEl(x,y);
        el.classList.toggle("revealed", c.revealed);
        el.classList.toggle("flagged", c.flagged);
        el.classList.toggle("mine", c.mine);
        el.classList.toggle("boom", false);
        el.textContent = "";
        el.className = el.className.replace(/\bn[1-8]\b/g, "").trim();
        if (c.revealed){
          if (c.mine){
            el.textContent = "💣";
          } else if (c.n > 0){
            el.textContent = String(c.n);
            el.classList.add("n"+c.n);
          }
        }
      }
      function renderAll(){
        for (let y=0; y<H; y++) for (let x=0; x<W; x++) renderCell(x,y);
      }

      function revealFlood(startX, startY){
        const stack = [{x:startX, y:startY}];
        while (stack.length){
          const {x,y} = stack.pop();
          const c = cells[idx(x,y)];
          if (c.revealed || c.flagged) continue;
          c.revealed = true;
          renderCell(x,y);
          if (c.n === 0 && !c.mine){
            for (const nb of neighbors(x,y)){
              const cc = cells[idx(nb.x, nb.y)];
              if (!cc.revealed && !cc.flagged) stack.push(nb);
            }
          }
        }
      }

      function countRevealedSafe(){
        let r = 0;
        for (const c of cells) if (!c.mine && c.revealed) r++;
        return r;
      }
      function totalSafe(){ return W*H - MINES; }

      function endGame(win, boomX=null, boomY=null){
        ended = true;
        stopTimer();
        // reveal all mines (and optionally mark boom)
        for (let y=0; y<H; y++){
          for (let x=0; x<W; x++){
            const c = cells[idx(x,y)];
            if (c.mine) c.revealed = true;
          }
        }
        renderAll();
        if (!win && boomX!=null){
          const el = cellEl(boomX, boomY);
          el.classList.add("boom");
        }

        const t = started ? (performance.now() - t0) : 0;
        if (win){
          tone(740, 0.07, "triangle", 0.08);
          setTimeout(()=>tone(980, 0.09, "triangle", 0.08), 90);
          vib(18);
          const prev = loadBest();
          if (!prev || t < prev){
            localStorage.setItem(bestKey(), String(Math.round(t)));
          }
          ovTitle.textContent = "Gewonnen!";
          ovText.textContent = `Zeit: ${fmtTime(t)} · Nice.`;
        } else {
          tone(140, 0.12, "sawtooth", 0.09);
          vib(40);
          ovTitle.textContent = "Boom.";
          ovText.textContent = "Du hast eine Mine erwischt.";
        }
        updateMeta();
        setOverlay(true);
      }

      function chord(x,y){
        const c = cells[idx(x,y)];
        if (!c.revealed || c.mine || c.n <= 0) return;
        let flags = 0;
        const nbs = neighbors(x,y);
        for (const nb of nbs) if (cells[idx(nb.x, nb.y)].flagged) flags++;
        if (flags !== c.n) return;
        for (const nb of nbs){
          const cc = cells[idx(nb.x, nb.y)];
          if (!cc.flagged && !cc.revealed){
            reveal(nb.x, nb.y);
            if (ended) return;
          }
        }
      }

      function toggleFlag(x,y){
        if (ended) return;
        const c = cells[idx(x,y)];
        if (c.revealed) { chord(x,y); return; }
        c.flagged = !c.flagged;
        renderCell(x,y);
        updateMeta();
        tone(c.flagged ? 520 : 440, 0.05, "square", 0.05);
        vib(8);
      }

      function reveal(x,y){
        if (ended) return;
        const c = cells[idx(x,y)];
        if (c.flagged) return;
        if (!started){
          firstSafe = {x,y};
          placeMines(x,y);
          startTimer();
          updateMeta();
        }
        if (c.revealed) { chord(x,y); return; }
        if (c.mine){
          c.revealed = true;
          renderCell(x,y);
          endGame(false, x, y);
          return;
        }
        // normal reveal
        revealFlood(x,y);
        tone(660, 0.035, "triangle", 0.04);
        if (countRevealedSafe() >= totalSafe()){
          endGame(true);
        }
      }

      function newGame(){
        const d = DIFFS[diffKey];
        W = d.w; H = d.h; MINES = d.mines;
        started = false;
        ended = false;
        firstSafe = null;
        stopTimer();
        setOverlay(false);
        setFlagMode(false);
        buildEmpty();
        updateMeta();
      }

      // --- input ---
      // We implement: left click = reveal, right click = flag.
      // On touch: tap does what current mode says (reveal / flag), long-press always flags.
      let longPressT = 0;
      let longPressFired = false;
      let downXY = null;

      function posFromTarget(t){
        if (!t || !t.classList || !t.classList.contains("cell")) return null;
        const x = +t.dataset.x, y = +t.dataset.y;
        if (!inb(x,y)) return null;
        return {x,y};
      }

      gridEl.addEventListener("contextmenu", (e) => {
        const p = posFromTarget(e.target);
        if (!p) return;
        e.preventDefault();
        toggleFlag(p.x, p.y);
      });

      gridEl.addEventListener("pointerdown", (e) => {
        const p = posFromTarget(e.target);
        if (!p) return;
        downXY = p;
        longPressFired = false;
        if (e.pointerType === "touch"){
          longPressT = window.setTimeout(() => {
            longPressFired = true;
            toggleFlag(p.x, p.y);
          }, 420);
        }
      });
      gridEl.addEventListener("pointerup", (e) => {
        if (longPressT) { clearTimeout(longPressT); longPressT = 0; }
        const p = downXY;
        downXY = null;
        if (!p) return;
        if (ended) return;
        if (longPressFired) return;
        // mouse: only react on primary button; touch: always
        if (e.pointerType === "mouse" && e.button !== 0) return;
        if (flagMode && e.pointerType !== "mouse"){
          toggleFlag(p.x, p.y);
        } else if (flagMode && e.pointerType === "mouse"){
          // mouse users can still left click in flag mode (useful), right click always flags anyway
          toggleFlag(p.x, p.y);
        } else {
          reveal(p.x, p.y);
        }
        updateMeta();
      });
      gridEl.addEventListener("pointercancel", () => {
        if (longPressT) { clearTimeout(longPressT); longPressT = 0; }
        downXY = null;
      });

      btnFlag.addEventListener("click", () => setFlagMode(!flagMode));
      btnNew.addEventListener("click", newGame);
      btnAgain.addEventListener("click", () => { setOverlay(false); newGame(); });
      btnClose.addEventListener("click", () => setOverlay(false));
      overlay.addEventListener("click", (e) => { if (e.target === overlay) setOverlay(false); });

      selDiff.addEventListener("change", () => {
        diffKey = selDiff.value;
        updateBestUI();
        newGame();
      });

      // keyboard helpers
      window.addEventListener("keydown", (e) => {
        if (e.code === "KeyR") { e.preventDefault(); newGame(); }
        if (e.code === "KeyF") { e.preventDefault(); setFlagMode(!flagMode); }
        if (e.code === "Escape") { if (overlay.classList.contains("show")) setOverlay(false); }
      });

      // init
      diffKey = selDiff.value;
      newGame();
    })();
  </script>
</body>
</html>
