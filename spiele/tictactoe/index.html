<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <title>Tic‑Tac‑Toe · thomas.fun</title>
  <meta name="description" content="Tic-Tac-Toe gegen einen soliden Bot oder 2-Spieler." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--card:#16161c;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;
      --accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;--bad:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(940px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    button,select{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:800;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    button:disabled{opacity:.45;cursor:not-allowed}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(420px,90vw);margin:12px auto 0}
    .cell{
      aspect-ratio:1/1;border-radius:18px;border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(220px 220px at 50% 30%, rgba(34,211,238,.12), rgba(0,0,0,.22));
      display:grid;place-items:center;font-size:clamp(2.2rem,9vw,3.4rem);font-weight:1000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06); user-select:none;
      touch-action: manipulation;
    }
    .cell:hover{border-color:rgba(154,208,255,.4)}
    .x{color:var(--accent2);text-shadow:0 0 18px rgba(34,211,238,.25)}
    .o{color:var(--accent);text-shadow:0 0 18px rgba(249,115,22,.22)}
    .win{outline:2px solid rgba(93,255,180,.75);outline-offset:2px}
    .hint{margin:10px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{
      position:fixed; inset:0; display:none; place-items:center; z-index:10;
      background: radial-gradient(900px 520px at 50% 30%, rgba(34,211,238,.10), rgba(0,0,0,.72));
      backdrop-filter: blur(6px);
    }
    .overlay.show{display:grid; animation: fadeIn .18s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .panel{
      width:min(560px,92vw);
      border-radius:22px;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow: 0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;
      transform: translateY(10px) scale(.98);
      animation: pop .22s cubic-bezier(.2,.8,.2,1) forwards;
      position:relative;
      overflow:hidden;
    }
    @keyframes pop{to{transform: translateY(0) scale(1)}}
    .big{
      margin:0;
      font-size: clamp(2.1rem, 7vw, 3rem);
      font-weight: 1000;
      letter-spacing: .02em;
      text-align:center;
      text-shadow: 0 0 32px rgba(255,255,255,.12);
    }
    .sub{
      margin:10px 0 14px;
      text-align:center;
      color: rgba(180,200,230,.9);
      font-weight: 700;
    }
    .cta{display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
    .panel::before{
      content:""; position:absolute; inset:-40%;
      background: conic-gradient(from 90deg, rgba(93,255,180,.0), rgba(93,255,180,.35), rgba(249,115,22,.35), rgba(34,211,238,.35), rgba(93,255,180,.0));
      opacity:.16; filter: blur(28px);
      animation: spin 3.2s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .panel > *{position:relative}
    .shake{animation: shake .38s ease}
    @keyframes shake{
      0%,100%{transform: translateY(0) scale(1)}
      15%{transform: translateY(-1px) translateX(-6px) rotate(-.6deg)}
      35%{transform: translateY(0) translateX(6px) rotate(.6deg)}
      60%{transform: translateY(1px) translateX(-4px) rotate(-.4deg)}
      80%{transform: translateY(0) translateX(3px) rotate(.3deg)}
    }
    canvas.fx{position:fixed; inset:0; pointer-events:none; z-index:11}
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Tic‑Tac‑Toe</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="row">
        <div class="controls">
          <button class="primary" id="btnRestart">Neues Spiel</button>
          <select id="mode">
            <option value="bot">gegen Bot</option>
            <option value="pvp">2‑Spieler</option>
          </select>
          <select id="botLevel">
            <option value="easy">Bot: easy</option>
            <option value="normal" selected>Bot: normal</option>
            <option value="hard">Bot: hard</option>
          </select>
          <span class="pill" id="netStat">Offline</span>
          <input id="room" placeholder="Room (z.B. SCHULE1)" style="width:170px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:var(--text);font-weight:900;letter-spacing:.12em;text-transform:uppercase" />
          <button id="btnHost" type="button">Host</button>
          <button id="btnJoin" type="button">Join</button>
          <input id="playerName" placeholder="Name" maxlength="18" style="width:110px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:var(--text);font-weight:700" />
          <button type="button" class="btn-ready-online" id="btnReady">Ready</button>
        </div>
        <div class="meta">
          <span class="pill" id="turnPill">Zug: X</span>
          <span class="pill" id="scorePill">X 0 · 0 O</span>
        </div>
      </div>
      <div class="meta" id="lobbyBox" style="display:none;margin:6px 0 0;font-weight:800" aria-live="polite"></div>
      <div class="grid" id="grid" aria-label="Tic Tac Toe Feld"></div>
      <div class="hint" id="hint">Klicke ein Feld. X startet.</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel" id="panel">
      <h2 class="big" id="ovTitle">—</h2>
      <p class="sub" id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Weiter spielen</button>
      </div>
    </div>
  </div>
  <canvas class="fx" id="fx"></canvas>

  <script>
    const grid = document.getElementById("grid");
    const hint = document.getElementById("hint");
    const turnPill = document.getElementById("turnPill");
    const scorePill = document.getElementById("scorePill");
    const btnRestart = document.getElementById("btnRestart");
    const modeSel = document.getElementById("mode");
    const botLevelSel = document.getElementById("botLevel");
    const netStat = document.getElementById("netStat");
    const roomInp = document.getElementById("room");
    const btnHost = document.getElementById("btnHost");
    const btnJoin = document.getElementById("btnJoin");

    const LSK = "tictactoe-score-v1";
    const score = (() => { try { return JSON.parse(localStorage.getItem(LSK)) || {x:0,o:0}; } catch { return {x:0,o:0}; }})();
    const saveScore = () => { try { localStorage.setItem(LSK, JSON.stringify(score)); } catch {} };

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let b = Array(9).fill("");
    let turn = "x";
    let over = false;
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");
    const panel = document.getElementById("panel");
    const fx = document.getElementById("fx");
    const fctx = fx.getContext("2d");
    let conf = [];
    let confRaf = 0;
    let ws = null;
    let online = false;
    let mySide = "X"; // X/O
    let connecting = false;
    let netAllowMoves = false;
    let imReady = false;

    function setLobbyJoined(joined){
      btnHost.style.display = joined ? "none" : "";
      btnJoin.style.display = joined ? "none" : "";
    }
    function setConnecting(on){
      connecting = !!on;
      btnHost.disabled = connecting;
      btnJoin.disabled = connecting;
    }

    function fitFx(){
      fx.width = innerWidth * devicePixelRatio;
      fx.height = innerHeight * devicePixelRatio;
      fx.style.width = innerWidth + "px";
      fx.style.height = innerHeight + "px";
      fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }
    addEventListener("resize", fitFx);
    fitFx();

    // Tiny WebAudio "stingers"
    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.14, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    function vibr(pattern){ if (navigator.vibrate) navigator.vibrate(pattern); }

    function burstConfetti(kind){
      conf = [];
      const cx = innerWidth/2, cy = innerHeight*0.35;
      const n = kind==="win" ? 120 : kind==="lose" ? 90 : 110;
      const cols = kind==="win" ? ["#5dffb4","#22d3ee","#f97316","#ffffff"] :
                   kind==="lose" ? ["#ff6b6b","#ff2d55","#22d3ee","#ffffff"] :
                   ["#ffd76a","#22d3ee","#c9a8ff","#ffffff"];
      for (let i=0;i<n;i++){
        const a = (Math.PI*2*i)/n + (Math.random()-0.5)*0.8;
        const sp = (kind==="lose"? 240: 340) + Math.random()*340;
        conf.push({
          x: cx + (Math.random()-0.5)*40,
          y: cy + (Math.random()-0.5)*20,
          vx: Math.cos(a)*sp,
          vy: Math.sin(a)*sp - 120,
          r: 2 + Math.random()*4,
          rot: Math.random()*Math.PI,
          vr: (Math.random()-0.5)*10,
          life: 0.9 + Math.random()*0.7,
          col: cols[Math.floor(Math.random()*cols.length)],
        });
      }
      if (!confRaf) confRaf = requestAnimationFrame(stepConf);
    }
    function stepConf(now){
      fctx.clearRect(0,0,innerWidth,innerHeight);
      const dt = 1/60;
      for (let i=conf.length-1;i>=0;i--){
        const p = conf[i];
        p.life -= dt;
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.vy += 520*dt;
        p.vx *= 0.995;
        p.rot += p.vr*dt;
        if (p.life <= 0 || p.y > innerHeight+80) conf.splice(i,1);
      }
      fctx.globalCompositeOperation = "lighter";
      for (const p of conf){
        const a = Math.max(0, Math.min(1, p.life));
        fctx.globalAlpha = a;
        fctx.fillStyle = p.col;
        fctx.save();
        fctx.translate(p.x,p.y);
        fctx.rotate(p.rot);
        fctx.fillRect(-p.r, -p.r, p.r*2, p.r*2);
        fctx.restore();
      }
      fctx.globalAlpha = 1;
      if (conf.length) confRaf = requestAnimationFrame(stepConf);
      else { confRaf = 0; fctx.clearRect(0,0,innerWidth,innerHeight); }
    }

    function showOverlay(kind, title, text){
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
      ovTitle.textContent = title;
      ovText.textContent = text;
      panel.classList.remove("shake");
      void panel.offsetWidth;
      if (kind==="lose") panel.classList.add("shake");
      burstConfetti(kind);
      if (kind==="win"){
        tone(740,0.09,"sine",0.06); setTimeout(()=>tone(988,0.12,"sine",0.05),60); setTimeout(()=>tone(1244,0.14,"triangle",0.04),130);
        vibr([30,40,30,70]);
      } else if (kind==="lose"){
        tone(180,0.18,"sawtooth",0.07); setTimeout(()=>tone(110,0.2,"square",0.05),70);
        vibr([60,40,80]);
      } else {
        tone(520,0.12,"triangle",0.05); setTimeout(()=>tone(392,0.12,"sine",0.04),70);
        vibr([25,25,25]);
      }
    }
    function hideOverlay(){
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
    }
    ov.addEventListener("click", (e)=>{ if (e.target === ov) hideOverlay(); });
    ovAgain.addEventListener("click", ()=>{
      hideOverlay();
      if (online && ws && ws.readyState === 1){
        ws.send(JSON.stringify({t:"reset"}));
      } else {
        newGame();
      }
    });
    ovClose.addEventListener("click", hideOverlay);


    function render() {
      grid.innerHTML = "";
      for (let i=0;i<9;i++){
        const el = document.createElement("button");
        el.className = "cell";
        el.type = "button";
        el.setAttribute("aria-label", `Feld ${i+1}`);
        const v = b[i];
        el.disabled = over || !!v || (online && (!netAllowMoves || turn.toUpperCase() !== mySide));
        if (v) {
          el.textContent = v.toUpperCase();
          el.classList.add(v === "x" ? "x" : "o");
        } else el.textContent = "";
        el.addEventListener("click", () => playerMove(i));
        grid.appendChild(el);
      }
      if (!online){
        scorePill.textContent = `X ${score.x} · ${score.o} O`;
      } else {
        scorePill.textContent = `X ${netScoreX} · ${netScoreO} O`;
      }
      turnPill.textContent = online ? `Zug: ${turn.toUpperCase()} (Du: ${mySide})` : `Zug: ${turn.toUpperCase()}`;
      botLevelSel.disabled = modeSel.value !== "bot" || online;
      modeSel.disabled = online;
    }

    function winner(board){
      for (const line of WINS){
        const [a,c,d] = line;
        if (board[a] && board[a] === board[c] && board[a] === board[d]) return {w: board[a], line};
      }
      if (board.every(Boolean)) return {w: "draw", line: []};
      return null;
    }

    function end(res){
      over = true;
      if (res.w === "draw") hint.textContent = "Unentschieden.";
      else {
        hint.textContent = `${res.w.toUpperCase()} gewinnt!`;
        if (res.w === "x") score.x++; else score.o++;
        saveScore();
        const cells = [...grid.children];
        for (const idx of res.line) cells[idx]?.classList.add("win");
      }
      render();
      if (res.w === "draw") showOverlay("draw", "Unentschieden", "GG. Nochmal?");
      else if (res.w === "x") showOverlay("win", "Sieg", "Du hast gewonnen.");
      else showOverlay("lose", "Niederlage", "Der Bot war diesmal besser.");
    }

    function switchTurn(){ turn = turn === "x" ? "o" : "x"; }

    function playerMove(i){
      if (over || b[i]) return;
      if (online){
        if (!ws || ws.readyState !== 1) return;
        ws.send(JSON.stringify({t:"move", i}));
        return;
      }
      b[i] = turn;
      const res = winner(b);
      if (res) return end(res);
      switchTurn();
      render();
      if (modeSel.value === "bot" && turn === "o") {
        setTimeout(botMove, 140);
      }
    }

    function botMove(){
      if (over || turn !== "o") return;
      const move = pickBotMove(botLevelSel.value);
      if (move == null) return;
      b[move] = "o";
      const res = winner(b);
      if (res) return end(res);
      turn = "x";
      render();
      hint.textContent = "Dein Zug.";
    }

    function emptyIdx(board){ return board.map((v,i)=>v?null:i).filter(v=>v!=null); }

    // hard: minimax, normal: win/block + center + random, easy: random
    function pickBotMove(level){
      const empties = emptyIdx(b);
      if (!empties.length) return null;
      if (level === "easy") return empties[Math.floor(Math.random()*empties.length)];
      if (level === "normal") {
        const win = findImmediate("o"); if (win != null) return win;
        const block = findImmediate("x"); if (block != null) return block;
        if (!b[4]) return 4;
        const corners = [0,2,6,8].filter(i=>!b[i]);
        if (corners.length && Math.random()<0.8) return corners[Math.floor(Math.random()*corners.length)];
        return empties[Math.floor(Math.random()*empties.length)];
      }
      return minimaxBestMove(b, "o").move;
    }

    function findImmediate(p){
      for (const i of emptyIdx(b)){
        const bb = b.slice(); bb[i]=p;
        const res = winner(bb);
        if (res && res.w === p) return i;
      }
      return null;
    }

    function minimaxBestMove(board, player){
      const res = winner(board);
      if (res) {
        if (res.w === "o") return {score: 10, move: null};
        if (res.w === "x") return {score: -10, move: null};
        return {score: 0, move: null};
      }
      const moves = [];
      for (const i of emptyIdx(board)){
        const bb = board.slice();
        bb[i] = player;
        const next = minimaxBestMove(bb, player === "o" ? "x" : "o");
        moves.push({move:i, score: next.score});
      }
      // Bot (o) maximiert, X minimiert
      moves.sort((a,b)=> player==="o" ? b.score-a.score : a.score-b.score);
      return moves[0];
    }

    function newGame(){
      b = Array(9).fill("");
      turn = "x";
      over = false;
      hint.textContent = "Klicke ein Feld. X startet.";
      hideOverlay();
      render();
    }

    // --- Online (TicTacToe) ---
    let netScoreX = 0;
    let netScoreO = 0;
    function setNetLabel(txt, ok=false){
      netStat.textContent = txt;
      netStat.style.borderColor = ok ? "rgba(93,255,180,.35)" : "rgba(255,255,255,.14)";
      netStat.style.color = ok ? "rgba(93,255,180,.95)" : "rgba(255,255,255,.85)";
    }
    function defaultWsUrl(){ return "wss://thomas-projekte.onrender.com"; }
    function normalizeWsUrl(u){ return String(u||"").trim().replace(/^http/i,"ws"); }

    function applyNetState(s){
      if (!s) return;
      if (Array.isArray(s.b) && s.b.length === 9){
        b = s.b.map(v => (v === "X" || v === "O") ? v.toLowerCase() : "");
      }
      if (s.turn === "X" || s.turn === "O") turn = s.turn.toLowerCase();
      over = !!s.over;
      netScoreX = Number(s.sX||0);
      netScoreO = Number(s.sO||0);
      if (typeof s.allowMoves === "boolean") netAllowMoves = s.allowMoves;
      render();
      if (!over) {
        hint.textContent = online
          ? (netAllowMoves ? "Online: mach deinen Zug." : "Beide Ready — dann geht's los.")
          : hint.textContent;
      }
    }

    function connect(code){
      const url = normalizeWsUrl(defaultWsUrl());
      const c = (code || "").trim().toUpperCase();
      try { ws && ws.close(); } catch {}
      ws = null;
      online = true;
      setConnecting(true);
      setNetLabel("Verbinden…");
      hint.textContent = "Online: verbinden…";

      ws = new WebSocket(url);
      ws.addEventListener("open", ()=>{
        setNetLabel("Connected", true);
        const nm = (document.getElementById("playerName")?.value || "").trim().slice(0, 18);
        ws.send(JSON.stringify({ t: "join", game: "ttt", code: c, name: nm }));
      });
      ws.addEventListener("close", ()=>{
        setNetLabel("Offline");
        online = false;
        setConnecting(false);
        setLobbyJoined(false);
        mySide = "X";
        netAllowMoves = false;
        imReady = false;
        const lb = document.getElementById("lobbyBox");
        if (lb) lb.style.display = "none";
        const br = document.getElementById("btnReady");
        if (br) {
          br.textContent = "Ready";
          br.classList.remove("is-ready");
        }
        modeSel.disabled = false;
        botLevelSel.disabled = (modeSel.value !== "bot");
        hint.textContent = "Klicke ein Feld. X startet.";
        render();
      });
      ws.addEventListener("error", ()=> setNetLabel("Fehler"));
      ws.addEventListener("message", (ev)=>{
        let msg=null;
        try{ msg = JSON.parse(ev.data); }catch{}
        if (!msg) return;
        if (msg.t === "err"){ setNetLabel(msg.m || "Fehler"); return; }
        if (msg.t === "joined"){
          mySide = msg.side || "X";
          roomInp.value = (msg.code || "").toUpperCase();
          setNetLabel(`Online · ${roomInp.value} · Du: ${mySide}`, true);
          setConnecting(false);
          setLobbyJoined(true);
          const lb = document.getElementById("lobbyBox");
          if (lb) lb.style.display = "block";
          // reset local board visuals; server state will arrive
          b = Array(9).fill("");
          turn = "x";
          over = false;
          netAllowMoves = false;
          hideOverlay();
          render();
          return;
        }
        if (msg.t === "lobby"){
          const roster = Array.isArray(msg.roster) ? msg.roster : [];
          const lb = document.getElementById("lobbyBox");
          if (lb){
            lb.style.display = "block";
            lb.textContent = roster.length
              ? "Raum: " + roster.map((r) => `${r.side}${r.name ? " " + r.name : ""}:${r.ready ? "✓" : "…"}`).join(" · ")
              : `Verbunden: ${msg.peers || 0}`;
          }
          const me = roster.find((r) => String(r.side) === String(mySide));
          if (me) imReady = !!me.ready;
          const br = document.getElementById("btnReady");
          if (br) {
            br.textContent = imReady ? "Nicht ready" : "Ready";
            br.classList.toggle("is-ready", imReady);
          }
          return;
        }
        if (msg.t === "state" && msg.game === "ttt"){
          applyNetState(msg.s);
          return;
        }
        if (msg.t === "over" && msg.game === "ttt"){
          netScoreX = Number(msg.sX||netScoreX||0);
          netScoreO = Number(msg.sO||netScoreO||0);
          const w = msg.w;
          const line = Array.isArray(msg.line) ? msg.line : [];
          // mark win line on current DOM
          setTimeout(()=>{
            const cells = [...grid.children];
            for (const idx of line) cells[idx]?.classList.add("win");
          }, 0);
          if (w === "D") showOverlay("draw", "Unentschieden", "GG. Nochmal?");
          else if (w === mySide) showOverlay("win", "Sieg", "Online gewonnen.");
          else showOverlay("lose", "Niederlage", "Online verloren.");
          over = true;
          render();
          return;
        }
        if (msg.t === "reset"){
          hideOverlay();
          over = false;
          render();
        }
      });
    }

    document.getElementById("btnReady")?.addEventListener("click", ()=>{
      if (!online || !ws || ws.readyState !== 1) return;
      imReady = !imReady;
      ws.send(JSON.stringify({ t: "ready", v: imReady }));
      const br = document.getElementById("btnReady");
      if (br) {
        br.textContent = imReady ? "Nicht ready" : "Ready";
        br.classList.toggle("is-ready", imReady);
      }
    });
    btnHost.addEventListener("click", ()=> connect(roomInp.value || ""));
    btnJoin.addEventListener("click", ()=>{
      const c = (roomInp.value || "").trim();
      if (!c) { setNetLabel("Room fehlt"); return; }
      connect(c);
    });

    btnRestart.addEventListener("click", ()=>{
      if (online && ws && ws.readyState === 1){
        ws.send(JSON.stringify({t:"reset"}));
      } else newGame();
    });
    modeSel.addEventListener("change", newGame);
    botLevelSel.addEventListener("change", newGame);
    newGame();

    // Auto-connect with share link (?room=SCHULE1)
    (function autoConnect(){
      let p=null;
      try{ p = new URLSearchParams(location.search); }catch{ p = new URLSearchParams(); }
      const roomP = p.get("room");
      if (!roomP) return;
      roomInp.value = roomP.toUpperCase();
      connect(roomInp.value);
    })();
  </script>
</body>
</html>
