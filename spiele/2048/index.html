<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <title>2048 · thomas.fun</title>
  <meta name="description" content="2048 im Browser — Keyboard & Touch, Bestscore, Juice." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--card:#16161c;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;
      --accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;
      --cell:#0f1220;--cell2:#0b0e18;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(980px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{
      background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)
    }
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    button:disabled{opacity:.45;cursor:not-allowed}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}

    .boardWrap{display:grid;gap:12px;margin-top:12px;place-items:center}
    .board{
      position:relative;
      width:min(520px,92vw);
      aspect-ratio:1/1;
      border-radius:22px;
      padding:12px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(720px 520px at 50% 0%, rgba(34,211,238,.12), rgba(0,0,0,.15)),
        linear-gradient(165deg, rgba(10,12,22,.9), rgba(0,0,0,.25));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 18px 50px rgba(0,0,0,.45);
      touch-action: none;
      user-select:none;
      overflow:hidden;
    }
    .grid{
      position:absolute; inset:12px;
      display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr);
      gap:12px;
    }
    .slot{
      border-radius:18px;
      background: linear-gradient(165deg, rgba(0,0,0,.18), rgba(0,0,0,.28));
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .tiles{
      position:absolute; inset:12px;
      pointer-events:none;
    }
    .tile{
      position:absolute;
      width: calc((100% - 12px*3)/4);
      height: calc((100% - 12px*3)/4);
      border-radius:18px;
      display:grid;
      place-items:center;
      font-weight:1000;
      font-size: clamp(1.4rem, 4.6vw, 2.4rem);
      letter-spacing: .02em;
      box-shadow: 0 18px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.10);
      transform: translate3d(var(--x), var(--y), 0) scale(var(--s, 1));
      transition: transform 120ms ease;
    }
    .tile.new{ animation: pop .18s cubic-bezier(.2,.9,.2,1); }
    .tile.merge{ animation: merge .16s cubic-bezier(.2,.9,.2,1); }
    @keyframes pop{from{transform: translate3d(var(--x), var(--y), 0) scale(.6)}to{transform: translate3d(var(--x), var(--y), 0) scale(1)}}
    @keyframes merge{0%{transform: translate3d(var(--x), var(--y), 0) scale(1)}50%{transform: translate3d(var(--x), var(--y), 0) scale(1.13)}100%{transform: translate3d(var(--x), var(--y), 0) scale(1)}}

    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}

    .overlay{position:absolute; inset:0; display:none; place-items:center; z-index:5;
      background: radial-gradient(700px 520px at 50% 30%, rgba(255,215,106,.12), rgba(0,0,0,.72));
      backdrop-filter: blur(4px);
    }
    .overlay.show{display:grid}
    .panel{
      width:min(420px, 86vw);
      border-radius:22px;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;
      text-align:center;
    }
    .panel h2{margin:0;font-size:clamp(1.9rem,6vw,2.6rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:800}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>2048</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnNew">Neues Spiel</button>
          <button id="btnUndo" disabled>Undo</button>
        </div>
        <div class="meta">
          <span class="pill" id="score">Score: 0</span>
          <span class="pill" id="best">Best: 0</span>
          <span class="pill" id="goal">Ziel: 2048</span>
        </div>
      </div>

      <div class="boardWrap">
        <div class="board" id="board" aria-label="2048 Spielbrett" tabindex="0">
          <div class="grid" aria-hidden="true" id="grid"></div>
          <div class="tiles" id="tiles"></div>
          <div class="overlay" id="ov" aria-hidden="true">
            <div class="panel">
              <h2 id="ovTitle">—</h2>
              <p id="ovText">—</p>
              <div class="cta">
                <button class="primary" id="ovAgain">Nochmal</button>
                <button id="ovClose">Weiter</button>
              </div>
            </div>
          </div>
        </div>
        <div class="hint">Pfeile/WASD oder wischen. Kombiniere gleiche Zahlen.</div>
      </div>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById("board");
    const gridEl = document.getElementById("grid");
    const tilesEl = document.getElementById("tiles");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const btnNew = document.getElementById("btnNew");
    const btnUndo = document.getElementById("btnUndo");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");

    // tiny audio/vibe
    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.06, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    const vibr = (p)=>{ if (navigator.vibrate) navigator.vibrate(p); };

    const LSK = "2048-best-v1";
    let best = 0; try { best = Number(localStorage.getItem(LSK)) || 0; } catch {}

    const N = 4;
    let tiles = [];
    let nextId = 1;
    let score = 0;
    let over = false;
    let won = false;
    let undo = null; // {tiles, score, won}
    let busy = false;

    // background slots
    for (let i=0;i<N*N;i++){
      const d = document.createElement("div");
      d.className = "slot";
      gridEl.appendChild(d);
    }

    const els = new Map(); // id -> element
    function setOverlay(show, title="", text=""){
      ov.classList.toggle("show", show);
      ov.setAttribute("aria-hidden", show ? "false" : "true");
      if (show){
        ovTitle.textContent = title;
        ovText.textContent = text;
      }
    }
    function cloneTiles(ts){
      return ts.map(t => ({ id:t.id, r:t.r, c:t.c, v:t.v }));
    }
    function saveUndo(){
      undo = { tiles: cloneTiles(tiles), score, won };
      btnUndo.disabled = false;
    }

    function gridValues(){
      const g = Array.from({length:N}, ()=>Array(N).fill(0));
      for (const t of tiles) g[t.r][t.c] = t.v;
      return g;
    }
    function emptyCells(){
      const occ = new Set(tiles.map(t=>`${t.r},${t.c}`));
      const out = [];
      for (let r=0;r<N;r++) for (let c=0;c<N;c++) if (!occ.has(`${r},${c}`)) out.push([r,c]);
      return out;
    }
    function anyFull(){
      return emptyCells().length === 0;
    }
    function canMoveClassic(){
      if (!anyFull()) return true;
      const g = gridValues();
      for (let r=0;r<N;r++){
        for (let c=0;c<N;c++){
          const v = g[r][c];
          if (r+1<N && g[r+1][c] === v) return true;
          if (c+1<N && g[r][c+1] === v) return true;
        }
      }
      return false;
    }

    // layout helpers
    function cellPos(r,c){
      const gap = 12;
      const size = (tilesEl.clientWidth - gap*3)/4;
      return { x: c*(size+gap), y: r*(size+gap) };
    }

    function ensureEl(t){
      let el = els.get(t.id);
      if (el) return el;
      el = document.createElement("div");
      el.className = "tile";
      el.dataset.id = String(t.id);
      els.set(t.id, el);
      tilesEl.appendChild(el);
      return el;
    }

    function paintTile(el, t){
      const p = cellPos(t.r, t.c);
      el.style.setProperty("--x", `${p.x}px`);
      el.style.setProperty("--y", `${p.y}px`);
      const [bg0,bg1,fg] = colors(t.v);
      el.style.background = `radial-gradient(220px 180px at 30% 25%, ${bg1}, ${bg0})`;
      el.style.border = `1px solid rgba(255,255,255,0.12)`;
      el.style.color = fg;
      el.style.textShadow = `0 0 22px rgba(255,255,255,0.10)`;
      el.textContent = String(t.v);
    }

    function renderAll(){
      scoreEl.textContent = `Score: ${score}`;
      bestEl.textContent = `Best: ${best}`;
      // remove stray
      for (const [id, el] of els) {
        if (!tiles.some(t => t.id === id)) { el.remove(); els.delete(id); }
      }
      for (const t of tiles) {
        const el = ensureEl(t);
        el.classList.remove("new","merge");
        paintTile(el, t);
      }
    }

    function colors(v){
      // neon-ish palette
      const map = {
        2: ["rgba(34,211,238,0.22)","rgba(34,211,238,0.55)","#d8fbff"],
        4: ["rgba(93,255,180,0.18)","rgba(93,255,180,0.55)","#e8fff4"],
        8: ["rgba(249,115,22,0.18)","rgba(249,115,22,0.65)","#fff0e8"],
        16:["rgba(255,215,106,0.16)","rgba(255,215,106,0.75)","#fff6d8"],
        32:["rgba(201,168,255,0.16)","rgba(201,168,255,0.75)","#f0e8ff"],
        64:["rgba(255,107,107,0.14)","rgba(255,107,107,0.78)","#ffe8e8"],
      };
      if (map[v]) return map[v];
      return ["rgba(200,230,255,0.12)","rgba(154,208,255,0.65)","#f4f8ff"];
    }

    function addRandomTile(){
      const empt = emptyCells();
      if (!empt.length) return null;
      const [r,c] = empt[Math.floor(Math.random()*empt.length)];
      const t = { id: nextId++, r, c, v: Math.random()<0.9 ? 2 : 4 };
      tiles.push(t);
      const el = ensureEl(t);
      el.classList.add("new");
      paintTile(el, t);
      return t;
    }

    function slideLine(line, writePos){
      // line: tiles sorted in travel direction
      // writePos(idx) -> {r,c} for output slot idx
      const moved = []; // {id, from:{r,c}, to:{r,c}}
      const removed = []; // ids
      const mergedTo = new Map(); // id -> true (survivor)
      let gain = 0;
      const out = [];
      for (const t of line) {
        if (!t) continue;
        out.push(t);
      }
      // merge pass
      const newOut = [];
      for (let i=0;i<out.length;i++){
        const a = out[i];
        const b = out[i+1];
        if (b && a.v === b.v && !mergedTo.get(a.id) && !mergedTo.get(b.id)) {
          // merge b into a
          a.v *= 2;
          gain += a.v;
          mergedTo.set(a.id, true);
          removed.push(b.id);
          i++;
        }
        newOut.push(a);
      }
      while (newOut.length < N) newOut.push(null);
      // apply positions
      for (let i=0;i<newOut.length;i++){
        const t = newOut[i];
        if (!t) continue;
        const to = writePos(i);
        moved.push({ id: t.id, from:{r:t.r,c:t.c}, to });
        t.r = to.r; t.c = to.c;
      }
      return { moved, removed, gain, mergedSurvivors: [...mergedTo.keys()] };
    }

    function move(dir){
      if (over || busy) return false;
      saveUndo();
      busy = true;

      const before = JSON.stringify(gridValues());
      const movedAll = [];
      const removedAll = [];
      const mergedSurvivors = new Set();
      let gained = 0;

      // prepare DOM current positions
      for (const t of tiles) {
        const el = ensureEl(t);
        el.classList.remove("new","merge");
        paintTile(el, t);
      }

      if (dir === "left" || dir === "right") {
        for (let r=0;r<N;r++){
          const line = tiles
            .filter(t => t.r === r)
            .sort((a,b)=> dir==="left" ? a.c-b.c : b.c-a.c);
          const writePos = (i)=> ({ r, c: dir==="left" ? i : (N-1-i) });
          const res = slideLine(line, writePos);
          gained += res.gain;
          movedAll.push(...res.moved);
          removedAll.push(...res.removed);
          res.mergedSurvivors.forEach(id=>mergedSurvivors.add(id));
        }
      } else {
        for (let c=0;c<N;c++){
          const line = tiles
            .filter(t => t.c === c)
            .sort((a,b)=> dir==="up" ? a.r-b.r : b.r-a.r);
          const writePos = (i)=> ({ r: dir==="up" ? i : (N-1-i), c });
          const res = slideLine(line, writePos);
          gained += res.gain;
          movedAll.push(...res.moved);
          removedAll.push(...res.removed);
          res.mergedSurvivors.forEach(id=>mergedSurvivors.add(id));
        }
      }

      // remove merged tiles from state AFTER anim
      const removedSet = new Set(removedAll);
      const changed = JSON.stringify(gridValues()) !== before || removedSet.size > 0;
      if (!changed){
        undo = null;
        btnUndo.disabled = true;
        busy = false;
        return false;
      }

      score += gained;
      if (score > best){
        best = score;
        try { localStorage.setItem(LSK, String(best)); } catch {}
      }

      if (gained){
        tone(520 + Math.min(900, Math.log2(gained)*90), 0.07, "triangle", 0.05);
        vibr([12, 18, 12]);
      } else {
        tone(420, 0.03, "sine", 0.02);
      }

      // animate: move all existing tiles to their new positions
      for (const m of movedAll){
        const t = tiles.find(x=>x.id===m.id);
        if (!t) continue;
        const el = ensureEl(t);
        // start at old
        const p0 = cellPos(m.from.r, m.from.c);
        el.style.setProperty("--x", `${p0.x}px`);
        el.style.setProperty("--y", `${p0.y}px`);
      }
      // animate on next frame
      requestAnimationFrame(()=>{
        for (const m of movedAll){
          const t = tiles.find(x=>x.id===m.id);
          if (!t) continue;
          const el = ensureEl(t);
          const p1 = cellPos(m.to.r, m.to.c);
          el.style.setProperty("--x", `${p1.x}px`);
          el.style.setProperty("--y", `${p1.y}px`);
          paintTile(el, t);
          if (mergedSurvivors.has(t.id)) el.classList.add("merge");
        }
      });

      // after animation ends, finalize: remove merged-away tiles, add new tile, check end.
      setTimeout(()=>{
        if (removedSet.size){
          tiles = tiles.filter(t => !removedSet.has(t.id));
          for (const id of removedSet){
            const el = els.get(id);
            if (el) { el.remove(); els.delete(id); }
          }
        }

        // add new tile
        addRandomTile();

        // win / lose
        if (!won && tiles.some(t=>t.v>=2048)){
          won = true;
          setOverlay(true, "2048!", "Nice. Du hast 2048 erreicht.");
          tone(740,0.09,"sine",0.06); setTimeout(()=>tone(988,0.12,"sine",0.05),60); setTimeout(()=>tone(1244,0.14,"triangle",0.04),130);
          vibr([30,40,30,70]);
        }

        // Classic 2048: verloren nur wenn wirklich kein Zug mehr möglich ist.
        if (!canMoveClassic()){
          over = true;
          setOverlay(true, "Game Over", `Keine Züge mehr · Score ${score} · Best ${best}`);
          tone(180,0.16,"sawtooth",0.07); setTimeout(()=>tone(120,0.18,"square",0.05),70);
          vibr([60,40,80]);
        }

        renderAll();
        busy = false;
      }, 140);
      return true;
    }

    function newGame(){
      tiles = [];
      nextId = 1;
      score = 0;
      over = false;
      won = false;
      undo = null;
      btnUndo.disabled = true;
      setOverlay(false);
      // clear DOM
      for (const [,el] of els) el.remove();
      els.clear();
      // two starting tiles
      addRandomTile();
      addRandomTile();
      renderAll();
      boardEl.focus();
    }

    function doUndo(){
      if (!undo) return;
      tiles = cloneTiles(undo.tiles);
      score = undo.score;
      won = undo.won;
      over = false;
      undo = null;
      btnUndo.disabled = true;
      setOverlay(false);
      tone(300,0.07,"sine",0.04);
      vibr(10);
      renderAll();
    }

    // input: keyboard + touch swipe
    const keyMap = {
      ArrowLeft:"left", ArrowRight:"right", ArrowUp:"up", ArrowDown:"down",
      KeyA:"left", KeyD:"right", KeyW:"up", KeyS:"down"
    };
    window.addEventListener("keydown", (e)=>{
      const d = keyMap[e.code];
      if (!d) return;
      e.preventDefault();
      move(d);
    });

    let sx=0, sy=0, sp=false;
    boardEl.addEventListener("pointerdown", (e)=>{
      sp = true;
      sx = e.clientX; sy = e.clientY;
      boardEl.setPointerCapture(e.pointerId);
    });
    boardEl.addEventListener("pointerup", (e)=>{
      if (!sp) return;
      sp = false;
      const dx = e.clientX - sx;
      const dy = e.clientY - sy;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      if (Math.max(adx, ady) < 18) return;
      if (adx > ady) move(dx < 0 ? "left" : "right");
      else move(dy < 0 ? "up" : "down");
    });

    btnNew.addEventListener("click", newGame);
    btnUndo.addEventListener("click", doUndo);
    ovAgain.addEventListener("click", ()=>{ setOverlay(false); newGame(); });
    ovClose.addEventListener("click", ()=> setOverlay(false));
    ov.addEventListener("click", (e)=>{ if (e.target === ov) setOverlay(false); });

    newGame();
  </script>
</body>
</html>
