<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>UNO Online · thomas.fun</title>
  <meta name="description" content="UNO Online: Room-Code teilen, 2–8 Spieler, Handy-optimiert." />
  <meta name="theme-color" content="#0c0c0f" />
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="../_game-shell.css" />
  <script defer src="game.js?v=2"></script>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>UNO Online</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <span class="pill" id="netStat">Offline</span>
          <input id="name" placeholder="Name" />
          <input id="room" placeholder="Room (z.B. SCHULE1)" />
          <button class="primary" id="btnHost" type="button">Host</button>
          <button id="btnJoin" type="button">Join</button>
          <button id="btnStart" type="button" disabled>Start</button>
        </div>
        <div class="meta">
          <span class="pill" id="turn">Zug: —</span>
          <span class="pill" id="dir">↻</span>
          <span class="pill" id="deck">Deck: —</span>
        </div>
      </div>

      <div class="table">
        <div class="stack">
          <div class="label">Ablage</div>
          <div class="cardBig" id="topCard">—</div>
          <div class="label">Deck</div>
          <button class="deckBtn" id="btnDraw" type="button">Ziehen</button>
          <button class="deckBtn" id="btnPass" type="button" disabled>Passen</button>
        </div>

        <div class="players" id="players" aria-label="Spieler"></div>
      </div>

      <div class="hand" id="hand" aria-label="Deine Hand"></div>

      <div class="hint" id="hint">Verbinde dich mit einem Room. Dann Start (Host) drücken.</div>
    </div>
  </div>

  <div class="overlay" id="colorOv" aria-hidden="true">
    <div class="panel">
      <h2>Farbe wählen</h2>
      <div class="colors">
        <button class="c red" data-c="R" type="button">Rot</button>
        <button class="c green" data-c="G" type="button">Grün</button>
        <button class="c blue" data-c="B" type="button">Blau</button>
        <button class="c yellow" data-c="Y" type="button">Gelb</button>
      </div>
      <button id="btnColorCancel" type="button">Abbrechen</button>
    </div>
  </div>
</body>
</html>
