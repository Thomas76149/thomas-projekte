<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Pong · thomas.fun</title>
  <meta name="description" content="Mini Pong gegen Bot. Kurz, knackig, mit Effekten." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;
      --good:#5dffb4;--bad:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(980px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,select{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:800;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    canvas{width:min(720px,92vw);height:auto;display:block;margin:14px auto 10px;border-radius:18px;border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(720px 360px at 50% 30%, rgba(34,211,238,.10), rgba(0,0,0,.22))}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{
      width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;text-align:center
    }
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:700}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    canvas.fx{position:fixed;inset:0;pointer-events:none;z-index:11}
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Pong</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnStart">Start</button>
          <button id="btnReset">Reset</button>
          <select id="ai">
            <option value="easy">Bot: easy</option>
            <option value="normal" selected>Bot: normal</option>
            <option value="hard">Bot: hard</option>
          </select>
        </div>
        <div class="controls" style="gap:10px;align-items:center">
          <span class="pill" id="netStat" style="border-color:rgba(255,255,255,.14)">Offline</span>
          <input id="netUrl" placeholder="wss://… (Server)" style="min-width:240px;max-width:min(46vw,420px);padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:var(--text);font-weight:800" />
          <input id="room" placeholder="Room (z.B. ABCD1)" style="width:150px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:var(--text);font-weight:900;letter-spacing:.12em;text-transform:uppercase" />
          <button id="btnHost" type="button">Host</button>
          <button id="btnJoin" type="button">Join</button>
        </div>
        <div class="controls">
          <span id="score" style="color:rgba(255,255,255,.9);font-weight:1000;letter-spacing:.12em">0 : 0</span>
        </div>
      </div>
      <canvas id="c" width="720" height="420"></canvas>
      <div class="hint">W/S oder ↑/↓. Erst zu 7 gewinnt.</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">—</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>
  <canvas class="fx" id="fx"></canvas>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    const btnStart = document.getElementById("btnStart");
    const btnReset = document.getElementById("btnReset");
    const aiSel = document.getElementById("ai");
    const scoreEl = document.getElementById("score");
    const netStat = document.getElementById("netStat");
    const netUrl = document.getElementById("netUrl");
    const roomInp = document.getElementById("room");
    const btnHost = document.getElementById("btnHost");
    const btnJoin = document.getElementById("btnJoin");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");
    const fx = document.getElementById("fx");
    const fctx = fx.getContext("2d");

    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.06, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    function vibr(p){ if (navigator.vibrate) navigator.vibrate(p); }
    function fitFx(){
      fx.width = innerWidth * devicePixelRatio;
      fx.height = innerHeight * devicePixelRatio;
      fx.style.width = innerWidth + "px";
      fx.style.height = innerHeight + "px";
      fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }
    addEventListener("resize", fitFx);
    fitFx();

    let running=false, raf=0, last=0;
    const P = { w: 14, h: 92, sp: 540 };
    const left = { x: 26, y: c.height/2-P.h/2, ...P };
    const right = { x: c.width-26-P.w, y: c.height/2-P.h/2, ...P };
    const ball0 = { r: 10, spin: 0 };
    let ball = { x:c.width/2, y:c.height/2, vx: 380, vy: 180, spin: 0, ...ball0 };
    let sL=0, sR=0;
    const keys = new Set();
    let sparks = [];
    let leftVy = 0;
    let aiAimY = c.height / 2;
    let aiThinkAcc = 0;

    // Online mode
    let ws = null;
    let online = false;
    let mySide = "L"; // L or R
    let roomCode = "";
    let remotePeers = 0;
    const keysNet = { up:false, down:false };

    function setNetLabel(txt, ok=false){
      netStat.textContent = txt;
      netStat.style.borderColor = ok ? "rgba(93,255,180,.35)" : "rgba(255,255,255,.14)";
      netStat.style.color = ok ? "rgba(93,255,180,.95)" : "rgba(255,255,255,.85)";
    }

    function defaultWsUrl(){
      // If served from same host (when you later host both), auto-detect; otherwise user pastes URL.
      const isHttps = location.protocol === "https:";
      const proto = isHttps ? "wss://" : "ws://";
      return proto + location.hostname + (location.port ? (":" + location.port) : "");
    }
    try{
      netUrl.value = localStorage.getItem("pong_ws_url") || "";
    } catch {}
    if (!netUrl.value) netUrl.value = defaultWsUrl();

    function connect(code){
      const url = (netUrl.value || "").trim();
      if (!url) return;
      try { localStorage.setItem("pong_ws_url", url); } catch {}

      // disconnect old
      try { ws && ws.close(); } catch {}
      ws = null;
      online = true;
      setNetLabel("Verbinden…");

      ws = new WebSocket(url.replace(/^http/i, "ws"));
      ws.addEventListener("open", ()=>{
        setNetLabel("Connected", true);
        ws.send(JSON.stringify({t:"join", code}));
      });
      ws.addEventListener("close", ()=>{
        setNetLabel("Offline");
        online = false;
        remotePeers = 0;
      });
      ws.addEventListener("error", ()=>{
        setNetLabel("Fehler");
      });
      ws.addEventListener("message", (ev)=>{
        let msg=null;
        try{ msg = JSON.parse(ev.data); }catch{}
        if (!msg) return;
        if (msg.t === "err"){
          setNetLabel(msg.m || "Fehler");
          return;
        }
        if (msg.t === "joined"){
          roomCode = msg.code || "";
          mySide = msg.side || "L";
          roomInp.value = roomCode;
          setNetLabel(`Online · ${roomCode} · Du: ${mySide}`, true);
          aiSel.disabled = true;
          resetGame();
          draw();
          return;
        }
        if (msg.t === "peers"){
          remotePeers = Number(msg.n||0);
          return;
        }
        if (msg.t === "reset"){
          resetGame();
          return;
        }
        if (msg.t === "run"){
          // server started
          if (!running) start();
          return;
        }
        if (msg.t === "over"){
          // server ended; show overlay locally
          running = false;
          cancelAnimationFrame(raf);
          showOverlay(msg.w === mySide);
          return;
        }
        if (msg.t === "state" && msg.s){
          const s = msg.s;
          // authoritative snapshot
          if (typeof s.sL === "number") sL = s.sL;
          if (typeof s.sR === "number") sR = s.sR;
          if (s.L && typeof s.L.y === "number") left.y = s.L.y;
          if (s.R && typeof s.R.y === "number") right.y = s.R.y;
          if (s.B){
            ball.x = s.B.x; ball.y = s.B.y;
            ball.vx = s.B.vx; ball.vy = s.B.vy;
            ball.spin = s.B.spin; ball.r = s.B.r;
          }
          syncScore();
        }
      });
    }

    function netSendInput(){
      if (!ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({t:"in", up: keysNet.up, down: keysNet.down}));
    }

    function resetRound(dir=1){
      ball = { x:c.width/2, y:c.height/2, vx: 420*dir, vy: (Math.random()*2-1)*220, spin: 0, ...ball0 };
      left.y = c.height/2-left.h/2;
      right.y = c.height/2-right.h/2;
      leftVy = 0;
      aiAimY = c.height / 2;
      aiThinkAcc = 0;
    }
    function resetGame(){
      hideOverlay();
      sL=0; sR=0;
      resetRound(Math.random()<0.5?-1:1);
      draw();
      syncScore();
    }
    function syncScore(){ scoreEl.textContent = `${sL} : ${sR}`; }
    function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

    function collidePaddle(p){
      const nx = clamp(ball.x, p.x, p.x+p.w);
      const ny = clamp(ball.y, p.y, p.y+p.h);
      const dx = ball.x-nx, dy = ball.y-ny;
      return dx*dx+dy*dy <= ball.r*ball.r;
    }

    function spark(x,y, col){
      for (let i=0;i<18;i++){
        const a = Math.random()*Math.PI*2;
        const sp = 120 + Math.random()*420;
        sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.35+Math.random()*0.25,col,s:2+Math.random()*3});
      }
    }

    function tick(dt){
      const sec = dt/1000;
      const up = keys.has("ArrowUp") || keys.has("KeyW");
      const down = keys.has("ArrowDown") || keys.has("KeyS");
      const prevLY = left.y;
      if (!online){
        if (up) left.y -= left.sp*sec;
        if (down) left.y += left.sp*sec;
        left.y = clamp(left.y, 10, c.height-left.h-10);
        leftVy = (left.y - prevLY) / Math.max(0.001, sec);
      } else {
        // local input belongs to my side only
        const p = (mySide === "L") ? left : right;
        keysNet.up = !!up;
        keysNet.down = !!down;
        netSendInput();
        // movement is server-side; we keep the physics local only for rendering smoothness via snapshots
        leftVy = (p.y - prevLY) / Math.max(0.001, sec);
      }

      // AI (schlagbar): nur "denken" alle X ms, leichtes Fehlziel + capped speed + tracked nur wenn Ball auf ihn zufliegt.
      if (!online){
        const lvl = aiSel.value;
        const thinkEvery = lvl === "easy" ? 260 : lvl === "hard" ? 120 : 220;
        aiThinkAcc += dt;
        if (aiThinkAcc >= thinkEvery) {
          aiThinkAcc -= thinkEvery;
          aiAimY = predictInterceptY();
          const miss = lvl === "easy" ? 52 : lvl === "hard" ? 14 : 44;
          aiAimY += (Math.random() - 0.5) * miss;
          aiAimY = clamp(aiAimY, 10 + right.h / 2, c.height - 10 - right.h / 2);
        }
        const aim = aiAimY - (right.y + right.h/2);
        const react = lvl==="easy"?0.68:lvl==="hard"?1.02:0.72;
        const max = right.sp * react;
        right.y += clamp(aim, -max*sec, max*sec);
        right.y = clamp(right.y, 10, c.height-right.h-10);
      }

      ball.x += ball.vx*sec;
      ball.y += ball.vy*sec;
      // Spin/Drall: Ball kurvt leicht, Spin decayed.
      ball.vy += ball.spin * sec;
      ball.spin *= Math.pow(0.88, dt/16);

      // walls
      if (ball.y - ball.r < 10){ ball.y = 10+ball.r; ball.vy *= -1; tone(340,0.04,"triangle",0.03); }
      if (ball.y + ball.r > c.height-10){ ball.y = c.height-10-ball.r; ball.vy *= -1; tone(340,0.04,"triangle",0.03); }

      // paddles
      if (ball.vx < 0 && collidePaddle(left)){
        ball.x = left.x+left.w+ball.r;
        const off = (ball.y-(left.y+left.h/2))/(left.h/2);
        ball.vx = Math.abs(ball.vx) * 1.04;
        ball.vy += off*240;
        ball.spin = clamp(ball.spin + off * 220 + leftVy * 0.14, -520, 520);
        spark(ball.x, ball.y, "rgba(34,211,238,0.9)");
        tone(620,0.05,"square",0.03);
        vibr(10);
      }
      if (ball.vx > 0 && collidePaddle(right)){
        ball.x = right.x-ball.r;
        const off = (ball.y-(right.y+right.h/2))/(right.h/2);
        ball.vx = -Math.abs(ball.vx) * 1.04;
        ball.vy += off*240;
        // Bot hat weniger Spin-Kontrolle.
        ball.spin = clamp(ball.spin + off * 170, -420, 420);
        spark(ball.x, ball.y, "rgba(249,115,22,0.9)");
        tone(520,0.05,"square",0.03);
        vibr(10);
      }
      // cap
      const sp = Math.hypot(ball.vx, ball.vy);
      const cap = 1020;
      if (sp > cap){ ball.vx = ball.vx/sp*cap; ball.vy = ball.vy/sp*cap; }

      // score
      if (ball.x < -50){ sR++; syncScore(); spark(c.width*0.25,c.height*0.5,"rgba(249,115,22,0.9)"); tone(180,0.12,"sawtooth",0.06); vibr([20,20,20]); resetRound(1); }
      if (ball.x > c.width+50){ sL++; syncScore(); spark(c.width*0.75,c.height*0.5,"rgba(34,211,238,0.9)"); tone(220,0.12,"sawtooth",0.06); vibr([20,20,20]); resetRound(-1); }

      if (sL>=7 || sR>=7){
        running=false;
        cancelAnimationFrame(raf);
        showOverlay(sL>sR);
      }

      // sparks
      for (let i=sparks.length-1;i>=0;i--){
        const p = sparks[i];
        p.life -= sec;
        p.x += p.vx*sec;
        p.y += p.vy*sec;
        p.vy += 520*sec;
        p.vx *= 0.99;
        if (p.life<=0) sparks.splice(i,1);
      }
    }

    function predictInterceptY(){
      // Wenn Ball wegfliegt -> Bot driftet zur Mitte (menschlicher).
      if (ball.vx <= 0) return c.height / 2;
      const targetX = right.x - ball.r;
      const t = (targetX - ball.x) / Math.max(1, ball.vx);
      let y = ball.y + ball.vy * t;
      // simple wall-bounce prediction (top/bottom at 10..H-10)
      const top = 10 + ball.r, bot = c.height - 10 - ball.r;
      const span = bot - top;
      if (span <= 1) return c.height/2;
      // reflect y into [top..bot]
      const rel = y - top;
      const m = ((rel % (2*span)) + 2*span) % (2*span);
      const folded = m <= span ? m : 2*span - m;
      return top + folded;
    }

    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      ctx.globalAlpha = 0.4;
      for (let y=18;y<c.height;y+=24){
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.fillRect(c.width/2-2, y, 4, 12);
      }
      ctx.globalAlpha = 1;
      // paddles
      ctx.fillStyle = "rgba(34,211,238,0.85)";
      ctx.fillRect(left.x,left.y,left.w,left.h);
      ctx.fillStyle = "rgba(249,115,22,0.85)";
      ctx.fillRect(right.x,right.y,right.w,right.h);
      // ball
      const g = ctx.createRadialGradient(ball.x-3,ball.y-3,2, ball.x,ball.y, 18);
      g.addColorStop(0,"rgba(255,255,255,0.95)");
      g.addColorStop(0.4,"rgba(200,230,255,0.6)");
      g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();

      // sparks
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const p of sparks){
        const a = Math.max(0, Math.min(1, p.life*2));
        ctx.globalAlpha = a*0.85;
        ctx.fillStyle = p.col;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    function loop(now){
      if (!running) return;
      const dt = Math.min(40, now-(last||now));
      last = now;
      tick(dt);
      draw();
      raf = requestAnimationFrame(loop);
    }
    function start(){
      if (running) return;
      running = true;
      last = 0;
      if (online && ws && ws.readyState === 1){
        ws.send(JSON.stringify({t:"start"}));
      }
      raf = requestAnimationFrame(loop);
    }

    function showOverlay(win){
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
      ovTitle.textContent = win ? "Sieg" : "Niederlage";
      ovText.textContent = win ? "Nice. Du hast den Bot besiegt." : "Der Bot hat dich outplayed.";
      if (win){
        tone(740,0.09,"sine",0.06); setTimeout(()=>tone(988,0.12,"sine",0.05),60); setTimeout(()=>tone(1244,0.14,"triangle",0.04),130);
        vibr([30,40,30,70]);
      } else {
        tone(180,0.18,"sawtooth",0.07); setTimeout(()=>tone(110,0.2,"square",0.05),70);
        vibr([60,40,80]);
      }
      // simple screen confetti dots
      const cx = innerWidth/2, cy = innerHeight*0.35;
      const n = win ? 120 : 90;
      const cols = win ? ["#5dffb4","#22d3ee","#f97316","#ffffff"] : ["#ff6b6b","#ff2d55","#22d3ee","#ffffff"];
      const dots = [];
      for (let i=0;i<n;i++){
        const a = (Math.PI*2*i)/n + (Math.random()-0.5)*0.8;
        const sp = 260 + Math.random()*420;
        dots.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-140,r:2+Math.random()*4,life:0.9+Math.random()*0.7,col:cols[Math.floor(Math.random()*cols.length)]});
      }
      let id = 0;
      const step = ()=>{
        fctx.clearRect(0,0,innerWidth,innerHeight);
        const dt = 1/60;
        for (let i=dots.length-1;i>=0;i--){
          const p = dots[i];
          p.life -= dt;
          p.x += p.vx*dt;
          p.y += p.vy*dt;
          p.vy += 520*dt;
          p.vx *= 0.995;
          if (p.life<=0 || p.y>innerHeight+80) dots.splice(i,1);
        }
        fctx.globalCompositeOperation = "lighter";
        for (const p of dots){
          fctx.globalAlpha = Math.max(0, Math.min(1, p.life));
          fctx.fillStyle = p.col;
          fctx.fillRect(p.x-p.r, p.y-p.r, p.r*2, p.r*2);
        }
        fctx.globalAlpha = 1;
        if (dots.length) id = requestAnimationFrame(step);
        else { cancelAnimationFrame(id); fctx.clearRect(0,0,innerWidth,innerHeight); }
      };
      requestAnimationFrame(step);
    }
    function hideOverlay(){
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
      fctx.clearRect(0,0,innerWidth,innerHeight);
    }
    ov.addEventListener("click",(e)=>{ if (e.target===ov) hideOverlay(); });
    ovAgain.addEventListener("click", ()=>{ hideOverlay(); resetGame(); start(); });
    ovClose.addEventListener("click", hideOverlay);

    window.addEventListener("keydown", (e)=>{
      if (["ArrowUp","ArrowDown","KeyW","KeyS","Space"].includes(e.code)) e.preventDefault();
      if (e.code==="Space") start();
      keys.add(e.code);
    });
    window.addEventListener("keyup", (e)=>keys.delete(e.code));

    btnStart.addEventListener("click", start);
    btnReset.addEventListener("click", resetGame);
    aiSel.addEventListener("change", resetGame);
    btnHost.addEventListener("click", ()=>{
      const code = (roomInp.value || "").trim() || "";
      connect(code); // server will create if missing
    });
    btnJoin.addEventListener("click", ()=>{
      const code = (roomInp.value || "").trim();
