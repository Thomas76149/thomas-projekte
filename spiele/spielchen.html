<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satelliten-Ping · Mini-Spiel</title>
  <meta name="theme-color" content="#05070c" />
  <style>
    :root {
      --bg: #05070c;
      --accent: #56a7ff;
      --good: #5dffb4;
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.55);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      font-family: system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(900px 500px at 70% -10%, rgba(86, 167, 255, 0.18), transparent 55%),
        linear-gradient(180deg, var(--bg), #070a12);
      color: var(--text);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: min(480px, 100%);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    p.lead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .hud {
      width: min(480px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
    }
    .hud strong { color: var(--accent); }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 12px;
      border: 1px solid rgba(154, 208, 255, 0.35);
      background: linear-gradient(135deg, rgba(86, 167, 255, 0.9), rgba(120, 190, 255, 0.65));
      color: #07101f;
      padding: 10px 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.72rem;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #board {
      width: min(480px, 100%);
      aspect-ratio: 1;
      max-height: min(72vh, 480px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25) inset;
    }
    .cell {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.25);
      position: relative;
      overflow: hidden;
    }
    .cell::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.35), rgba(86, 167, 255, 0.45) 45%, transparent 70%);
      transition: opacity 0.08s;
    }
    .cell.hot::after {
      opacity: 1;
    }
    .cell.hot {
      border-color: rgba(154, 208, 255, 0.55);
      box-shadow: 0 0 28px rgba(86, 167, 255, 0.35);
      cursor: pointer;
    }
    .cell.missflash::after {
      opacity: 0.5;
      background: radial-gradient(circle, rgba(255, 80, 80, 0.4), transparent 65%);
    }
    footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a {
      color: rgba(154, 208, 255, 0.95);
    }
  </style>
</head>
<body>
  <header>
    <h1>Satelliten-Ping</h1>
    <p class="lead">15 Sekunden: Tap das leuchtende Feld so schnell wie möglich. Nur ein Feld ist „online“.</p>
  </header>
  <div class="hud">
    <span>Punkte: <strong id="score">0</strong></span>
    <span>Zeit: <strong id="time">15</strong>s</span>
    <button type="button" id="startBtn">Start</button>
  </div>
  <div id="board" role="application" aria-label="Spielfeld 3 mal 3"></div>
  <footer>
    <a href="../index.html">← thomas.fun</a>
  </footer>
  <script>
    (function () {
      const board = document.getElementById("board");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const startBtn = document.getElementById("startBtn");
      const cells = [];

      for (let i = 0; i < 9; i++) {
        const c = document.createElement("button");
        c.type = "button";
        c.className = "cell";
        c.setAttribute("aria-label", "Feld " + (i + 1));
        c.disabled = true;
        board.appendChild(c);
        cells.push(c);
      }

      let score = 0;
      let timeLeft = 15;
      let hotIndex = -1;
      let tickId = null;
      let playing = false;

      function paintBoard() {
        cells.forEach((c, i) => {
          c.classList.toggle("hot", playing && i === hotIndex);
          c.classList.remove("missflash");
          c.disabled = !playing;
        });
      }

      function pickRandomHot(exclude) {
        let n;
        do {
          n = Math.floor(Math.random() * 9);
        } while (n === exclude);
        return n;
      }

      function showHot() {
        hotIndex = pickRandomHot(hotIndex);
        paintBoard();
      }

      function onCellClick(i) {
        if (!playing) return;
        if (i !== hotIndex) {
          cells[i].classList.add("missflash");
          setTimeout(() => cells[i].classList.remove("missflash"), 120);
          return;
        }
        score += 1;
        scoreEl.textContent = String(score);
        showHot();
      }

      cells.forEach((c, i) => c.addEventListener("click", () => onCellClick(i)));

      function endGame() {
        playing = false;
        startBtn.disabled = false;
        hotIndex = -1;
        paintBoard();
        cells.forEach((c) => {
          c.disabled = true;
        });
        if (tickId) clearInterval(tickId);
        tickId = null;
        timeEl.textContent = "0";
      }

      function startGame() {
        score = 0;
        timeLeft = 15;
        scoreEl.textContent = "0";
        timeEl.textContent = "15";
        startBtn.disabled = true;
        playing = true;
        hotIndex = -1;
        showHot();

        tickId = setInterval(() => {
          timeLeft -= 1;
          timeEl.textContent = String(Math.max(0, timeLeft));
          if (timeLeft <= 0) endGame();
        }, 1000);
      }

      startBtn.addEventListener("click", () => {
        if (playing) return;
        startGame();
      });
    })();
  </script>
</body>
</html>
