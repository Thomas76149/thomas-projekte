<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake · thomas.fun</title>
  <meta name="description" content="Snake im Browser. Pfeile/WASD, mobil mit Buttons." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--card:#16161c;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;
      --accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;--bad:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(980px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,select{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:800;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    canvas{width:min(560px,92vw);height:auto;display:block;margin:14px auto 10px;border-radius:18px;border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(520px 520px at 50% 30%, rgba(34,211,238,.10), rgba(0,0,0,.22))}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .touch{display:none;gap:8px;justify-content:center;margin-top:12px}
    .touch button{min-width:70px;min-height:54px;border-radius:16px; touch-action: manipulation;}
    @media (max-width: 820px){ .touch{display:flex;flex-wrap:wrap} }
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{
      width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;text-align:center
    }
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:700}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Snake</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnStart">Start</button>
          <button id="btnRestart">Reset</button>
          <select id="speed">
            <option value="140">Speed: normal</option>
            <option value="110">Speed: fast</option>
            <option value="90">Speed: insane</option>
          </select>
        </div>
        <div class="meta">
          <span class="pill" id="score">Score: 0</span>
          <span class="pill" id="best">Best: 0</span>
        </div>
      </div>
      <canvas id="c" width="560" height="560" aria-label="Snake Spielfeld"></canvas>
      <div class="touch" aria-hidden="true">
        <button data-dir="up">↑</button>
        <button data-dir="left">←</button>
        <button data-dir="down">↓</button>
        <button data-dir="right">→</button>
      </div>
      <div class="hint" id="hint">Pfeile/WASD. Essen sammeln, Wände vermeiden (wrap ist aus).</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">Game Over</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    const btnStart = document.getElementById("btnStart");
    const btnRestart = document.getElementById("btnRestart");
    const speedSel = document.getElementById("speed");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const hint = document.getElementById("hint");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");

    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.08, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    const vibr = (p)=>{ if (navigator.vibrate) navigator.vibrate(p); };

    const LSK = "snake-best-v1";
    let best = 0; try{ best = Number(localStorage.getItem(LSK))||0; } catch {}

    const N = 20;
    const SZ = c.width / N;
    let snake, dir, nextDir, food, running=false, t=0, last=0, step=140, score=0;

    function randCell(){
      return {x: Math.floor(Math.random()*N), y: Math.floor(Math.random()*N)};
    }
    function eq(a,b){ return a.x===b.x && a.y===b.y; }
    function spawnFood(){
      while(true){
        const f = randCell();
        if (!snake.some(s=>eq(s,f))) { food = f; return; }
      }
    }
    function reset(){
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0}; nextDir = dir;
      score = 0;
      running = false;
      t = 0; last=0;
      spawnFood();
      draw();
      updateHud();
      hint.textContent = "Start drücken oder Space. Pfeile/WASD.";
    }
    function updateHud(){
      scoreEl.textContent = `Score: ${score}`;
      bestEl.textContent = `Best: ${best}`;
    }
    function setDir(dx,dy){
      if (dx === -dir.x && dy === -dir.y) return; // no instant reverse
      nextDir = {x:dx,y:dy};
    }
    function tick(){
      dir = nextDir;
      const head = snake[0];
      const nh = {x: head.x + dir.x, y: head.y + dir.y};
      if (nh.x<0 || nh.y<0 || nh.x>=N || nh.y>=N) return gameOver();
      if (snake.some((s,i)=> i>0 && eq(s,nh))) return gameOver();
      snake.unshift(nh);
      if (eq(nh, food)){
        score += 1;
        // eat juice
        tone(520 + Math.min(480, score*12), 0.06, "triangle", 0.04);
        if (navigator.vibrate) navigator.vibrate(12);
        if (score > best){ best = score; try{ localStorage.setItem(LSK,String(best)); } catch {} }
        spawnFood();
      } else {
        snake.pop();
      }
      draw();
      updateHud();
    }
    function gameOver(){
      running = false;
      hint.textContent = "Game Over. Reset und nochmal.";
      draw(true);
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
      ovTitle.textContent = "Game Over";
      ovText.textContent = `Score ${score} · Best ${best}`;
      tone(180,0.16,"sawtooth",0.07); setTimeout(()=>tone(120,0.18,"square",0.05),70);
      vibr([60,40,80]);
    }
    function draw(over=false){
      ctx.clearRect(0,0,c.width,c.height);
      // grid glow
      ctx.globalAlpha = 0.35;
      for (let y=0;y<N;y++){
        for (let x=0;x<N;x++){
          ctx.strokeStyle = "rgba(255,255,255,0.03)";
          ctx.strokeRect(x*SZ, y*SZ, SZ, SZ);
        }
      }
      ctx.globalAlpha = 1;
      // food
      const fx = food.x*SZ+SZ/2, fy=food.y*SZ+SZ/2;
      const g = ctx.createRadialGradient(fx-3,fy-3,2, fx,fy, SZ*0.55);
      g.addColorStop(0,"rgba(255,255,255,0.95)");
      g.addColorStop(0.25,"rgba(249,115,22,0.9)");
      g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(fx,fy,SZ*0.42,0,Math.PI*2); ctx.fill();
      // snake
      for (let i=0;i<snake.length;i++){
        const s = snake[i];
        const x = s.x*SZ, y=s.y*SZ;
        const isHead = i===0;
        ctx.fillStyle = isHead ? "rgba(93,255,180,0.95)" : "rgba(34,211,238,0.75)";
        ctx.fillRect(x+2,y+2,SZ-4,SZ-4);
      }
      if (over){
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0,0,c.width,c.height);
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = "900 42px system-ui";
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("GAME OVER", c.width/2, c.height/2);
      }
    }
    function loop(now){
      if (!running) return;
      if (!last) last = now;
      const dt = now-last; last=now;
      t += dt;
      if (t >= step){
        t -= step;
        tick();
      }
      requestAnimationFrame(loop);
    }
    function start(){
      if (running) return;
      running = true;
      hint.textContent = "Go.";
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
      last = 0; t=0;
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e)=>{
      const k=e.code;
      if (k==="ArrowUp"||k==="KeyW") setDir(0,-1);
      if (k==="ArrowDown"||k==="KeyS") setDir(0,1);
      if (k==="ArrowLeft"||k==="KeyA") setDir(-1,0);
      if (k==="ArrowRight"||k==="KeyD") setDir(1,0);
      if (k==="Space"){ e.preventDefault(); start(); }
    });
    document.querySelectorAll("[data-dir]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const d = btn.getAttribute("data-dir");
        if (d==="up") setDir(0,-1);
        if (d==="down") setDir(0,1);
        if (d==="left") setDir(-1,0);
        if (d==="right") setDir(1,0);
        start();
      });
    });
    btnStart.addEventListener("click", start);
    btnRestart.addEventListener("click", reset);
    speedSel.addEventListener("change", ()=>{ step = Number(speedSel.value); });
    step = Number(speedSel.value);
    reset();

    ov.addEventListener("click", (e)=>{ if (e.target===ov) { ov.classList.remove("show"); ov.setAttribute("aria-hidden","true"); }});
    ovAgain.addEventListener("click", ()=>{ ov.classList.remove("show"); ov.setAttribute("aria-hidden","true"); reset(); start(); });
    ovClose.addEventListener("click", ()=>{ ov.classList.remove("show"); ov.setAttribute("aria-hidden","true"); });
  </script>
</body>
</html>
