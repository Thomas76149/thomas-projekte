<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loop‑Runner · thomas.fun</title>
  <meta name="description" content="Loop‑Runner: Lauf auf einem Ring, wechsle innen/außen zum Dodgen." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{--bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(1100px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;min-height:44px;touch-action:manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    canvas{width:min(960px,92vw);height:auto;display:block;margin:12px auto 8px;border-radius:18px;border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(900px 520px at 50% 15%, rgba(201,168,255,.12), rgba(0,0,0,.25));touch-action:none;user-select:none;}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);padding:18px 16px 16px;text-align:center}
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:800}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Loop‑Runner</h1>
      <a href="../../index.html">← zurück</a>
    </header>
    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnStart">Start</button>
          <button id="btnReset">Reset</button>
        </div>
        <div class="meta">
          <span class="pill" id="score">Score: 0</span>
          <span class="pill" id="best">Best: 0</span>
        </div>
      </div>
      <canvas id="c" width="960" height="540"></canvas>
      <div class="hint">Tippen/Space = innen/außen wechseln. Dodge die Neon‑Gates.</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">—</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    const btnStart = document.getElementById("btnStart");
    const btnReset = document.getElementById("btnReset");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");

    const AC = window.AudioContext || window.webkitAudioContext;
    let actx=null;
    function tone(freq, dur=0.05, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type=type; o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    function vibr(p){ try{ if (navigator.vibrate) navigator.vibrate(p); } catch{} }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    const bestKey = "loopRunner_best";
    const loadBest = () => +(localStorage.getItem(bestKey)||0);
    const saveBest = (v) => localStorage.setItem(bestKey, String(v|0));
    const syncBest = () => bestEl.textContent = `Best: ${loadBest()|0}`;

    let running=false, raf=0, last=0;
    let score=0;
    let ringA = 0;
    let lane = 0; // 0 inner, 1 outer
    let laneT = 0;
    let flash=0, shake=0;
    let gates=[];
    let parts=[];
    let lastToggleAt = 0; // ms

    const CX = c.width/2, CY = c.height/2;
    const R0 = 150, R1 = 220; // inner/outer radius

    function showOverlay(title, text){
      ovTitle.textContent = title; ovText.textContent = text;
      ov.classList.add("show"); ov.setAttribute("aria-hidden","false");
    }
    function hideOverlay(){ ov.classList.remove("show"); ov.setAttribute("aria-hidden","true"); }

    function syncUI(){ scoreEl.textContent = `Score: ${score|0}`; syncBest(); }

    function reset(){
      running=false; cancelAnimationFrame(raf);
      score=0; ringA=0; lane=0; laneT=0; flash=0; shake=0;
      gates=[]; parts=[];
      lastToggleAt = 0;
      // seed gates
      let a = 1.6; // first gate not instantly at start
      for (let i=0;i<28;i++){
        a += 0.55 + Math.random()*0.25;
        const needOuter = (i === 0) ? (lane === 1) : (Math.random() < 0.5);
        gates.push({a, need: needOuter?1:0, w: 0.22 + Math.random()*0.10, hit:false});
      }
      syncUI(); draw();
    }

    function die(){
      running=false;
      if (score > loadBest()) saveBest(score);
      syncUI();
      tone(160,0.10,"sawtooth",0.06);
      vibr(35);
      showOverlay("Crash!", `Score: ${score} · Best: ${loadBest()}`);
    }

    function toggleLane(){
      if (!running) start();
      lane = 1 - lane;
      laneT = 0.12;
      flash = Math.min(1, flash + 0.12);
      shake = Math.max(shake, 6);
      tone(720,0.03,"triangle",0.04);
      vibr(8);
    }

    addEventListener("keydown", (e)=>{
      if (e.code !== "Space") return;
      e.preventDefault();
      // Space behavior:
      // - If overlay is shown (dead), Space restarts.
      // - Otherwise Space toggles lane with cooldown (holding is allowed).
      if (ov.classList.contains("show")){
        hideOverlay();
        reset();
        start();
        return;
      }
      const now = performance.now();
      const cd = 130; // ms cooldown for hold-to-toggle
      if (now - lastToggleAt < cd) return;
      lastToggleAt = now;
      toggleLane();
    });
    c.addEventListener("pointerdown", (e)=>{ c.setPointerCapture(e.pointerId); toggleLane(); });

    function step(dt){
      const sec = dt/1000;
      const sp = 1.8 + Math.min(2.8, score*0.015);
      const prevA = ringA;
      ringA += sp*sec;
      laneT = Math.max(0, laneT - sec);

      // check gates when passing player angle (player at 0 rad)
      // Only trigger when we actually cross a gate angle this frame.
      // Process at most one gate per frame (prevents "skip over several gates" insta-death).
      for (const g of gates){
        if (g.hit) continue;
        const relPrev = g.a - prevA;
        const relNow = g.a - ringA;
        if (relPrev > 0 && relNow <= 0){
          g.hit = true;
          if (g.need !== lane){
            die();
            return;
          }
          score++;
          flash = Math.min(1, flash + 0.10);
          shake = Math.max(shake, 4);
          tone(520,0.02,"triangle",0.03);
          for (let i=0;i<16;i++){
            const a = Math.random()*Math.PI*2;
            const sp2 = 120 + Math.random()*420;
            const r = lane?R1:R0;
            const x = CX + r;
            const y = CY;
            parts.push({x,y,vx:Math.cos(a)*sp2,vy:Math.sin(a)*sp2,life:0.22+Math.random()*0.18,col:"rgba(93,255,180,0.9)",s:2+Math.random()*3});
          }
          break;
        }
      }
      // recycle
      if (gates.filter(g=>!g.hit).length < 16){
        let a = gates[gates.length-1].a;
        for (let i=0;i<10;i++){
          a += 0.55 + Math.random()*0.25;
          const needOuter = Math.random() < (0.48 + Math.min(0.12, score*0.002));
          gates.push({a, need: needOuter?1:0, w: 0.22 + Math.random()*0.10, hit:false});
        }
      }

      // particles
      for (const p of parts){
        p.x += p.vx*sec; p.y += p.vy*sec;
        p.vx *= Math.pow(0.86, dt/16);
        p.vy *= Math.pow(0.86, dt/16);
        p.life -= sec;
      }
      parts = parts.filter(p => p.life > 0);

      flash *= Math.pow(0.86, dt/16);
      shake *= Math.pow(0.80, dt/16);
    }

    function draw(){
      const sx = (shake>0)? (Math.random()*2-1)*shake : 0;
      const sy = (shake>0)? (Math.random()*2-1)*shake : 0;
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,c.width,c.height);
      ctx.save(); ctx.translate(sx,sy);

      // ring
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 10;
      ctx.beginPath(); ctx.arc(CX,CY,R0,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(CX,CY,R1,0,Math.PI*2); ctx.stroke();
      ctx.restore();

      // gates
      for (const g of gates){
        if (g.hit) continue;
        const a = g.a - ringA;
        const r = g.need ? R1 : R0;
        const w = g.w;
        if (a < -0.6 || a > 4.2) continue;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const col = g.need ? "rgba(201,168,255,0.75)" : "rgba(34,211,238,0.75)";
        ctx.strokeStyle = col;
        ctx.lineWidth = 12;
        ctx.shadowColor = col;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(CX,CY,r, a-w, a+w);
        ctx.stroke();
        ctx.restore();
      }

      // player dot at angle 0
      const rNow = (lane ? R1 : R0);
      const x = CX + rNow;
      const y = CY;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const colP = lane ? "rgba(201,168,255,0.9)" : "rgba(34,211,238,0.9)";
      ctx.fillStyle = colP;
      ctx.shadowColor = colP;
      ctx.shadowBlur = 22;
      const pop = laneT>0 ? 1 + 0.18*(laneT/0.12) : 1;
      ctx.beginPath(); ctx.arc(x,y, 10*pop, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // particles
      for (const p of parts){
        ctx.globalAlpha = Math.min(1, p.life/0.18);
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // flash
      if (flash > 0.001){
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = Math.min(0.55, flash);
        ctx.fillStyle = "rgba(255,215,106,1)";
        ctx.fillRect(0,0,c.width,c.height);
        ctx.restore();
      }

      ctx.restore();
    }

    function loop(ts){
      if (!running) return;
      const dt = Math.min(40, ts - last);
      last = ts;
      step(dt);
      syncUI();
      draw();
      raf = requestAnimationFrame(loop);
    }
    function start(){
      if (running) return;
      hideOverlay();
      running = true;
      last = performance.now();
      raf = requestAnimationFrame(loop);
    }

    btnStart.addEventListener("click", start);
    btnReset.addEventListener("click", ()=>{ hideOverlay(); reset(); });
    ovAgain.addEventListener("click", ()=>{ hideOverlay(); reset(); start(); });
    ovClose.addEventListener("click", ()=> hideOverlay());
    ov.addEventListener("click", (e)=>{ if (e.target === ov) hideOverlay(); });

    reset();
  </script>
</body>
</html>
