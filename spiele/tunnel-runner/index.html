<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Tunnel Runner · thomas.fun</title>
  <meta name="description" content="Pseudo‑3D Tunnel Runner: dodge Neon‑Gates im Tunnel. Touch & Keyboard." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{--bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(1100px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;min-height:44px;touch-action:manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    canvas{width:min(960px,92vw);height:auto;display:block;margin:12px auto 8px;border-radius:18px;border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(900px 520px at 50% 15%, rgba(34,211,238,.10), rgba(0,0,0,.28));touch-action:none;user-select:none;}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);padding:18px 16px 16px;text-align:center}
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:800}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Tunnel Runner</h1>
      <a href="../../index.html">← zurück</a>
    </header>
    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnStart">Start</button>
          <button id="btnReset">Reset</button>
        </div>
        <div class="meta">
          <span class="pill" id="score">Score: 0</span>
          <span class="pill" id="best">Best: 0</span>
        </div>
      </div>
      <canvas id="c" width="960" height="540" aria-label="Tunnel Runner"></canvas>
      <div class="hint">A/D oder ←/→ oder Touch‑Drag. Dodge die Gates im Tunnel.</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">—</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    const btnStart = document.getElementById("btnStart");
    const btnReset = document.getElementById("btnReset");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");

    const AC = window.AudioContext || window.webkitAudioContext;
    let actx=null;
    function tone(freq, dur=0.05, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type=type; o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    function vibr(p){ try{ if (navigator.vibrate) navigator.vibrate(p); } catch{} }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function lerp(a,b,t){ return a + (b-a)*t; }

    const bestKey = "tunnelRunner_best";
    const loadBest = () => +(localStorage.getItem(bestKey)||0);
    const saveBest = (v) => localStorage.setItem(bestKey, String(v|0));
    const syncBest = () => bestEl.textContent = `Best: ${loadBest()|0}`;

    let running=false, raf=0, last=0;
    let score=0;
    let z = 0;
    let speed = 18; // units/sec
    let x = 0;      // player lateral [-1..1]
    let vx = 0;     // lateral velocity (units per second, in x-space)
    let xTarget = 0;
    let shake=0, flash=0;
    let gates = []; // {z, gapX, gapW}
    let parts = [];

    const keys = new Set();
    addEventListener("keydown", (e)=>{
      const block = ["ArrowLeft","ArrowRight","KeyA","KeyD","Escape","Space"];
      if (block.includes(e.code)) e.preventDefault();
      keys.add(e.code);
      if (e.code === "Escape" && running){
        running=false;
        showOverlay("Pause", "Nochmal drücken zum Weitermachen.");
      }
      if (e.code === "Space" && ov.classList.contains("show")){
        hideOverlay(); start();
      }
    });
    addEventListener("keyup", (e)=> keys.delete(e.code));

    // touch drag
    let dragging=false;
    c.addEventListener("pointerdown", (e)=>{
      c.setPointerCapture(e.pointerId);
      dragging=true;
      if (!running && !ov.classList.contains("show")) start();
    });
    c.addEventListener("pointermove", (e)=>{
      if (!dragging) return;
      const r = c.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width;
      xTarget = clamp((px - 0.5) * 2, -1, 1);
    });
    c.addEventListener("pointerup", ()=> dragging=false);
    c.addEventListener("pointercancel", ()=> dragging=false);

    function showOverlay(title, text){
      ovTitle.textContent = title;
      ovText.textContent = text;
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
    }
    function hideOverlay(){
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
    }
    function syncUI(){
      scoreEl.textContent = `Score: ${score|0}`;
      syncBest();
    }

    function reset(){
      running=false; cancelAnimationFrame(raf);
      score=0; z=0; speed=18; x=0; xTarget=0; vx=0; shake=0; flash=0;
      gates=[]; parts=[];
      // seed gates ahead
      let gz = 22;
      for (let i=0;i<26;i++){
        const gapW = 0.46 - Math.min(0.22, i*0.006);
        gates.push({z: gz, gapX: (Math.random()*2-1)*0.55, gapW});
        gz += 10 + Math.random()*7;
      }
      syncUI(); draw();
    }

    function die(){
      running=false;
      if (score > loadBest()) saveBest(score);
      syncUI();
      tone(160,0.10,"sawtooth",0.06);
      vibr(35);
      showOverlay("Crash!", `Score: ${score} · Best: ${loadBest()}`);
    }

    function spawnMore(){
      let maxZ = 0;
      for (const g of gates) maxZ = Math.max(maxZ, g.z);
      while (maxZ - z < 220){
        maxZ += 10 + Math.random()*7;
        const t = clamp(score/220, 0, 1);
        // slightly easier: bigger gaps overall
        const gapW = lerp(0.50, 0.26, t);
        const gapX = (Math.random()*2-1) * lerp(0.45, 0.65, t);
        gates.push({z: maxZ, gapX, gapW});
      }
      // cleanup
      gates = gates.filter(g => g.z > z - 6);
    }

    function step(dt){
      const sec = dt/1000;
      // input
      const left = keys.has("ArrowLeft") || keys.has("KeyA");
      const right = keys.has("ArrowRight") || keys.has("KeyD");
      const ax = (right?1:0) - (left?1:0);

      // keyboard steer (snappier but still controllable)
      const accel = 3.6;     // x-units / s^2
      const maxV = 1.95;     // x-units / s
      vx += ax * accel * sec;
      vx *= Math.pow(0.92, dt/16);
      vx = clamp(vx, -maxV, maxV);
      x = clamp(x + vx * sec, -1, 1);

      // touch steer (smooth follow)
      if (dragging){
        x = lerp(x, xTarget, 1 - Math.pow(0.001, sec));
      }

      // advance
      const prevZ = z;
      // slightly slower ramp so early game is fair
      speed = Math.min(34, speed + 0.010*sec*60);
      z += speed * sec;

      // pass gates
      for (const g of gates){
        if (g.passed) continue;
        if (prevZ < g.z && z >= g.z){
          g.passed = true;
          const L = g.gapX - g.gapW/2;
          const R = g.gapX + g.gapW/2;
          // player radius tolerance in x-space
          const pad = 0.045;
          if (x < L + pad || x > R - pad){
            die();
            return;
          }
          score++;
          tone(520,0.02,"triangle",0.03);
          flash = Math.min(1, flash + 0.10);
          shake = Math.max(shake, 6);
          for (let i=0;i<18;i++){
            const a = Math.random()*Math.PI*2;
            const sp = 80 + Math.random()*420;
            parts.push({x: c.width/2 + x*120, y: c.height*0.62, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.25+Math.random()*0.22, col:"rgba(93,255,180,0.9)", s:2+Math.random()*3});
          }
        }
      }

      spawnMore();

      // particles
      for (const p of parts){
        p.x += p.vx*sec; p.y += p.vy*sec;
        p.vx *= Math.pow(0.86, dt/16);
        p.vy *= Math.pow(0.86, dt/16);
        p.life -= sec;
      }
      parts = parts.filter(p => p.life > 0).slice(-380);

      flash *= Math.pow(0.86, dt/16);
      shake *= Math.pow(0.80, dt/16);
    }

    function proj(px, py, pz){
      // simple perspective projection into screen space
      const fov = 540;
      const zz = Math.max(0.1, pz);
      const s = fov / zz;
      return {x: c.width/2 + px*s, y: c.height/2 + py*s, s};
    }

    function draw(){
      const sx = (shake>0)? (Math.random()*2-1)*shake : 0;
      const sy = (shake>0)? (Math.random()*2-1)*shake : 0;
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,c.width,c.height);
      ctx.save(); ctx.translate(sx,sy);

      // tunnel rings
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (let i=0;i<46;i++){
        const pz = (i*6) + (z % 6);
        const R = 1.2;
        const p = proj(0, 0.1, pz + 6);
        const r = R * p.s;
        ctx.globalAlpha = 0.06 + 0.10*(1 - i/46);
        ctx.strokeStyle = "rgba(34,211,238,0.35)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, r*1.15, r*0.90, 0, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.restore();

      // gates (draw far -> near)
      const visible = gates.filter(g => g.z > z && g.z < z + 260);
      visible.sort((a,b)=> b.z - a.z);
      for (const g of visible){
        const dz = g.z - z;
        const p = proj(0, 0.1, dz + 10);
        const tunnelR = 1.2 * p.s;
        const gapL = (g.gapX - g.gapW/2) * tunnelR;
        const gapR = (g.gapX + g.gapW/2) * tunnelR;
        const y = p.y;
        // Make visuals match collision: "walls" span most tunnel height.
        const h = tunnelR*1.55;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = "rgba(249,115,22,0.55)";
        ctx.shadowColor = "rgba(249,115,22,0.20)";
        ctx.shadowBlur = 22;
        // left block
        ctx.fillRect(p.x - tunnelR, y - h/2, (tunnelR + gapL), h);
        // right block
        ctx.fillRect(p.x + gapR, y - h/2, (tunnelR - gapR), h);
        // gap outline (helps readability)
        ctx.globalAlpha = 0.16;
        ctx.strokeStyle = "rgba(93,255,180,0.9)";
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x + gapL, y - h/2, (gapR - gapL), h);
        ctx.restore();
      }

      // player (ship dot)
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const px = c.width/2 + x*120;
      const py = c.height*0.62;
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.shadowColor = "rgba(255,255,255,0.20)";
      ctx.shadowBlur = 22;
      ctx.beginPath(); ctx.arc(px, py, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "rgba(34,211,238,0.40)";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 18, 0, Math.PI*2); ctx.stroke();
      ctx.restore();

      // particles
      for (const p of parts){
        ctx.globalAlpha = clamp(p.life/0.25, 0, 1);
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // flash
      if (flash > 0.001){
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = Math.min(0.55, flash);
        ctx.fillStyle = "rgba(255,215,106,1)";
        ctx.fillRect(0,0,c.width,c.height);
        ctx.restore();
      }

      ctx.restore();
    }

    function loop(ts){
      if (!running) return;
      const dt = Math.min(40, ts - last);
      last = ts;
      step(dt);
      syncUI();
      draw();
      raf = requestAnimationFrame(loop);
    }

    function start(){
      if (running) return;
      hideOverlay();
      running = true;
      last = performance.now();
      raf = requestAnimationFrame(loop);
    }

    btnStart.addEventListener("click", start);
    btnReset.addEventListener("click", ()=>{ hideOverlay(); reset(); });
    ovAgain.addEventListener("click", ()=>{ hideOverlay(); reset(); start(); });
    ovClose.addEventListener("click", hideOverlay);
    ov.addEventListener("click", (e)=>{ if (e.target === ov) hideOverlay(); });

    reset();
  </script>
</body>
</html>
