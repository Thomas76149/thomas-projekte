<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Spider‑Swing · thomas.fun</title>
  <meta name="description" content="Spider‑Ball: An Felsen schwingen, Physik + Gravitation, Ziel erreichen." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;
      --good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(1100px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    canvas{
      width:min(960px,92vw);
      height:auto;
      display:block;
      margin:12px auto 8px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(900px 520px at 50% 15%, rgba(34,211,238,.12), rgba(0,0,0,.25));
      touch-action:none;
      user-select:none;
    }
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{
      width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;text-align:center
    }
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:800}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Spider‑Swing</h1>
      <a href="../../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnStart">Start</button>
          <button id="btnReset">Reset</button>
        </div>
        <div class="meta">
          <span class="pill" id="score">Zeit: 0.0s</span>
          <span class="pill" id="dist">Dist: —</span>
          <span class="pill" id="best">Best: —</span>
        </div>
      </div>
      <canvas id="c" width="960" height="540" aria-label="Spider‑Swing Spielfeld"></canvas>
      <div class="hint">Halten = am nächsten Felsen festhalten · Loslassen = fliegen. Ziel rechts erreichen. (Space geht auch)</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">—</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");
    const btnStart = document.getElementById("btnStart");
    const btnReset = document.getElementById("btnReset");
    const scoreEl = document.getElementById("score");
    const distEl = document.getElementById("dist");
    const bestEl = document.getElementById("best");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");

    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.06, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    function vibr(p){ try{ if (navigator.vibrate) navigator.vibrate(p); } catch{} }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function len(x,y){ return Math.hypot(x,y); }
    function norm(x,y){ const l = Math.hypot(x,y)||1; return {x:x/l,y:y/l}; }

    const bestKey = "spiderSwing_best_ms";
    const loadBest = () => +(localStorage.getItem(bestKey)||0);
    const saveBest = (v) => localStorage.setItem(bestKey, String(Math.round(v)));
    const syncBest = () => {
      const b = loadBest();
      bestEl.textContent = b ? `Best: ${(b/1000).toFixed(1)}s` : "Best: —";
    };

    let running=false, raf=0, last=0;
    let hold=false;
    let t0 = 0;

    let camX = 0;
    let rocks = [];   // {x,y,r}
    let pads = [];    // bounce platforms: {x,y,w,h, ax, ay, p}
    let goal = {x: 0, y: 0, w: 60, h: 120};
    let hook = null;  // {x,y,r}
    let ropeL = 0;
    let px=120, py=120, vx=0, vy=0;
    let spark = [];
    let nextX = 0;
    let goalX = 0;

    function showOverlay(title, text){
      ovTitle.textContent = title;
      ovText.textContent = text;
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
    }
    function hideOverlay(){
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
    }

    function reset(){
      running=false;
      cancelAnimationFrame(raf);
      px=120; py=110; vx=260; vy=0;
      hook=null; ropeL=0;
      hold=false;
      spark=[];
      // endless-ish generation
      rocks = [];
      pads = [];
      nextX = 220;
      goalX = 9200; // far end
      goal = {x: goalX, y: clamp(c.height/2 + (Math.random()*2-1)*120, 90, c.height-210), w: 80, h: 160};
      spawnMore(true);
      syncUI();
      draw();
    }

    function spawnRock(x, i){
      const y = clamp(120 + Math.sin(i*0.8)*120 + (Math.random()*2-1)*90, 90, c.height-150);
      const r = 22 + Math.random()*18;
      rocks.push({x, y, r});
    }

    function spawnPad(x){
      const w = 96 + Math.random()*96;
      const h = 18;
      // Mostly spawn near the bottom. Rarely spawn higher as risk/reward.
      const r = Math.random();
      let y;
      if (r < 0.82){
        // bottom-heavy: 70%..92% of height
        const t = 0.70 + Math.random()*0.22;
        y = t * c.height;
      } else if (r < 0.96){
        // mid: 45%..65%
        const t = 0.45 + Math.random()*0.20;
        y = t * c.height;
      } else {
        // rare high pads: 22%..40%
        const t = 0.22 + Math.random()*0.18;
        y = t * c.height;
      }
      y = clamp(y, 110, c.height-140);
      // bounce direction points forward/up
      const a = (-0.75 + Math.random()*0.35);
      const ax = Math.cos(a), ay = Math.sin(a);
      pads.push({x, y, w, h, ax, ay, p: 0});
    }

    function spawnMore(force=false){
      const ahead = px + 1200;
      if (!force && nextX > ahead) return;
      let i = 0;
      while (nextX < ahead){
        spawnRock(nextX, i++);
        // spacing
        nextX += 150 + Math.random()*120;
        // occasional pads
        if (Math.random() < 0.18) spawnPad(nextX + 90 + Math.random()*160);
      }
      // cleanup behind camera
      const minX = camX - 600;
      rocks = rocks.filter(r => r.x > minX);
      pads = pads.filter(p => p.x + p.w > minX);
    }

    function syncUI(){
      if (!running) scoreEl.textContent = "Zeit: 0.0s";
      else scoreEl.textContent = `Zeit: ${((performance.now()-t0)/1000).toFixed(1)}s`;
      const d = Math.max(0, goal.x - px);
      distEl.textContent = `Dist: ${Math.max(0, Math.round(d))}`;
      syncBest();
    }

    function pickHookTarget(){
      // Same logic for indicator + actual hook (no mismatch).
      const sp = Math.hypot(vx, vy);
      const maxD = 300 + Math.min(260, sp * 0.22);
      let best = null;
      let bestScore = -1e9;
      for (const r of rocks){
        const dx = r.x - px, dy = r.y - py;
        const d = Math.hypot(dx,dy);
        if (d > maxD) continue;
        const ahead = dx * 0.40;
        const upPenalty = Math.max(0, (-dy - 110)) * 0.16;
        const score = -d + ahead - upPenalty;
        if (score > bestScore){ bestScore = score; best = r; }
      }
      return best;
    }

    function attach(){
      const best = pickHookTarget();
      if (!best) return;
      hook = {x: best.x, y: best.y, r: best.r};
      ropeL = Math.max(58, len(px - hook.x, py - hook.y));
      tone(520,0.05,"triangle",0.045);
      vibr(8);
    }
    function detach(){
      hook = null;
      tone(340,0.05,"sine",0.035);
    }

    function die(){
      running=false;
      const t = t0 ? (performance.now() - t0) : 0;
      syncUI();
      showOverlay("Crash!", `Zeit: ${(t/1000).toFixed(1)}s · Best: ${loadBest() ? (loadBest()/1000).toFixed(1)+"s" : "—"}`);
      tone(140,0.12,"sawtooth",0.06);
      vibr(30);
    }

    function step(dt){
      const sec = dt/1000;
      camX = px - 260;
      spawnMore(false);
      const prevX = px, prevY = py;
      // attach/detach logic
      if (hold && !hook) attach();
      if (!hold && hook) detach();

      // gravity down (spider swing) — lighter so you can actually gain height
      vy += 620 * sec;
      // forward push so you move faster / farther
      vx += 95 * sec;

      // rope constraint when hooked
      if (hook){
        const dx = px - hook.x;
        const dy = py - hook.y;
        const d = Math.max(1e-6, Math.hypot(dx,dy));
        const n = {x: dx/d, y: dy/d};
        // pull toward rope length
        const diff = d - ropeL;
        const k = 16; // stiffness (lower = less "magnetic pull" feeling)
        vx -= n.x * diff * k * sec;
        vy -= n.y * diff * k * sec;
        // damping along rope
        const along = vx*n.x + vy*n.y;
        vx -= n.x * along * 0.04;
        vy -= n.y * along * 0.04;

        // swing-pump: add energy along tangent while holding
        // makes it possible to climb/swing upward instead of always losing height
        const tx = -n.y, ty = n.x; // tangent
        const tang = vx*tx + vy*ty;
        const pump = 260;
        const dir = tang >= 0 ? 1 : -1;
        vx += tx * pump * dir * sec;
        vy += ty * pump * dir * sec;

        // slight reeling-in while holding (helps climbing)
        ropeL = Math.max(52, ropeL - 22 * sec);
      }

      // integrate
      px += vx*sec;
      py += vy*sec;
      // less overall damping => more swing + distance
      vx *= Math.pow(0.999, dt/16);
      vy *= Math.pow(0.999, dt/16);

      // speed cap (keeps it playable)
      {
        const sp = Math.hypot(vx, vy);
        const cap = 1400;
        if (sp > cap){
          const s = cap / (sp || 1);
          vx *= s; vy *= s;
        }
      }

      // fail conditions
      if (py > c.height + 60) { die(); return; }
      if (px < -60) { die(); return; }

      // collide with rocks (simple circle push)
      for (const r of rocks){
        const dx = px - r.x, dy = py - r.y;
        const d = Math.hypot(dx,dy);
        const minD = r.r + 12;
        if (d < minD){
          const nn = norm(dx,dy);
          px = r.x + nn.x * minD;
          py = r.y + nn.y * minD;
          const vn = vx*nn.x + vy*nn.y;
          vx -= nn.x * vn * 1.2;
          vy -= nn.y * vn * 1.2;
          tone(220,0.04,"square",0.03);
          vibr(6);
        }
      }

      // bounce pads (AABB vs circle)
      for (const p of pads){
        p.p = Math.max(0, p.p - sec);
        const rx = p.x - p.w/2, ry = p.y - p.h/2;
        // Sweep test: did segment (prev->now) cross the expanded rect?
        const r = 12;
        const ex0 = rx - r, ey0 = ry - r, ex1 = rx + p.w + r, ey1 = ry + p.h + r;
        const insidePrev = (prevX >= ex0 && prevX <= ex1 && prevY >= ey0 && prevY <= ey1);
        const insideNow = (px >= ex0 && px <= ex1 && py >= ey0 && py <= ey1);
        if (insideNow || insidePrev){
          // only trigger if moving roughly into the pad and cooldown is ready
          if (p.p <= 0){
            p.p = 0.22;
            // Determine entry side using prev position
            const fromBelow = (prevY > ry + p.h) && (py <= ry + p.h);
            const fromAbove = (prevY < ry) && (py >= ry);
            const fromLeft  = (prevX < rx) && (px >= rx);
            const fromRight = (prevX > rx + p.w) && (px <= rx + p.w);
            const boost = 860;
            // bounce: reflect and push out of surface (prevents glitch-through)
            if (fromBelow){
              vy = Math.abs(vy) * 0.95;
              py = ry + p.h + r + 0.5;
            } else if (fromAbove){
              vy = -Math.abs(vy) * 0.95;
              py = ry - r - 0.5;
            } else if (fromLeft){
              vx = -Math.abs(vx) * 0.95;
              px = rx - r - 0.5;
            } else if (fromRight){
              vx = Math.abs(vx) * 0.95;
              px = rx + p.w + r + 0.5;
            } else {
              // fallback: push out by closest edge
              const cx = clamp(px, rx, rx+p.w);
              const cy = clamp(py, ry, ry+p.h);
              const dx = px - cx, dy = py - cy;
              if (Math.abs(dx) > Math.abs(dy)){
                vx *= -0.95;
                px += Math.sign(dx||1) * (r + 1);
              } else {
                vy *= -0.95;
                py += Math.sign(dy||1) * (r + 1);
              }
            }
            // add directed boost (forward/up)
            vx = p.ax * boost + vx*0.45;
            vy = p.ay * boost + vy*0.45;
            tone(880,0.05,"square",0.05);
            vibr(14);
            for (let i=0;i<24;i++){
              spark.push({x:px, y:py, vx:(Math.random()*2-1)*220, vy:(Math.random()*2-1)*220, life: 0.22 + Math.random()*0.18});
            }
          }
        }
      }

      // goal
      if (px > goal.x && px < goal.x + goal.w && py > goal.y && py < goal.y + goal.h){
        running=false;
        const t = performance.now() - t0;
        const b = loadBest();
        if (!b || t < b) saveBest(t);
        syncUI();
        tone(880,0.06,"triangle",0.06);
        setTimeout(()=>tone(1100,0.08,"triangle",0.06), 80);
        vibr(18);
        showOverlay("Geschafft!", `Zeit: ${(t/1000).toFixed(1)}s · Best: ${(loadBest()/1000).toFixed(1)}s`);
      }

      // sparkle trail
      if (running){
        for (let i=0;i<3;i++){
          spark.push({x:px, y:py, vx:-60 + Math.random()*-160, vy:(Math.random()*2-1)*90, life: 0.35 + Math.random()*0.22});
        }
      }
      for (const sp of spark){
        sp.x += sp.vx*sec; sp.y += sp.vy*sec;
        sp.vx *= Math.pow(0.90, dt/16);
        sp.vy *= Math.pow(0.90, dt/16);
        sp.life -= sec;
      }
      spark = spark.filter(s => s.life > 0);
    }

    function draw(){
      ctx.clearRect(0,0,c.width,c.height);

      // star bg
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      for (let i=0;i<70;i++){
        const x = ((i*173) % 960) + ((camX*0.08) % 120);
        const y = ((i*97) % 540);
        ctx.fillRect((x%960+960)%960, y, 2, 2);
      }
      ctx.restore();

      // world
      ctx.save();
      ctx.translate(-camX, 0);

      // rope
      if (hook){
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = "rgba(34,211,238,0.65)";
        ctx.lineWidth = 3;
        ctx.shadowColor = "rgba(34,211,238,0.25)";
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(hook.x, hook.y);
        ctx.stroke();
        ctx.restore();
      }

      // rocks
      for (const p of rocks){
        ctx.save();
        const g = ctx.createRadialGradient(p.x - p.r*0.25, p.y - p.r*0.25, p.r*0.2, p.x, p.y, p.r*1.2);
        g.addColorStop(0, "rgba(255,255,255,0.14)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r*1.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.14)";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // (pads are drawn later with rounded corners)

      // trail
      for (const sp of spark){
        ctx.globalAlpha = Math.min(1, sp.life/0.25);
        ctx.fillStyle = "rgba(34,211,238,0.9)";
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, 2.2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // goal portal
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.strokeStyle = "rgba(93,255,180,0.85)";
      ctx.lineWidth = 5;
      ctx.shadowColor = "rgba(93,255,180,0.22)";
      ctx.shadowBlur = 22;
      ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);
      ctx.restore();

      // spider ball
      ctx.save();
      ctx.translate(px, py);
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = "rgba(34,211,238,0.92)";
      ctx.shadowColor = "rgba(34,211,238,0.25)";
      ctx.shadowBlur = 22;
      ctx.beginPath(); ctx.arc(0,0, 12, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(255,255,255,0.20)";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0,0, 12, 0, Math.PI*2); ctx.stroke();
      ctx.restore();

      // hook target indicator (matches actual attach target)
      const best = pickHookTarget();
      if (best){
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = "rgba(93,255,180,0.35)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(best.x, best.y, best.r + 16, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }

      // pads (rounded)
      function roundRect(x,y,w,h,r){
        const rr = Math.min(r, w/2, h/2);
        ctx.beginPath();
        ctx.moveTo(x+rr, y);
        ctx.arcTo(x+w, y, x+w, y+h, rr);
        ctx.arcTo(x+w, y+h, x, y+h, rr);
        ctx.arcTo(x, y+h, x, y, rr);
        ctx.arcTo(x, y, x+w, y, rr);
        ctx.closePath();
      }
      for (const p of pads){
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const hot = p.p > 0 ? 1 : 0;
        const col = hot ? "rgba(255,215,106,0.85)" : "rgba(249,115,22,0.55)";
        ctx.fillStyle = col;
        ctx.shadowColor = col;
        ctx.shadowBlur = 18;
        roundRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h, 10);
        ctx.fill();
        ctx.restore();
      }

      ctx.restore(); // end world

      // UI helper
      ctx.save();
      ctx.fillStyle = "rgba(200,220,255,0.75)";
      ctx.font = "800 14px system-ui,Segoe UI,Roboto";
      ctx.fillText(hold ? "HOOK" : "FREI", 16, 24);
      ctx.restore();
    }

    function loop(ts){
      if (!running) return;
      const dt = Math.min(40, ts - last);
      last = ts;
      step(dt);
      syncUI();
      draw();
      raf = requestAnimationFrame(loop);
    }

    function start(){
      if (running) return;
      hideOverlay();
      running = true;
      t0 = performance.now();
      last = performance.now();
      raf = requestAnimationFrame(loop);
    }

    // controls: hold pointer or space
    addEventListener("keydown", (e)=>{
      if (e.code === "Space"){
        e.preventDefault();
        hold = true;
        if (!running) start();
      }
    });
    addEventListener("keyup", (e)=>{
      if (e.code === "Space") hold = false;
    });
    c.addEventListener("pointerdown", (e)=>{
      c.setPointerCapture(e.pointerId);
      hold = true;
      if (!running) start();
    });
    c.addEventListener("pointerup", ()=> hold=false);
    c.addEventListener("pointercancel", ()=> hold=false);

    btnStart.addEventListener("click", start);
    btnReset.addEventListener("click", ()=>{ hideOverlay(); reset(); });
    ovAgain.addEventListener("click", ()=>{ hideOverlay(); reset(); start(); });
    ovClose.addEventListener("click", hideOverlay);
    ov.addEventListener("click", (e)=>{ if (e.target === ov) hideOverlay(); });

    reset();
  </script>
</body>
</html>
