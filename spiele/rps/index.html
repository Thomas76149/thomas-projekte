<!DOCTYPE html>
<html lang="de" class="thomasfun-fit">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Stein‑Schere‑Papier · thomas.fun</title>
  <meta name="description" content="Stein-Schere-Papier mit Effekten, Streak und Bestscore." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;
      --good:#5dffb4;--bad:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(980px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    .arena{margin-top:12px;display:grid;gap:12px}
    .choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    button.choice{
      font:inherit;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22);
      color:var(--text);padding:14px 12px;cursor:pointer;font-weight:1000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: transform .12s ease, border-color .18s ease, box-shadow .18s ease;
      min-height:44px; touch-action: manipulation;
    }
    button.choice:hover{transform: translateY(-2px);border-color:rgba(154,208,255,.45);box-shadow:0 16px 40px rgba(86,167,255,.10), inset 0 1px 0 rgba(255,255,255,.08)}
    .choice .emo{font-size:2.1rem;display:block;margin-bottom:6px}
    .choice .lab{letter-spacing:.12em;text-transform:uppercase;font-size:.7rem;color:rgba(200,220,255,.85)}
    .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
    .pick{
      border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.18);
      padding:14px 12px;text-align:center;min-height:104px;display:grid;place-items:center;
    }
    .pick .big{font-size:3rem;line-height:1}
    .pick .small{margin-top:6px;color:var(--muted);font-weight:800;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase}
    .badge{font-weight:1000;letter-spacing:.18em;text-transform:uppercase}
    .badge.win{color:var(--good)}
    .badge.lose{color:var(--bad)}
    .badge.draw{color:#ffd76a}
    .hint{margin:6px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    canvas.fx{position:fixed;inset:0;pointer-events:none;z-index:11}
  </style>
  <link rel="stylesheet" href="../_game-shell.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Stein‑Schere‑Papier</h1>
      <a href="../../index.html">← zurück</a>
    </header>
    <div class="card">
      <div class="top">
        <div class="meta">
          <span class="pill" id="streak">Streak: 0</span>
          <span class="pill" id="best">Best: 0</span>
          <span class="pill" id="wld">W/L/D: 0/0/0</span>
        </div>
        <button id="reset" style="font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;min-height:44px;touch-action:manipulation">Reset</button>
      </div>

      <div class="arena">
        <div class="vs">
          <div class="pick">
            <div>
              <div class="big" id="meBig">❔</div>
              <div class="small">Du</div>
            </div>
          </div>
          <div style="text-align:center">
            <div style="font-weight:1000;letter-spacing:.22em;text-transform:uppercase;color:rgba(200,220,255,.8)">vs</div>
            <div class="badge draw" id="result">—</div>
          </div>
          <div class="pick">
            <div>
              <div class="big" id="botBig">❔</div>
              <div class="small">Bot</div>
            </div>
          </div>
        </div>
        <div class="choices">
          <button class="choice" data-m="r"><span class="emo">🪨</span><span class="lab">Stein</span></button>
          <button class="choice" data-m="p"><span class="emo">📄</span><span class="lab">Papier</span></button>
          <button class="choice" data-m="s"><span class="emo">✂️</span><span class="lab">Schere</span></button>
        </div>
        <div class="hint" id="hint">Klick eine Wahl. Ziel: hohe Streak.</div>
      </div>
    </div>
  </div>
  <canvas class="fx" id="fx"></canvas>

  <script>
    const meBig = document.getElementById("meBig");
    const botBig = document.getElementById("botBig");
    const resEl = document.getElementById("result");
    const hint = document.getElementById("hint");
    const streakEl = document.getElementById("streak");
    const bestEl = document.getElementById("best");
    const wldEl = document.getElementById("wld");
    const resetBtn = document.getElementById("reset");

    const fx = document.getElementById("fx");
    const fctx = fx.getContext("2d");
    const fit = () => {
      fx.width = innerWidth * devicePixelRatio;
      fx.height = innerHeight * devicePixelRatio;
      fx.style.width = innerWidth + "px";
      fx.style.height = innerHeight + "px";
      fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    };
    addEventListener("resize", fit); fit();

    const LSK = "rps-best-v1";
    let best = 0; try { best = Number(localStorage.getItem(LSK)) || 0; } catch {}
    let streak = 0, w=0,l=0,d=0;
    const emo = {r:"🪨",p:"📄",s:"✂️"};
    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.08, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    const vibr = (p)=>{ if (navigator.vibrate) navigator.vibrate(p); };

    let parts = [];
    let raf = 0;
    function burst(kind){
      parts = [];
      const cx = innerWidth/2, cy = innerHeight*0.35;
      const cols = kind==="win" ? ["#5dffb4","#22d3ee","#f97316","#ffffff"] :
                   kind==="lose" ? ["#ff6b6b","#ff2d55","#22d3ee","#ffffff"] :
                   ["#ffd76a","#22d3ee","#c9a8ff","#ffffff"];
      const n = kind==="draw" ? 90 : 110;
      for (let i=0;i<n;i++){
        const a = Math.random()*Math.PI*2;
        const sp = 220 + Math.random()*520;
        parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-140,r:2+Math.random()*4,life:0.9+Math.random()*0.6,col:cols[Math.floor(Math.random()*cols.length)]});
      }
      if (!raf) raf = requestAnimationFrame(step);
    }
    function step(){
      fctx.clearRect(0,0,innerWidth,innerHeight);
      const dt = 1/60;
      for (let i=parts.length-1;i>=0;i--){
        const p = parts[i];
        p.life -= dt;
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.vy += 520*dt;
        p.vx *= 0.992;
        if (p.life<=0 || p.y>innerHeight+80) parts.splice(i,1);
      }
      fctx.globalCompositeOperation = "lighter";
      for (const p of parts){
        fctx.globalAlpha = Math.max(0, Math.min(1, p.life));
        fctx.fillStyle = p.col;
        fctx.fillRect(p.x-p.r, p.y-p.r, p.r*2, p.r*2);
      }
      fctx.globalAlpha = 1;
      if (parts.length) raf = requestAnimationFrame(step);
      else { raf = 0; fctx.clearRect(0,0,innerWidth,innerHeight); }
    }

    function sync(){
      streakEl.textContent = `Streak: ${streak}`;
      bestEl.textContent = `Best: ${best}`;
      wldEl.textContent = `W/L/D: ${w}/${l}/${d}`;
    }
    function outcome(me, bot){
      if (me===bot) return "draw";
      if (me==="r" && bot==="s") return "win";
      if (me==="p" && bot==="r") return "win";
      if (me==="s" && bot==="p") return "win";
      return "lose";
    }
    function play(me){
      const bot = ["r","p","s"][Math.floor(Math.random()*3)];
      const out = outcome(me, bot);
      meBig.textContent = emo[me];
      botBig.textContent = emo[bot];
      resEl.className = "badge " + out;
      resEl.textContent = out === "win" ? "SIEG" : out === "lose" ? "LOSE" : "DRAW";
      if (out==="win"){
        streak++;
        w++;
        tone(740,0.08,"sine",0.06); setTimeout(()=>tone(988,0.10,"triangle",0.05),60);
        vibr([18,20,18]);
      } else if (out==="lose"){
        streak = 0;
        l++;
        tone(180,0.14,"sawtooth",0.07); setTimeout(()=>tone(120,0.16,"square",0.05),70);
        vibr([50,40,80]);
      } else {
        d++;
        tone(520,0.1,"triangle",0.05);
        vibr([20,20,20]);
      }
      if (streak > best){
        best = streak;
        try { localStorage.setItem(LSK, String(best)); } catch {}
      }
      burst(out);
      hint.textContent = out==="win" ? "Nice. Weiter!" : out==="lose" ? "Aua. Reset deiner Streak." : "Unentschieden.";
      sync();
    }
    function reset(){
      streak=0; w=0; l=0; d=0;
      meBig.textContent = "❔";
      botBig.textContent = "❔";
      resEl.className = "badge draw";
      resEl.textContent = "—";
      hint.textContent = "Klick eine Wahl. Ziel: hohe Streak.";
      sync();
    }
    document.querySelectorAll("[data-m]").forEach(btn=>{
      btn.addEventListener("click", ()=> play(btn.getAttribute("data-m")));
    });
    resetBtn.addEventListener("click", reset);
    reset();
  </script>
</body>
</html>
