<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPS‑Tester · thomas.fun</title>
  <meta name="description" content="CPS Tester: Wie schnell kannst du klicken? (5s / 10s) mit Bestwert." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;--accent:#f97316;--accent2:#22d3ee;
      --good:#5dffb4;--bad:#ff6b6b;--gold:#ffd76a;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(980px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,select{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:900;
      min-height:44px; touch-action: manipulation;
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    button:disabled{opacity:.45;cursor:not-allowed}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    .big{
      margin:14px 0 0;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      font-weight: 1000;
      letter-spacing: .02em;
      text-align:center;
      text-shadow: 0 0 32px rgba(255,255,255,.12);
    }
    .sub{margin:8px 0 10px;text-align:center;color:rgba(180,200,230,.9);font-weight:800}
    .zone{
      margin-top:12px;
      border-radius:22px;
      border: 1px solid rgba(255,255,255,.12);
      background: radial-gradient(700px 280px at 50% 10%, rgba(34,211,238,.12), rgba(0,0,0,.22));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      padding: 22px 14px;
      text-align:center;
      user-select:none;
      cursor:pointer;
      touch-action: manipulation;
      transition: transform .12s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .zone:hover{transform: translateY(-2px);border-color:rgba(154,208,255,.45);box-shadow:0 18px 46px rgba(86,167,255,.12), inset 0 1px 0 rgba(255,255,255,.08)}
    .zone:active{transform: translateY(1px) scale(.99)}
    .zone strong{display:block;font-size:1.15rem;letter-spacing:.14em;text-transform:uppercase}
    .zone small{display:block;margin-top:8px;color:var(--muted);font-weight:800}
    .hint{margin:10px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>CPS‑Tester</h1>
      <a href="../index.html">← zurück</a>
    </header>
    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnArm">Start</button>
          <button id="btnReset">Reset</button>
          <select id="dur">
            <option value="5000" selected>5 Sekunden</option>
            <option value="10000">10 Sekunden</option>
          </select>
        </div>
        <div class="meta">
          <span class="pill" id="t">Zeit: —</span>
          <span class="pill" id="clicks">Clicks: 0</span>
          <span class="pill" id="best">Best: 0.00</span>
        </div>
      </div>

      <div class="big" id="cpsBig">0.00 CPS</div>
      <div class="sub" id="rating">Klick auf Start.</div>

      <div class="zone" id="zone" role="button" tabindex="0" aria-label="Klickbereich">
        <strong>HIER KLICKEN</strong>
        <small id="zoneHint">Start drücken, dann spam klicken.</small>
      </div>

      <div class="hint">Tipp: gleichmäßige Klicks sind oft besser als komplett random Spam.</div>
    </div>
  </div>

  <script>
    const btnArm = document.getElementById("btnArm");
    const btnReset = document.getElementById("btnReset");
    const durSel = document.getElementById("dur");
    const tEl = document.getElementById("t");
    const clicksEl = document.getElementById("clicks");
    const bestEl = document.getElementById("best");
    const cpsBig = document.getElementById("cpsBig");
    const ratingEl = document.getElementById("rating");
    const zone = document.getElementById("zone");
    const zoneHint = document.getElementById("zoneHint");

    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.06, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    const vibr = (p)=>{ if (navigator.vibrate) navigator.vibrate(p); };

    const LSK = "cps-best-v1";
    let best = 0;
    try { best = Number(localStorage.getItem(LSK)) || 0; } catch {}

    let armed = false;
    let running = false;
    let clicks = 0;
    let t0 = 0;
    let dur = Number(durSel.value);
    let tick = 0;

    function fmt(v){ return (Math.round(v*100)/100).toFixed(2); }
    function sync(){
      const now = performance.now();
      const el = running ? Math.max(0, dur - (now - t0)) : dur;
      tEl.textContent = running ? `Zeit: ${(el/1000).toFixed(2)}s` : "Zeit: —";
      clicksEl.textContent = `Clicks: ${clicks}`;
      bestEl.textContent = `Best: ${fmt(best)}`;
      const sec = running ? Math.max(0.001, (now - t0)/1000) : (dur/1000);
      const cps = clicks / sec;
      cpsBig.textContent = `${fmt(isFinite(cps)?cps:0)} CPS`;
    }

    function cpsRating(cps){
      if (cps >= 10.5) return {t:"WTF", col:"var(--gold)"};
      if (cps >= 8.5) return {t:"sehr stark", col:"var(--good)"};
      if (cps >= 6.5) return {t:"stark", col:"var(--accent2)"};
      if (cps >= 5.0) return {t:"ok", col:"rgba(200,220,255,.9)"};
      return {t:"slow", col:"var(--bad)"};
    }

    function arm(){
      armed = true;
      running = false;
      clicks = 0;
      ratingEl.textContent = "Bereit… klick in die Fläche um zu starten.";
      zoneHint.textContent = "Erster Klick startet den Timer.";
      btnArm.disabled = true;
      sync();
    }

    function start(){
      running = true;
      armed = false;
      clicks = 0;
      t0 = performance.now();
      tone(520,0.08,"triangle",0.05);
      vibr(15);
      ratingEl.textContent = "Go.";
      zoneHint.textContent = "Spam klicken!";
      tickLoop();
    }

    function finish(){
      running = false;
      btnArm.disabled = false;
      const sec = dur/1000;
      const cps = clicks / sec;
      if (cps > best){
        best = cps;
        try { localStorage.setItem(LSK, String(best)); } catch {}
      }
      const r = cpsRating(cps);
      ratingEl.innerHTML = `Result: <span style="color:${r.col};font-weight:1000">${fmt(cps)} CPS · ${r.t}</span>`;
      tone(740,0.09,"sine",0.06); setTimeout(()=>tone(988,0.12,"sine",0.05),60);
      vibr([20,20,20,50]);
      zoneHint.textContent = "Start für neue Runde.";
      sync();
    }

    function click(){
      if (!armed && !running) return;
      if (armed) return start();
      if (!running) return;
      clicks++;
      if (clicks % 8 === 0) vibr(5);
      if (clicks % 6 === 0) tone(660,0.02,"square",0.02);
      sync();
    }

    function tickLoop(){
      if (!running) return;
      clearTimeout(tick);
      const now = performance.now();
      const left = dur - (now - t0);
      if (left <= 0) return finish();
      sync();
      tick = setTimeout(tickLoop, 30);
    }

    function reset(){
      clearTimeout(tick);
      armed = false;
      running = false;
      clicks = 0;
      btnArm.disabled = false;
      ratingEl.textContent = "Klick auf Start.";
      zoneHint.textContent = "Start drücken, dann spam klicken.";
      tEl.textContent = "Zeit: —";
      sync();
    }

    durSel.addEventListener("change", ()=>{ dur = Number(durSel.value); reset(); });
    btnArm.addEventListener("click", arm);
    btnReset.addEventListener("click", reset);
    zone.addEventListener("click", click);
    zone.addEventListener("keydown", (e)=>{ if (e.code==="Space"||e.code==="Enter"){ e.preventDefault(); click(); }});
    reset();
  </script>
</body>
</html>
