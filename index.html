<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thomas.fun · Kleine Web-Sachen</title>
  <meta name="description" content="Spiele und Mini-Apps — anklicken und loslegen. Mit saisonalem Look und Fußball-Modus zur WM/EM." />
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/hub.css?v=7" />
</head>
<body>
  <div id="aurora" aria-hidden="true"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
  <canvas id="bgfx" aria-hidden="true"></canvas>
  <canvas id="confetti" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>
  <div id="scene" aria-hidden="true">
    <svg viewBox="0 0 1440 620" preserveAspectRatio="xMidYMax slice">
      <defs>
        <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--sky-glow)" stop-opacity="0"/>
          <stop offset=".62" stop-color="var(--sky-glow)" stop-opacity="0"/>
          <stop offset="1" stop-color="var(--sky-glow)" stop-opacity=".85"/>
        </linearGradient>
        <radialGradient id="sunG"><stop offset="0" stop-color="var(--sun-glow)" stop-opacity=".9"/><stop offset="1" stop-color="var(--sun-glow)" stop-opacity="0"/></radialGradient>
        <linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--ground)"/><stop offset="1" stop-color="var(--ground-dk)"/></linearGradient>
      </defs>
      <rect class="sky" x="0" y="0" width="1440" height="620" fill="url(#skyG)"/>
      <g class="stars" fill="#dfe9ff"><circle cx="180" cy="90" r="1.6"/><circle cx="420" cy="60" r="1.3"/><circle cx="650" cy="120" r="1.7"/><circle cx="900" cy="70" r="1.3"/><circle cx="1120" cy="110" r="1.6"/><circle cx="1300" cy="60" r="1.4"/><circle cx="300" cy="150" r="1.2"/><circle cx="760" cy="50" r="1.4"/></g>
      <circle class="sun-glow" cx="1150" cy="180" r="200" fill="url(#sunG)"/>
      <g class="rays" stroke="var(--sun)" stroke-width="5" stroke-linecap="round" opacity=".5">
        <line x1="1150" y1="80" x2="1150" y2="20"/><line x1="1150" y1="280" x2="1150" y2="340"/>
        <line x1="1050" y1="180" x2="990" y2="180"/><line x1="1250" y1="180" x2="1310" y2="180"/>
        <line x1="1080" y1="110" x2="1038" y2="68"/><line x1="1220" y1="250" x2="1262" y2="292"/>
        <line x1="1080" y1="250" x2="1038" y2="292"/><line x1="1220" y1="110" x2="1262" y2="68"/>
      </g>
      <circle class="sun" cx="1150" cy="180" r="50" fill="var(--sun)"/>
      <g class="clouds" fill="var(--cloud)">
        <g class="cl cl1"><ellipse cx="0" cy="0" rx="60" ry="26"/><ellipse cx="48" cy="8" rx="46" ry="22"/><ellipse cx="-44" cy="10" rx="40" ry="20"/></g>
        <g class="cl cl2"><ellipse cx="0" cy="0" rx="50" ry="22"/><ellipse cx="40" cy="6" rx="38" ry="18"/><ellipse cx="-38" cy="8" rx="34" ry="17"/></g>
        <g class="cl cl3"><ellipse cx="0" cy="0" rx="42" ry="18"/><ellipse cx="34" cy="6" rx="32" ry="15"/></g>
      </g>
      <path class="hill-far" d="M0 470 Q 380 392 760 452 T 1440 442 L1440 620 L0 620 Z" fill="var(--hill-far)"/>
      <path class="hill-mid" d="M0 520 Q 440 466 900 512 T 1440 506 L1440 620 L0 620 Z" fill="var(--hill-mid)"/>
      <!-- ferne kleine Bäume -->
      <g class="distant" fill="var(--hill-mid)"><path d="M1010 506 q-4 -34 14 -34 q18 0 14 34 z"/><path d="M1070 510 q-3 -26 11 -26 q14 0 11 26 z"/></g>
      <path class="ground" d="M0 548 Q 500 520 980 542 T 1440 538 L1440 620 L0 620 Z" fill="url(#groundG)"/>
      <!-- Hauptbaum -->
      <g class="tree">
        <g class="branch" stroke="var(--bark)" stroke-width="9" stroke-linecap="round" fill="none">
          <path d="M300 556 L300 392"/><path d="M300 452 L236 372"/><path d="M300 470 L372 384"/>
          <path d="M300 410 L254 356"/><path d="M300 416 L350 352"/><path d="M268 404 L232 366"/><path d="M334 408 L372 372"/>
        </g>
        <path class="trunk" d="M288 560 L290 430 Q300 416 310 430 L312 560 Z" fill="var(--bark)"/>
        <g class="snowcap" fill="#eef5ff">
          <circle cx="236" cy="372" r="13"/><circle cx="372" cy="384" r="13"/><circle cx="300" cy="360" r="16"/><circle cx="254" cy="356" r="10"/><circle cx="350" cy="352" r="10"/>
        </g>
        <g class="canopy">
          <circle class="f f3" cx="300" cy="372" r="78"/>
          <circle class="f f2" cx="236" cy="392" r="54"/><circle class="f f2" cx="368" cy="392" r="54"/>
          <circle class="f f1" cx="300" cy="338" r="60"/><circle class="f f3" cx="262" cy="338" r="44"/><circle class="f f3" cx="342" cy="340" r="44"/>
          <circle class="f f1" cx="300" cy="420" r="56"/><circle class="f f2" cx="246" cy="430" r="38"/><circle class="f f2" cx="356" cy="430" r="38"/>
          <circle class="f f1" cx="286" cy="300" r="34"/><circle class="f f3" cx="324" cy="306" r="30"/>
          <g class="blossom" fill="#ffd6ec"><circle cx="262" cy="338" r="6"/><circle cx="342" cy="360" r="6"/><circle cx="300" cy="312" r="6"/><circle cx="236" cy="400" r="6"/><circle cx="366" cy="398" r="6"/><circle cx="300" cy="430" r="6"/><circle cx="320" cy="350" r="5"/><circle cx="280" cy="380" r="5"/></g>
        </g>
      </g>
    </svg>
  </div>
  <div class="wrap">
    <a class="topband" id="tband" href="#"></a>

    <header>
      <div class="hrow">
        <p class="logo">thomas<span>.fun</span> <span class="ball" id="logoBall" role="button" tabindex="0" title="Klick mich…" aria-label="Ball">⚽</span></p>
        <button class="seasonbtn" id="seasonBtn" type="button">🔁 Auto</button>
      </div>
      <p class="tagline">Kleine Dinge zum Anklicken — Vanilla HTML, CSS &amp; JS.</p>
      <p class="subtag">Spiele, Mini‑Tools und Tests, ordentlich nach Abteilungen sortiert. Such dir was aus, klick drauf, fertig.</p>
      <a class="back" href="#" data-portfolio-link>Zum Portfolio</a>
    </header>

    <div class="toolbar" aria-label="Suche & Filter">
      <div class="search" role="search">
        <span aria-hidden="true">⌕</span>
        <input id="q" type="search" placeholder="Suche… (z.B. pong, wm, online, puzzle)" autocomplete="off" />
        <button class="chip" id="btnClear" type="button" aria-pressed="false">Reset</button>
      </div>
      <div class="chips" role="group" aria-label="Filter">
        <button class="chip" type="button" data-filter="all" aria-pressed="true">Alle</button>
        <button class="chip" type="button" data-filter="game" aria-pressed="false">Spiele</button>
        <button class="chip" type="button" data-filter="online" aria-pressed="false">Online</button>
        <button class="chip" type="button" data-filter="puzzle" aria-pressed="false">Puzzle</button>
        <button class="chip" type="button" data-filter="data" aria-pressed="false">Daten</button>
        <button class="chip" type="button" data-filter="test" aria-pressed="false">Tests</button>
        <button class="chip" type="button" data-filter="mobile" aria-pressed="false">Handy</button>
      </div>
    </div>

    <p class="mutedLine" id="countLine">—</p>

    <main id="cats"></main>

    <footer>
      Team-Projekt: <a href="https://orbitex-demo.pages.dev" target="_blank" rel="noopener noreferrer">Orbitex</a>
      · <a href="#" data-portfolio-link>Portfolio</a>
    </footer>
  </div>

  <div class="toast" id="toast"></div>
  <div class="takeover" id="takeover" aria-hidden="true">
    <div class="inner">
      <div class="big-emoji">🏆</div>
      <h1>Titel</h1>
      <p>Untertitel</p>
      <button type="button">Schließen →</button>
    </div>
  </div>

  <script src="js/site-config.js?v=2"></script>
  <script src="js/portfolio-link.js?v=2"></script>
  <script src="js/hub-data.js?v=17"></script>
  <script src="js/hub.js?v=9"></script>
</body>
</html>
