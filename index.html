<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thomas.fun · Kleine Web-Sachen</title>
  <meta name="description" content="Spiele und Mini-Apps — anklicken und loslegen. Mit saisonalem Look und Fußball-Modus zur WM/EM." />
  <meta name="theme-color" content="#0a0b0f" />
  <meta name="color-scheme" content="dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <div id="scene" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice">
      <defs>
        <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--sky-glow)" stop-opacity="0"/>
          <stop offset=".55" stop-color="var(--sky-glow)" stop-opacity="0"/>
          <stop offset="1" stop-color="var(--sky-glow)" stop-opacity=".9"/>

        <radialGradient id="sunG"><stop offset="0" stop-color="var(--sun-glow)" stop-opacity=".9"/><stop offset="1" stop-color="var(--sun-glow)" stop-opacity="0"/></radialGradient>
        <linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--ground)"/><stop offset="1" stop-color="var(--ground-dk)"/></linearGradient>
        <radialGradient id="canShade" cx="38%" cy="32%" r="75%"><stop offset="0" stop-color="var(--foliage3)"/><stop offset=".55" stop-color="var(--foliage1)"/><stop offset="1" stop-color="var(--foliage2)"/></radialGradient>
      </defs>
      <rect class="sky" x="0" y="0" width="1440" height="900" fill="url(#skyG)"/>

        <line x1="1160" y1="105" x2="1160" y2="40"/><line x1="1160" y1="325" x2="1160" y2="390"/>
        <line x1="1050" y1="215" x2="985" y2="215"/><line x1="1270" y1="215" x2="1335" y2="215"/>
        <line x1="1085" y1="140" x2="1040" y2="95"/><line x1="1235" y1="290" x2="1280" y2="335"/>

      <circle class="sun" cx="1160" cy="215" r="56" fill="var(--sun)"/>

        <g class="cl cl1"><ellipse cx="0" cy="0" rx="64" ry="28"/><ellipse cx="50" cy="8" rx="48" ry="23"/><ellipse cx="-46" cy="10" rx="42" ry="21"/></g>

        <g class="cl cl3"><ellipse cx="0" cy="0" rx="44" ry="19"/><ellipse cx="36" cy="6" rx="34" ry="16"/></g>

      <!-- echte ferne Bäumchen (Tiefe) -->
      <g class="distant">
        <g transform="translate(1030,640)"><rect x="-3" y="-22" width="6" height="30" rx="3" fill="var(--bark)"/><circle cx="0" cy="-30" r="22" fill="var(--foliage2)"/></g>
        <g transform="translate(1110,650)"><rect x="-3" y="-18" width="6" height="26" rx="3" fill="var(--bark)"/><circle cx="0" cy="-26" r="18" fill="var(--foliage2)"/></g>

      <path class="ground" d="M0 736 Q 520 706 1000 730 T 1440 724 L1440 900 L0 900 Z" fill="url(#groundG)"/>

        <ellipse class="tshadow" cx="300" cy="794" rx="132" ry="20" fill="rgba(0,0,0,.3)"/>
        <path class="trunk" d="M278 788 Q300 778 322 788 L314 678 Q300 666 286 678 Z" fill="var(--bark)"/>

        <g class="winter" stroke="var(--bark)" stroke-linecap="round" fill="none">
          <path d="M300 676 Q298 604 268 548" stroke-width="12"/>
          <path d="M300 676 Q302 604 332 548" stroke-width="12"/>
          <path d="M300 632 Q300 566 300 506" stroke-width="9"/>
          <path d="M268 548 Q248 516 212 498" stroke-width="7"/>
          <path d="M268 548 Q260 510 248 478" stroke-width="6"/>
          <path d="M332 548 Q352 516 388 500" stroke-width="7"/>
          <path d="M332 548 Q340 510 352 480" stroke-width="6"/>
          <path d="M300 506 Q288 484 270 474" stroke-width="5"/>
          <path d="M300 506 Q312 484 330 474" stroke-width="5"/>
          <path d="M300 506 Q300 486 300 468" stroke-width="4"/>
          <path d="M212 498 Q196 486 180 482" stroke-width="4"/><path d="M388 500 Q404 488 420 484" stroke-width="4"/>

          <path d="M180 482 q-12 -4 -22 -3" stroke-width="3"/><path d="M420 484 q12 -4 22 -3" stroke-width="3"/>
          <path d="M270 474 q-8 -8 -18 -10" stroke-width="3"/><path d="M330 474 q8 -8 18 -10" stroke-width="3"/>

        </g>
        <!-- belaubte Krone (Referenz-Stil) -->
        <g class="canopy">
          <circle class="f fb" cx="316" cy="602" r="120"/>
          <circle class="f fm" cx="300" cy="582" r="112"/>
          <circle class="f fm" cx="232" cy="524" r="52"/><circle class="f fm" cx="300" cy="496" r="60"/><circle class="f fm" cx="372" cy="528" r="52"/>
          <circle class="f fm" cx="196" cy="600" r="56"/><circle class="f fm" cx="404" cy="600" r="56"/>

        <path d="M60 548 q60 -15 120 -3 q28 4 52 0"/>
        <path d="M120 612 q44 -11 90 -2 q26 6 30 -8 q4 -11 -7 -13"/>
        <path d="M520 402 q46 -12 94 -3 q30 5 56 0 q22 -1 23 -17 q-1 -11 -12 -11 q-9 1 -6 10"/>
        <path d="M650 500 q60 -15 120 -3 q28 4 52 0"/>
        <path d="M980 360 q40 -10 84 -3 q24 5 28 -9"/>
        <path d="M1060 560 q44 -11 90 -2 q26 6 30 -8 q4 -11 -7 -13"/>
        <path d="M1180 460 q60 -15 118 -3 q28 4 52 0"/>
      </g>

  <div class="wrap">
    <a class="topband" id="tband" href="#"></a>

    <header>
      <div class="hrow">
        <p class="logo">thomas<span>.fun</span> <span class="ball" id="logoBall" role="button" tabindex="0" title="Klick mich…" aria-label="Ball">⚽</span></p>
        <button class="seasonbtn" id="seasonBtn" type="button">🔁 Auto</button>
      </div>
      <p class="tagline">Kleine Dinge zum Anklicken — Vanilla HTML, CSS &amp; JS.</p>
      <p class="subtag">Spiele, Mini‑Tools und Tests, ordentlich nach Abteilungen sortiert. Such dir was aus, klick drauf, fertig.</p>
      <a class="back" href="#" data-portfolio-link>Zum Portfolio</a>

    <div class="toolbar" aria-label="Suche & Filter">
      <div class="search" role="search">
        <span aria-hidden="true">⌕</span>

        <button class="chip" id="btnClear" type="button" aria-pressed="false">Reset</button>
      </div>
      <div class="chips" role="group" aria-label="Filter">
        <button class="chip" type="button" data-filter="all" aria-pressed="true">Alle</button>

        <button class="chip" type="button" data-filter="online" aria-pressed="false">Online</button>
        <button class="chip" type="button" data-filter="puzzle" aria-pressed="false">Puzzle</button>
        <button class="chip" type="button" data-filter="data" aria-pressed="false">Daten</button>
        <button class="chip" type="button" data-filter="test" aria-pressed="false">Tests</button>
        <button class="chip" type="button" data-filter="mobile" aria-pressed="false">Handy</button>

    <main id="cats"></main>
