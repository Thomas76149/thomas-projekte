<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thomas.fun · Kleine Web-Sachen</title>
  <meta name="description" content="Spiele und Mini-Apps — anklicken und loslegen. Mit saisonalem Look und Fußball-Modus zur WM/EM." />
  <meta name="theme-color" content="#0a0b0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/hub.css?v=6" />
</head>
<body>
  <div id="aurora" aria-hidden="true"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
  <canvas id="bgfx" aria-hidden="true"></canvas>
  <canvas id="confetti" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>
  <div id="tree" aria-hidden="true">
    <svg viewBox="0 0 200 260">
      <g class="branch" stroke="#5a3a22" stroke-width="7" stroke-linecap="round" fill="none">
        <path d="M100 250 L100 118"/><path d="M100 150 L58 98"/><path d="M100 162 L142 108"/><path d="M100 128 L76 92"/><path d="M100 132 L126 92"/>
      </g>
      <path class="trunk" d="M92 256 L92 150 Q100 140 108 150 L108 256 Z"/>
      <g class="snowcap" fill="#eaf4ff">
        <circle cx="58" cy="98" r="8"/><circle cx="142" cy="108" r="8"/><circle cx="100" cy="116" r="10"/><circle cx="76" cy="92" r="6"/><circle cx="126" cy="92" r="6"/>
      </g>
      <g class="canopy">
        <circle class="leaf l1" cx="100" cy="78" r="48"/><circle class="leaf l2" cx="60" cy="100" r="34"/><circle class="leaf l3" cx="140" cy="100" r="34"/>
        <circle class="leaf l1" cx="100" cy="120" r="40"/><circle class="leaf l2" cx="80" cy="68" r="26"/><circle class="leaf l3" cx="124" cy="66" r="26"/>
        <g class="blossom" fill="#ffd1ec"><circle cx="80" cy="70" r="5"/><circle cx="120" cy="90" r="5"/><circle cx="100" cy="58" r="5"/><circle cx="64" cy="106" r="5"/><circle cx="136" cy="106" r="5"/><circle cx="106" cy="112" r="5"/></g>
      </g>
    </svg>
  </div>
  <div class="wrap">
    <a class="topband" id="tband" href="#"></a>

    <header>
      <div class="hrow">
        <p class="logo">thomas<span>.fun</span> <span class="ball" id="logoBall" role="button" tabindex="0" title="Klick mich…" aria-label="Ball">⚽</span></p>
        <button class="seasonbtn" id="seasonBtn" type="button">🔁 Auto</button>
      </div>
      <p class="tagline">Kleine Dinge zum Anklicken — Vanilla HTML, CSS &amp; JS.</p>
      <p class="subtag">Spiele, Mini‑Tools und Tests, ordentlich nach Abteilungen sortiert. Such dir was aus, klick drauf, fertig.</p>
      <a class="back" href="#" data-portfolio-link>Zum Portfolio</a>
    </header>

    <div class="toolbar" aria-label="Suche & Filter">
      <div class="search" role="search">
        <span aria-hidden="true">⌕</span>
        <input id="q" type="search" placeholder="Suche… (z.B. pong, wm, online, puzzle)" autocomplete="off" />
        <button class="chip" id="btnClear" type="button" aria-pressed="false">Reset</button>
      </div>
      <div class="chips" role="group" aria-label="Filter">
        <button class="chip" type="button" data-filter="all" aria-pressed="true">Alle</button>
        <button class="chip" type="button" data-filter="game" aria-pressed="false">Spiele</button>
        <button class="chip" type="button" data-filter="online" aria-pressed="false">Online</button>
        <button class="chip" type="button" data-filter="puzzle" aria-pressed="false">Puzzle</button>
        <button class="chip" type="button" data-filter="data" aria-pressed="false">Daten</button>
        <button class="chip" type="button" data-filter="test" aria-pressed="false">Tests</button>
        <button class="chip" type="button" data-filter="mobile" aria-pressed="false">Handy</button>
      </div>
    </div>

    <p class="mutedLine" id="countLine">—</p>

    <main id="cats"></main>

    <footer>
      Team-Projekt: <a href="https://orbitex-demo.pages.dev" target="_blank" rel="noopener noreferrer">Orbitex</a>
      · <a href="#" data-portfolio-link>Portfolio</a>
    </footer>
  </div>

  <div class="toast" id="toast"></div>
  <div class="takeover" id="takeover" aria-hidden="true">
    <div class="inner">
      <div class="big-emoji">🏆</div>
      <h1>Titel</h1>
      <p>Untertitel</p>
      <button type="button">Schließen →</button>
    </div>
  </div>

  <script src="js/site-config.js?v=2"></script>
  <script src="js/portfolio-link.js?v=2"></script>
  <script src="js/hub-data.js?v=17"></script>
  <script src="js/hub.js?v=8"></script>
</body>
</html>
