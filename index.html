<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thomas.fun · Kleine Web-Sachen</title>
  <meta name="description" content="Spiele und Mini-Apps — anklicken und loslegen." />
  <meta name="theme-color" content="#0c0c0f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/hub.css?v=3" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <p class="logo">thomas<span>.fun</span></p>
      <p class="tagline">Kleine Dinge zum Anklicken — Vanilla HTML, CSS &amp; JS.</p>
      <p class="subtag">Spiele, Mini‑Tools und Tests. Such dir was aus, klick drauf, fertig.</p>
      <a class="back" href="#" data-portfolio-link>Zum Portfolio</a>
    </header>

    <div class="toolbar" aria-label="Suche & Filter">
      <div class="search" role="search">
        <span aria-hidden="true">⌕</span>
        <input id="q" type="search" placeholder="Suche… (z.B. pong, test, arcade)" autocomplete="off" />
        <button class="chip" id="btnClear" type="button" aria-pressed="false">Reset</button>
      </div>
      <div class="chips" role="group" aria-label="Filter">
        <button class="chip" type="button" data-filter="all" aria-pressed="true">Alle</button>
        <button class="chip" type="button" data-filter="game" aria-pressed="false">Spiele</button>
        <button class="chip" type="button" data-filter="test" aria-pressed="false">Tests</button>
        <button class="chip" type="button" data-filter="online" aria-pressed="false">Online</button>
        <button class="chip" type="button" data-filter="arcade" aria-pressed="false">Arcade</button>
        <button class="chip" type="button" data-filter="puzzle" aria-pressed="false">Puzzle</button>
        <button class="chip" type="button" data-filter="mobile" aria-pressed="false">Handy</button>
      </div>
    </div>

    <p class="mutedLine" id="countLine">—</p>

    <div class="section" id="secGames">
      <h2>Spiele</h2>
      <div class="grid" id="gridGames"></div>
    </div>

    <div class="section" id="secOnline">
      <h2>Online</h2>
      <div class="grid" id="gridOnline"></div>
    </div>

    <div class="section" id="secTests">
      <h2>Tests & Tools</h2>
      <div class="grid" id="gridTests"></div>
    </div>

    <footer>
      Team-Projekt: <a href="https://orbitex-demo.pages.dev" target="_blank" rel="noopener noreferrer">Orbitex</a>
      · <a href="#" data-portfolio-link>Portfolio</a>
    </footer>
  </div>

  <script src="js/site-config.js?v=2"></script>
  <script src="js/portfolio-link.js?v=2"></script>
  <script src="js/hub-data.js?v=6"></script>
  <script src="js/hub.js?v=5"></script>
</body>
</html>
