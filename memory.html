<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory · thomas.fun</title>
  <meta name="description" content="Mini Memory: Paare finden, Bestzeit jagen." />
  <meta name="theme-color" content="#0c0c0f" />
  <style>
    :root{
      --bg:#0c0c0f;--card:#16161c;--border:#2a2a34;--text:#f4f4f5;--muted:#a1a1aa;
      --accent:#f97316;--accent2:#22d3ee;--good:#5dffb4;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Outfit,sans-serif}
    a{color:var(--accent2);text-decoration:none}
    .wrap{width:min(980px,92vw);display:grid;gap:14px}
    header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase}
    .card{background:linear-gradient(155deg,rgba(38,52,92,.96),rgba(12,16,36,.98));
      border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,select{
      font:inherit;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);
      color:var(--text);padding:10px 14px;cursor:pointer;font-weight:800
    }
    button.primary{border-color:rgba(93,255,180,.55);background:linear-gradient(165deg,rgba(50,120,95,.95),rgba(18,48,42,.98))}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.9rem}
    .pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.22)}
    .grid{display:grid;gap:10px;margin-top:14px}
    .grid.g4{grid-template-columns:repeat(4,1fr)}
    .grid.g5{grid-template-columns:repeat(5,1fr)}
    .grid.g6{grid-template-columns:repeat(6,1fr)}
    .tile{
      position:relative;aspect-ratio:1/1;border-radius:18px;border:1px solid rgba(255,255,255,.12);
      background:radial-gradient(220px 220px at 50% 30%, rgba(34,211,238,.12), rgba(0,0,0,.22));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06); cursor:pointer; user-select:none;
      transform-style:preserve-3d; transition: transform .18s ease, border-color .18s ease;
    }
    .tile:hover{border-color:rgba(154,208,255,.4)}
    .tile.flip{transform:rotateY(180deg)}
    .face{
      position:absolute;inset:0;display:grid;place-items:center;border-radius:18px;
      backface-visibility:hidden;
    }
    .back{
      font-weight:1000;letter-spacing:.08em;text-transform:uppercase;color:rgba(200,220,255,.85);font-size:.8rem;
    }
    .front{
      transform:rotateY(180deg);
      font-size:clamp(1.5rem,5vw,2.2rem);
      background:linear-gradient(165deg, rgba(0,0,0,.18), rgba(0,0,0,.28));
    }
    .tile.matched{
      border-color:rgba(93,255,180,.55);
      box-shadow:0 0 28px rgba(93,255,180,.14), inset 0 1px 0 rgba(255,255,255,.08);
      cursor:default;
    }
    .hint{margin:10px 0 0;color:var(--muted);font-size:.9rem;text-align:center}
    .overlay{position:fixed;inset:0;display:none;place-items:center;z-index:10;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
    .overlay.show{display:grid}
    .panel{
      width:min(560px,92vw);border-radius:22px;border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, rgba(18, 26, 54, 0.98), rgba(6, 8, 18, 0.995));
      box-shadow:0 26px 80px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
      padding:18px 16px 16px;text-align:center
    }
    .panel h2{margin:0;font-size:clamp(2rem,6vw,2.8rem);font-weight:1000}
    .panel p{margin:10px 0 14px;color:rgba(180,200,230,.9);font-weight:700}
    .cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    canvas.fx{position:fixed;inset:0;pointer-events:none;z-index:11}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Memory</h1>
      <a href="../index.html">← zurück</a>
    </header>

    <div class="card">
      <div class="top">
        <div class="controls">
          <button class="primary" id="btnNew">Neues Spiel</button>
          <select id="size">
            <option value="4">4×4 (leicht)</option>
            <option value="5">5×4 (medium)</option>
            <option value="6" selected>6×4 (normal)</option>
          </select>
        </div>
        <div class="meta">
          <span class="pill" id="moves">Züge: 0</span>
          <span class="pill" id="time">Zeit: 0.0s</span>
          <span class="pill" id="best">Best: —</span>
        </div>
      </div>
      <div class="grid g6" id="grid"></div>
      <div class="hint" id="hint">Finde alle Paare.</div>
    </div>
  </div>

  <div class="overlay" id="ov" aria-hidden="true">
    <div class="panel">
      <h2 id="ovTitle">Fertig!</h2>
      <p id="ovText">—</p>
      <div class="cta">
        <button class="primary" id="ovAgain">Nochmal</button>
        <button id="ovClose">Schließen</button>
      </div>
    </div>
  </div>
  <canvas class="fx" id="fx"></canvas>

  <script>
    const grid = document.getElementById("grid");
    const btnNew = document.getElementById("btnNew");
    const sizeSel = document.getElementById("size");
    const movesEl = document.getElementById("moves");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const hint = document.getElementById("hint");
    const ov = document.getElementById("ov");
    const ovTitle = document.getElementById("ovTitle");
    const ovText = document.getElementById("ovText");
    const ovAgain = document.getElementById("ovAgain");
    const ovClose = document.getElementById("ovClose");
    const fx = document.getElementById("fx");
    const fctx = fx.getContext("2d");

    const emoji = ["🛰️","🪐","🚀","🛸","🌙","⭐","☄️","🌌","🧊","🔥","⚡","🧪","🧲","🪙","🧠","🦾","🧿","🧬","🔋","🧯"];
    let tiles = [];
    let first = null, lock = false;
    let moves = 0, matched = 0;
    let t0 = 0, timer = 0;
    const AC = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function tone(freq, dur=0.12, type="sine", vol=0.05){
      try{
        actx ||= new AC();
        if (actx.state === "suspended") actx.resume();
        const t0 = actx.currentTime;
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch {}
    }
    const vibr = (p)=>{ if (navigator.vibrate) navigator.vibrate(p); };
    const fitFx = () => {
      fx.width = innerWidth * devicePixelRatio;
      fx.height = innerHeight * devicePixelRatio;
      fx.style.width = innerWidth + "px";
      fx.style.height = innerHeight + "px";
      fctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    };
    addEventListener("resize", fitFx);
    fitFx();
    let parts = [];
    let raf = 0;
    function burst(){
      parts = [];
      const cx = innerWidth/2, cy = innerHeight*0.35;
      const cols = ["#5dffb4","#22d3ee","#f97316","#ffffff","#c9a8ff"];
      for (let i=0;i<140;i++){
        const a = Math.random()*Math.PI*2;
        const sp = 220 + Math.random()*560;
        parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-160,r:2+Math.random()*4,life:1+Math.random()*0.7,col:cols[Math.floor(Math.random()*cols.length)]});
      }
      if (!raf) raf = requestAnimationFrame(step);
    }
    function step(){
      fctx.clearRect(0,0,innerWidth,innerHeight);
      const dt = 1/60;
      for (let i=parts.length-1;i>=0;i--){
        const p = parts[i];
        p.life -= dt;
        p.x += p.vx*dt;
        p.y += p.vy*dt;
        p.vy += 520*dt;
        p.vx *= 0.993;
        if (p.life<=0 || p.y>innerHeight+80) parts.splice(i,1);
      }
      fctx.globalCompositeOperation = "lighter";
      for (const p of parts){
        fctx.globalAlpha = Math.max(0, Math.min(1, p.life));
        fctx.fillStyle = p.col;
        fctx.fillRect(p.x-p.r, p.y-p.r, p.r*2, p.r*2);
      }
      fctx.globalAlpha = 1;
      if (parts.length) raf = requestAnimationFrame(step);
      else { raf = 0; fctx.clearRect(0,0,innerWidth,innerHeight); }
    }
    function showOverlay(text){
      ov.classList.add("show");
      ov.setAttribute("aria-hidden","false");
      ovTitle.textContent = "Fertig!";
      ovText.textContent = text;
      burst();
      tone(740,0.09,"sine",0.06); setTimeout(()=>tone(988,0.12,"sine",0.05),60); setTimeout(()=>tone(1244,0.14,"triangle",0.04),130);
      vibr([30,40,30,70]);
    }
    function hideOverlay(){
      ov.classList.remove("show");
      ov.setAttribute("aria-hidden","true");
    }
    ov.addEventListener("click",(e)=>{ if (e.target===ov) hideOverlay(); });
    ovAgain.addEventListener("click", ()=>{ hideOverlay(); setup(); });
    ovClose.addEventListener("click", hideOverlay);

    function keyBest(cols){
      return `memory-best-${cols}x4-v1`;
    }
    function loadBest(cols){
      try { return Number(localStorage.getItem(keyBest(cols))) || 0; } catch { return 0; }
    }
    function saveBest(cols, sec){
      try { localStorage.setItem(keyBest(cols), String(sec)); } catch {}
    }

    function shuffle(a){
      for (let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function startTimer(){
      stopTimer();
      t0 = performance.now();
      timer = setInterval(()=> {
        const sec = (performance.now()-t0)/1000;
        timeEl.textContent = `Zeit: ${sec.toFixed(1)}s`;
      }, 80);
    }
    function stopTimer(){
      if (timer) clearInterval(timer);
      timer = 0;
    }

    function setup(){
      const cols = Number(sizeSel.value);
      grid.className = `grid g${cols}`;
      grid.style.gridTemplateRows = "repeat(4, 1fr)";
      const pairs = (cols*4)/2;
      const picked = shuffle(emoji.slice()).slice(0, pairs);
      tiles = shuffle([...picked, ...picked]).map((sym, idx)=>({sym, idx, matched:false, up:false}));
      first = null; lock = false;
      moves = 0; matched = 0;
      movesEl.textContent = "Züge: 0";
      timeEl.textContent = "Zeit: 0.0s";
      const best = loadBest(cols);
      bestEl.textContent = best ? `Best: ${best.toFixed(1)}s` : "Best: —";
      hint.textContent = "Finde alle Paare.";
      render();
      startTimer();
    }

    function render(){
      grid.innerHTML = "";
      for (const t of tiles){
        const el = document.createElement("button");
        el.type = "button";
        el.className = "tile";
        if (t.up) el.classList.add("flip");
        if (t.matched) el.classList.add("matched");
        el.disabled = lock || t.matched;
        el.innerHTML = `<div class="face back">MEM</div><div class="face front">${t.sym}</div>`;
        el.addEventListener("click", ()=> flip(t.idx));
        grid.appendChild(el);
      }
    }

    function flip(idx){
      if (lock) return;
      const t = tiles.find(x=>x.idx===idx);
      if (!t || t.up || t.matched) return;
      t.up = true;
      // tiny flip juice
      tone(520, 0.05, "triangle", 0.035);
      if (navigator.vibrate) navigator.vibrate(8);
      if (!first){
        first = t;
        render();
        return;
      }
      moves++;
      movesEl.textContent = `Züge: ${moves}`;
      render();
      if (t.sym === first.sym){
        t.matched = true;
        first.matched = true;
        matched += 2;
        tone(740, 0.06, "sine", 0.05);
        if (navigator.vibrate) navigator.vibrate([10, 16, 10]);
        first = null;
        render();
        if (matched === tiles.length){
          stopTimer();
          const sec = (performance.now()-t0)/1000;
          const cols = Number(sizeSel.value);
          const best = loadBest(cols);
          if (!best || sec < best) saveBest(cols, sec);
          bestEl.textContent = `Best: ${Math.min(sec, best||sec).toFixed(1)}s`;
          hint.textContent = `Fertig! ${moves} Züge · ${sec.toFixed(1)}s`;
          showOverlay(`${moves} Züge · ${sec.toFixed(1)}s`);
        }
        return;
      }
      lock = true;
      const prev = first;
      first = null;
      setTimeout(()=>{
        t.up = false;
        prev.up = false;
        lock = false;
        render();
      }, 520);
    }

    btnNew.addEventListener("click", setup);
    sizeSel.addEventListener("change", setup);
    setup();
  </script>
</body>
</html>
