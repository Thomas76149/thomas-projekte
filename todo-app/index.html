<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Liste</title>
  <meta name="description" content="Aufgaben lokal im Browser speichern — ohne Framework." />
  <meta name="theme-color" content="#05070c" />
  <style>
    :root {
      --bg: #05070c;
      --bg2: #070a12;
      --panel: rgba(255, 255, 255, 0.06);
      --stroke: rgba(154, 208, 255, 0.22);
      --accent: #56a7ff;
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.58);
      --good: #5dffb4;
      --danger: #ff6b6b;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(900px 500px at 70% -10%, rgba(86, 167, 255, 0.15), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      padding: 24px 16px 40px;
    }
    .shell {
      max-width: 520px;
      margin: 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .lead {
      margin: 8px 0 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    input[type="text"] {
      flex: 1 1 200px;
      min-width: 0;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text);
      font: inherit;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: var(--radius);
      border: 1px solid rgba(154, 208, 255, 0.35);
      background: linear-gradient(135deg, rgba(86, 167, 255, 0.95), rgba(120, 190, 255, 0.7));
      color: #07101f;
      padding: 12px 18px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.68rem;
    }
    button.ghost {
      background: transparent;
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.14);
    }
    button.danger {
      border-color: rgba(255, 107, 107, 0.45);
      color: #ffd6d6;
      background: rgba(80, 20, 20, 0.45);
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .filters button {
      opacity: 0.65;
    }
    .filters button.is-active {
      opacity: 1;
      box-shadow: 0 0 0 2px rgba(86, 167, 255, 0.45);
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: calc(var(--radius) + 2px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--panel);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.22) inset;
    }
    li.done span {
      text-decoration: line-through;
      color: var(--muted);
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    .task-text {
      word-break: break-word;
      font-size: 0.95rem;
    }
    .row-actions {
      display: flex;
      gap: 6px;
    }
    .row-actions button {
      padding: 8px 10px;
      font-size: 0.6rem;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 28px 12px;
      font-size: 0.9rem;
    }
    footer {
      margin-top: 24px;
      font-size: 0.85rem;
    }
    footer a {
      color: rgba(154, 208, 255, 0.95);
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>To-Do</h1>
    <p class="lead">Einträge werden nur auf diesem Gerät gespeichert (localStorage).</p>

    <form id="form" autocomplete="off">
      <input type="text" id="field" maxlength="200" placeholder="Neue Aufgabe…" aria-label="Neue Aufgabe" />
      <button type="submit">Hinzufügen</button>
    </form>

    <div class="filters" role="tablist" aria-label="Filter">
      <button type="button" class="ghost is-active" data-filter="all">Alle</button>
      <button type="button" class="ghost" data-filter="active">Offen</button>
      <button type="button" class="ghost" data-filter="done">Erledigt</button>
      <button type="button" class="danger ghost" id="clearDone" style="margin-left:auto">Erledigte löschen</button>
    </div>

    <ul id="list" aria-label="Aufgabenliste"></ul>
    <p class="empty" id="empty" hidden>Noch keine Aufgaben — oben eingeben.</p>

    <footer><a href="../../index.html">← Portfolio</a></footer>
  </div>

  <script>
(() => {
  const KEY = "thomas-todos-v1";
  const form = document.getElementById("form");
  const field = document.getElementById("field");
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  const clearDone = document.getElementById("clearDone");

  let filter = "all";
  let todos = [];

  function uid() {
    return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      todos = Array.isArray(parsed)
        ? parsed.filter((t) => t && typeof t.text === "string" && typeof t.done === "boolean")
        : [];
    } catch {
      todos = [];
    }
  }

  function save() {
    localStorage.setItem(KEY, JSON.stringify(todos));
  }

  function visible(t) {
    if (filter === "active") return !t.done;
    if (filter === "done") return t.done;
    return true;
  }

  function render() {
    list.innerHTML = "";
    const items = todos.filter(visible);
    empty.hidden = todos.length > 0;
    for (const t of items) {
      const li = document.createElement("li");
      li.className = t.done ? "done" : "";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = t.done;
      cb.setAttribute("aria-label", "Erledigt");
      cb.addEventListener("change", () => {
        t.done = cb.checked;
        save();
        render();
      });
      const span = document.createElement("span");
      span.className = "task-text";
      span.textContent = t.text;
      const del = document.createElement("button");
      del.type = "button";
      del.className = "danger ghost";
      del.textContent = "Löschen";
      del.addEventListener("click", () => {
        todos = todos.filter((x) => x.id !== t.id);
        save();
        render();
      });
      const actions = document.createElement("div");
      actions.className = "row-actions";
      actions.appendChild(del);
      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(actions);
      list.appendChild(li);
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = field.value.trim();
    if (!text) return;
    todos.unshift({ id: uid(), text, done: false });
    field.value = "";
    save();
    render();
    field.focus();
  });

  document.querySelectorAll("[data-filter]").forEach((btn) => {
    btn.addEventListener("click", () => {
      filter = btn.getAttribute("data-filter") || "all";
      document.querySelectorAll("[data-filter]").forEach((b) => {
        b.classList.toggle("is-active", b === btn);
      });
      render();
    });
  });

  clearDone.addEventListener("click", () => {
    todos = todos.filter((t) => !t.done);
    save();
    render();
  });

  load();
  render();
})();
  </script>
</body>
</html>
